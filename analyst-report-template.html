<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClusterOS — Analyst Diagnostic Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a1a; --ink-dim:#4a4540; --ink-muted:#8c8780;
  --page:#f7f4ef; --surface:#f0ece4; --border:#ddd8cf; --border-2:#c8c2b7;
  --green:#2a7a4f; --green-dim:#1d5c3a; --signal:#c8f0d0;
  --amber:#d97706; --teal:#0c9488;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Geist',system-ui,sans-serif;
  --mono:'Geist Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#e8e4de;color:var(--ink);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
.screen-wrapper{max-width:860px;margin:0 auto}
.screen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.screen-logo{font-family:var(--serif);font-size:16px;color:var(--ink);text-decoration:none}
.screen-logo span{font-family:var(--mono);font-size:12px;color:var(--green);font-weight:700}
.btn-print{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-print:hover{background:var(--green-dim)}

/* Document */
.document{background:#fff;box-shadow:0 4px 40px rgba(0,0,0,0.12);padding:64px 72px}

/* Header */
.doc-header{display:grid;grid-template-columns:1fr auto;align-items:start;gap:32px;padding-bottom:32px;border-bottom:2px solid var(--ink);margin-bottom:40px}
.doc-logo{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:4px}
.doc-logo span{font-family:var(--mono);font-size:16px;color:var(--green);font-weight:700}
.doc-type{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-muted);margin-top:6px}
.doc-meta{text-align:right}
.doc-meta-date{font-family:var(--mono);font-size:10px;color:var(--ink-muted);margin-bottom:4px}
.doc-meta-ref{font-family:var(--mono);font-size:9px;color:var(--border-2)}

/* Ecosystem */
.doc-ecosystem{margin-bottom:40px}
.doc-ecosystem-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.doc-ecosystem-label::after{content:'';flex:1;height:1px;background:var(--border)}
.doc-ecosystem-name{font-family:var(--serif);font-size:clamp(26px,4vw,36px);line-height:1.1;letter-spacing:-0.02em;color:var(--ink);margin-bottom:10px}
.doc-ecosystem-tags{display:flex;gap:8px;flex-wrap:wrap}
.doc-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border-2);border-radius:2px;color:var(--ink-muted)}

/* Caveat */
.doc-caveat{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);padding:16px 20px;margin-bottom:40px;display:flex;gap:14px}
.doc-caveat-icon{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--amber);flex-shrink:0;padding-top:2px}
.doc-caveat-text{font-size:12px;color:var(--ink-dim);line-height:1.65;font-weight:300}
.doc-caveat-text strong{color:var(--ink);font-weight:500}

/* Section */
.doc-section{margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--border)}
.doc-section:last-of-type{border-bottom:none}
.doc-section-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.doc-section-num{background:var(--green);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.doc-section-heading{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:400;margin-bottom:14px;line-height:1.2}
.doc-section-heading em{font-style:italic;color:var(--green)}
.doc-body{font-size:13px;color:var(--ink-dim);line-height:1.72;margin-bottom:20px;font-weight:300}

/* Stalls */
.stall-list{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.stall-item{padding:16px 18px;border:1px solid var(--border);border-radius:3px;background:var(--surface)}
.stall-item.conf-high-border{border-left:4px solid var(--green)}
.stall-item.conf-medium-border{border-left:4px solid var(--amber)}
.stall-item.conf-low-border{border:1px dashed var(--border-2);opacity:0.85}
.stall-item-header{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.stall-item-id{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);letter-spacing:0.1em;flex-shrink:0}
.stall-item-name{font-size:14px;color:var(--ink);font-weight:500;line-height:1.25;flex:1}
.stall-item-def{font-size:12px;color:var(--ink-dim);line-height:1.65;font-weight:300;margin-bottom:10px}
.stall-leverage-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:3px}
.stall-item-leverage{font-size:12px;color:var(--ink-dim);line-height:1.6;font-weight:300;padding-left:10px;border-left:2px solid var(--green)}

/* Stack */
.stack-card{border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:16px}
.stack-card-head{background:var(--green-dim);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stack-card-name{font-family:var(--serif);font-size:18px;color:#fff;font-weight:400}
.stack-card-pills{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.stack-pill{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:2px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.9)}
.stack-card-body{padding:18px 20px;background:var(--surface)}
.stack-card-desc{font-size:13px;color:var(--ink-dim);line-height:1.72;font-weight:300;margin-bottom:14px}
.stack-leverage-dir{border-left:2px solid var(--green);padding-left:12px}
.stack-leverage-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
.stack-leverage-text{font-size:13px;color:var(--ink);line-height:1.65;font-weight:300}

/* Comparators */
.comparator-list{display:flex;flex-direction:column;gap:10px}
.comparator-card{border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--surface)}
.comp-card-main{padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.comp-card-name{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:3px;line-height:1.25}
.comp-card-loc{font-family:var(--mono);font-size:9px;color:var(--ink-muted);letter-spacing:0.04em;margin-bottom:5px}
.comp-card-badges{display:flex;gap:6px;flex-wrap:wrap}
.comp-sector-badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal);background:rgba(12,148,136,0.08);border:1px solid rgba(12,148,136,0.2);padding:2px 7px;border-radius:2px}
.comp-pattern-badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:2px}
.comp-card-link{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--green);text-decoration:none;white-space:nowrap;flex-shrink:0;padding-top:2px}
.comp-card-link:hover{color:var(--green-dim)}
.comp-shifted{padding:10px 16px;border-top:1px solid var(--border);background:#fff;display:flex;gap:10px;align-items:flex-start}
.comp-shifted-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);white-space:nowrap;flex-shrink:0;padding-top:2px}
.comp-shifted-text{font-size:11px;color:var(--ink-dim);line-height:1.55;font-weight:300}

/* Leverage block */
.leverage-block{padding:22px 24px;border:1px solid rgba(42,122,79,0.3);border-left:3px solid var(--green);background:rgba(42,122,79,0.04);border-radius:0 3px 3px 0}
.leverage-hypothesis{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--ink);line-height:1.55;margin-bottom:12px}
.leverage-note{font-size:12px;color:var(--ink-muted);line-height:1.6;font-weight:300}

/* Jump navigation */
.doc-jumpnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px}
.doc-jumpnav a{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);border-radius:2px;color:var(--ink-muted);text-decoration:none;transition:all 0.15s}
.doc-jumpnav a:hover{color:var(--green);border-color:var(--green)}

/* Appendix */
.appendix{margin-top:48px;padding-top:40px;border-top:2px solid var(--border)}
.appendix-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px}
.appendix-heading{font-family:var(--serif);font-size:20px;color:var(--ink);font-weight:400;margin-bottom:16px;line-height:1.2}
.appendix-heading em{font-style:italic;color:var(--green)}
.appendix-intro{font-size:13px;color:var(--ink-dim);line-height:1.7;margin-bottom:24px;font-weight:300}

/* Footer */
.doc-footer{margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.doc-footer-main{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.doc-footer-left{font-family:var(--mono);font-size:9px;color:var(--ink-muted);line-height:1.7}
.doc-footer-right{font-family:var(--mono);font-size:9px;color:var(--border-2);text-align:right}
.doc-footer-legal{font-size:10px;color:var(--ink-muted);line-height:1.6;padding-top:12px;border-top:1px solid var(--border)}

/* Loading & error */
.report-loading,.report-error{position:fixed;inset:0;z-index:200;background:var(--page);display:flex;align-items:center;justify-content:center}
.report-loading-inner,.report-error-inner{text-align:center;max-width:400px;padding:40px}
.report-loading-logo{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:16px}
.report-loading-logo span{font-family:var(--mono);font-size:16px;color:var(--green);font-weight:700}
.report-loading-text{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.report-error-heading{font-family:var(--serif);font-size:24px;color:var(--ink);margin-bottom:12px}
.report-error-text{font-size:13px;color:var(--ink-dim);line-height:1.65;font-weight:300;margin-bottom:24px}
.report-error-cta{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--green);color:#fff;padding:12px 24px;border-radius:3px;text-decoration:none;display:inline-block}
.report-error-cta:hover{background:var(--green-dim)}

/* ── ANALYST-SPECIFIC CSS ── */

/* Confidence badges */
.conf-badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;display:inline-block}
.conf-high{color:var(--green);background:rgba(42,122,79,0.08);border:1px solid rgba(42,122,79,0.25)}
.conf-medium{color:var(--amber);background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.25)}
.conf-low{color:var(--ink-muted);background:var(--surface);border:1px solid var(--border)}

/* Testability badges — same pattern */
.test-badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;display:inline-block}
.test-high{color:var(--green);background:rgba(42,122,79,0.08);border:1px solid rgba(42,122,79,0.25)}
.test-medium{color:var(--amber);background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.25)}
.test-low{color:var(--ink-muted);background:var(--surface);border:1px solid var(--border)}

/* Evidence tier badge */
.tier-badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;padding:3px 10px;border-radius:2px;display:inline-block;color:var(--green);background:rgba(42,122,79,0.06);border:1px solid rgba(42,122,79,0.2)}

/* Domain bar chart */
.domain-bars{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.domain-bar-row{display:flex;align-items:center;gap:10px}
.domain-bar-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);width:100px;text-align:right;flex-shrink:0}
.domain-bar-track{flex:1;height:20px;background:var(--surface);border:1px solid var(--border);border-radius:2px;overflow:hidden;position:relative}
.domain-bar-fill{height:100%;background:var(--green);border-radius:1px;transition:width 0.4s ease}
.domain-bar-count{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--ink-dim);width:36px;flex-shrink:0}

/* Stall evidence grid (X-side / Y-side) */
.stall-evidence-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0}
.stall-evidence-col{padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:3px}
.stall-evidence-col-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.stall-evidence-col-label.x-side{color:var(--green)}
.stall-evidence-col-label.y-side{color:var(--teal)}
.stall-evidence-col-text{font-size:12px;color:var(--ink-dim);line-height:1.65;font-weight:300}

/* Leverage card (analyst version) */
.leverage-card{padding:22px 24px;border:1px solid rgba(42,122,79,0.3);border-left:3px solid var(--green);background:rgba(42,122,79,0.04);border-radius:0 3px 3px 0;margin-bottom:14px}
.leverage-card-header{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.leverage-card-id{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);letter-spacing:0.1em}
.leverage-card-type{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted)}
.leverage-card-stack{font-family:var(--mono);font-size:8px;color:var(--teal);font-weight:700;letter-spacing:0.06em}
.leverage-card-focus{font-size:13px;color:var(--ink-dim);line-height:1.65;font-weight:300;margin-bottom:12px}
.leverage-card-hypothesis{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--ink);line-height:1.5;margin-bottom:12px;padding:12px 16px;background:rgba(42,122,79,0.03);border-radius:3px}
.leverage-card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.leverage-card-notes{font-size:12px;color:var(--ink-muted);line-height:1.6;font-weight:300}

/* Interpretive boundary note */
.interpretive-note{margin-top:12px;padding:10px 14px;background:rgba(217,119,6,0.04);border:1px solid rgba(217,119,6,0.15);border-radius:3px;font-size:11px;color:var(--ink-dim);line-height:1.6;font-weight:300;font-style:italic}
.interpretive-note strong{color:var(--amber);font-weight:500;font-style:normal}

/* Epistemic items */
.epistemic-list{display:flex;flex-direction:column;gap:10px}
.epistemic-item{padding:14px 16px;border-left:3px solid var(--amber);background:rgba(217,119,6,0.03);border:1px solid rgba(217,119,6,0.12);border-left:3px solid var(--amber);border-radius:0 3px 3px 0}
.epistemic-item-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
.epistemic-item-text{font-size:12px;color:var(--ink-dim);line-height:1.65;font-weight:300}

/* Stats box (exec summary) */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:16px 0}
.stat-card{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:3px;text-align:center}
.stat-card-value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--green);margin-bottom:2px}
.stat-card-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted)}

/* Next steps CTA */
.next-step{background:var(--green-dim);padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px;margin-top:24px;border-radius:3px}
.next-step-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px}
.next-step-heading{font-family:var(--serif);font-size:20px;color:#fff;line-height:1.2}
.next-step-heading em{font-style:italic;color:var(--signal)}

/* Next steps numbered list */
.next-steps-list{display:flex;flex-direction:column;gap:12px}
.next-step-item{display:flex;gap:14px;align-items:flex-start}
.next-step-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.next-step-text{font-size:13px;color:var(--ink-dim);line-height:1.65;font-weight:300}
.next-step-text strong{color:var(--ink);font-weight:500}

/* Pattern table (Appendix B) */
.pattern-table{width:100%;border-collapse:collapse;font-size:11px}
.pattern-table th{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);background:var(--surface)}
.pattern-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--ink-dim);font-weight:300;line-height:1.5;vertical-align:top}
.pattern-table tr:hover td{background:rgba(42,122,79,0.02)}

/* Domain summary table (Appendix A) */
.domain-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
.domain-table th{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);background:var(--surface)}
.domain-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--ink-dim);font-weight:300}

/* Match type badge (comparators) */
.match-badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
.match-strong{color:var(--green);background:rgba(42,122,79,0.08);border:1px solid rgba(42,122,79,0.2)}
.match-moderate{color:var(--amber);background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.2)}
.match-weak{color:var(--ink-muted);background:var(--surface);border:1px solid var(--border)}

/* ── PRINT ── */
@media print {
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  @page{margin:14mm 12mm 16mm 12mm;size:A4}
  body{background:#fff;padding:0;font-size:11px}
  .screen-header{display:none}
  .screen-wrapper{max-width:none;padding:0;margin:0}
  .doc-jumpnav{display:none!important}
  .document{box-shadow:none;padding:0;max-width:none}
  .doc-section-label{break-after:avoid!important;page-break-after:avoid!important}
  .doc-section-heading{break-after:avoid!important;page-break-after:avoid!important}
  .doc-body{break-after:avoid!important;page-break-after:avoid!important}
  .stall-item,.stack-card,.comparator-card,.leverage-card,.leverage-block,.epistemic-item,.doc-caveat,.stat-card,.interpretive-note{break-inside:avoid!important;page-break-inside:avoid!important}
  .doc-section{break-inside:auto;page-break-inside:auto}
  .doc-section-heading{orphans:3;widows:3}
  .doc-body{orphans:3;widows:3}
  #section-comparators{break-before:page!important;page-break-before:always!important}
  .appendix{break-before:page!important;page-break-before:always!important;margin-top:0;padding-top:32px;border-top:2px solid var(--border)}

<script>
// ── HELPERS ──

function confClass(level) {
  if (!level) return 'conf-low';
  const l = level.toLowerCase();
  if (l === 'high') return 'conf-high';
  if (l === 'medium') return 'conf-medium';
  return 'conf-low';
}

function confBadge(level) {
  if (!level) return '';
  return '<span class="conf-badge ' + confClass(level) + '">' + level.toUpperCase() + '</span>';
}

function testBadge(level) {
  if (!level) return '';
  const cls = level.toLowerCase() === 'high' ? 'test-high' : level.toLowerCase() === 'medium' ? 'test-medium' : 'test-low';
  return '<span class="test-badge ' + cls + '">' + level.toUpperCase() + '</span>';
}

function matchBadge(type) {
  if (!type) return '';
  const l = type.toLowerCase();
  const cls = l === 'strong' ? 'match-strong' : l === 'moderate' ? 'match-moderate' : 'match-weak';
  return '<span class="match-badge ' + cls + '">' + type.toUpperCase() + '</span>';
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

// ── DATA LOADING ──

async function loadReport() {
  const loadingEl = document.getElementById('report-loading');
  const errorEl = document.getElementById('report-error');
  const contentEl = document.getElementById('report-content');

  // 1. Check for embedded data
  if (window.ANALYST_REPORT_DATA) {
    renderReport(window.ANALYST_REPORT_DATA);
    contentEl.style.display = '';
    return;
  }

  // 2. Check URL param
  const params = new URLSearchParams(window.location.search);
  const runId = params.get('run_id');

  if (!runId) {
    // No data source — use sample data for development preview
    if (typeof SAMPLE_DATA !== 'undefined') {
      renderReport(SAMPLE_DATA);
      contentEl.style.display = '';
      return;
    }
    errorEl.style.display = '';
    document.getElementById('report-error-msg').textContent = 'No report data provided. Pass ?run_id= or embed window.ANALYST_REPORT_DATA.';
    return;
  }

  // 3. Fetch from API
  loadingEl.style.display = '';
  try {
    const resp = await fetch('/api/v1/analyst-report/' + encodeURIComponent(runId));
    if (!resp.ok) throw new Error('Report not found (HTTP ' + resp.status + ')');
    const data = await resp.json();
    loadingEl.style.display = 'none';
    renderReport(data);
    contentEl.style.display = '';
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = '';
    document.getElementById('report-error-msg').textContent = err.message;
  }
}

// ── RENDER ORCHESTRATOR ──

function renderReport(data) {
  renderDocHeader(data);
  renderEcosystem(data);
  renderJumpNav(data);
  renderCaveat(data);
  renderExecSummary(data);
  renderEvidenceBase(data);
  renderStalls(data);
  renderStacks(data);
  renderLeverage(data);
  renderComparators(data);
  renderEpistemic(data);
  renderNextSteps(data);
  renderAppendixA(data);
  renderAppendixB(data);
  renderAppendixC(data);
  renderAppendixD(data);
  renderAppendixE(data);
  renderFooter(data);

  // Mixpanel
  if (typeof mixpanel !== 'undefined') {
    mixpanel.track('Analyst Report Viewed', {
      run_id: data.run_id,
      cluster_name: data.cluster_name,
      stall_count: (data.stalls || []).length,
      stack_count: (data.stacks || []).length,
      leverage_count: (data.leverage || []).length,
      evidence_total: data.evidence ? data.evidence.total_items : 0
    });
  }
}

// ── SECTION RENDERERS ──

function renderDocHeader(data) {
  document.getElementById('doc-header').innerHTML =
    '<div class="doc-header">' +
      '<div>' +
        '<div class="doc-logo">Cluster<span>OS</span></div>' +
        '<div class="doc-type">Analyst Diagnostic Report</div>' +
      '</div>' +
      '<div class="doc-meta">' +
        '<div class="doc-meta-date">' + esc(data.generated_at || '') + '</div>' +
        '<div class="doc-meta-ref">REF: ' + esc(data.run_id || '') + '</div>' +
      '</div>' +
    '</div>';
}

function renderEcosystem(data) {
  var tags = '';
  if (data.geography) tags += '<span class="doc-tag">' + esc(data.geography) + '</span>';
  if (data.sector) tags += '<span class="doc-tag">' + esc(data.sector) + '</span>';
  if (data.lifecycle_stage) tags += '<span class="doc-tag">' + esc(data.lifecycle_stage) + '</span>';
  if (data.anchor_type) tags += '<span class="doc-tag">' + esc(data.anchor_type) + ' anchor</span>';

  document.getElementById('doc-ecosystem').innerHTML =
    '<div class="doc-ecosystem">' +
      '<div class="doc-ecosystem-label">Ecosystem</div>' +
      '<div class="doc-ecosystem-name">' + esc(data.cluster_name || 'Untitled Cluster') + '</div>' +
      '<div class="doc-ecosystem-tags">' + tags + '</div>' +
    '</div>';
}

function renderCaveat(data) {
  document.getElementById('doc-caveat').innerHTML =
    '<div class="doc-caveat">' +
      '<div class="doc-caveat-icon">NOTE</div>' +
      '<div class="doc-caveat-text">' +
        '<strong>This is an evidence-based analyst report.</strong> It was generated by the ClusterOS v3 pipeline from ' +
        (data.evidence ? data.evidence.total_items : '—') + ' evidence items spanning ' +
        (data.evidence ? data.evidence.time_span : '—') + '. Pattern detection is AI-assisted and confidence-tiered. ' +
        'All findings are hypotheses grounded in evidence, not prescriptions. Confidence levels indicate the strength of supporting evidence, not certainty.' +
      '</div>' +
    '</div>';
}

function renderExecSummary(data) {
  var ev = data.evidence || {};
  var stalls = data.stalls || [];
  var stacks = data.stacks || [];
  var levs = data.leverage || [];

  var highConfStalls = stalls.filter(function(s) { return s.confidence && s.confidence.toLowerCase() !== 'low'; }).length;
  var lowConfStalls = stalls.length - highConfStalls;

  var topLev = levs.length > 0 ? truncate(levs[0].hypothesis, 120) : 'None generated';

  var html =
    '<div class="doc-section" id="sec-exec-summary">' +
      '<div class="doc-section-label"><span class="doc-section-num">★</span>Executive summary</div>' +
      '<div class="doc-section-heading">Your ecosystem <em>at a glance</em></div>' +
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-card-value">' + (ev.total_items || 0) + '</div><div class="stat-card-label">Evidence items</div></div>' +
        '<div class="stat-card"><div class="stat-card-value">' + esc(ev.tier || '—') + '</div><div class="stat-card-label">Evidence tier</div></div>' +
        '<div class="stat-card"><div class="stat-card-value">' + ((data.patterns || {}).total || 0) + '</div><div class="stat-card-label">Patterns</div></div>' +
        '<div class="stat-card"><div class="stat-card-value">' + highConfStalls + '/' + lowConfStalls + '</div><div class="stat-card-label">Stalls (med+ / low)</div></div>' +
        '<div class="stat-card"><div class="stat-card-value">' + stacks.length + '</div><div class="stat-card-label">Stacks</div></div>' +
        '<div class="stat-card"><div class="stat-card-value">' + levs.length + '</div><div class="stat-card-label">Leverage points</div></div>' +
      '</div>' +
      '<p class="doc-body" style="margin-top:16px"><strong style="color:var(--ink)">Top leverage hypothesis:</strong> <em>' + esc(topLev) + '</em></p>' +
    '</div>';

  document.getElementById('section-exec-summary').innerHTML = html;
}

function renderEvidenceBase(data) {
  var ev = data.evidence || {};
  var domains = ev.domains || {};
  var total = ev.total_items || 1;

  // Sort domains by count descending
  var entries = Object.entries(domains).sort(function(a, b) { return b[1] - a[1]; });
  var maxCount = entries.length > 0 ? entries[0][1] : 1;

  var barsHtml = '';
  entries.forEach(function(e) {
    var pct = Math.round((e[1] / maxCount) * 100);
    barsHtml +=
      '<div class="domain-bar-row">' +
        '<div class="domain-bar-label">' + esc(e[0]) + '</div>' +
        '<div class="domain-bar-track"><div class="domain-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="domain-bar-count">' + e[1] + '</div>' +
      '</div>';
  });

  var html =
    '<div class="doc-section" id="sec-evidence">' +
      '<div class="doc-section-label"><span class="doc-section-num">1</span>Evidence base</div>' +
      '<div class="doc-section-heading">What the <em>evidence</em> looks like</div>' +
      '<p class="doc-body">' +
        'This analysis draws on <strong style="color:var(--ink)">' + total + ' evidence items</strong> ' +
        'spanning <strong style="color:var(--ink)">' + esc(ev.time_span || '—') + '</strong>, ' +
        'classified as <span class="tier-badge">' + esc(ev.tier || '—') + '</span>. ' +
        'Evidence is distributed across ' + entries.length + ' domains. ' +
        'Domains with fewer items represent potential gaps in observability, not absence of activity.' +
      '</p>' +
      '<div class="domain-bars">' + barsHtml + '</div>' +
    '</div>';

  document.getElementById('section-evidence').innerHTML = html;
}

function renderStalls(data) {
  var stalls = data.stalls || [];
  if (stalls.length === 0) {
    document.getElementById('section-stalls').innerHTML = '';
    return;
  }

  // Sort: High first, then Medium, then Low
  var order = { high: 0, medium: 1, low: 2 };
  stalls.sort(function(a, b) {
    return (order[(a.confidence || '').toLowerCase()] || 2) - (order[(b.confidence || '').toLowerCase()] || 2);
  });

  var cardsHtml = '';
  stalls.forEach(function(s) {
    var conf = (s.confidence || 'Low').toLowerCase();
    var borderClass = conf === 'high' ? 'conf-high-border' : conf === 'medium' ? 'conf-medium-border' : 'conf-low-border';

    var xSideHtml = '';
    if (s.x_side_evidence) {
      xSideHtml =
        '<div class="stall-evidence-col">' +
          '<div class="stall-evidence-col-label x-side">X-side evidence (observable)</div>' +
          '<div class="stall-evidence-col-text">' + esc(s.x_side_evidence) + '</div>' +
        '</div>';
    }
    var ySideHtml = '';
    if (s.y_side_visibility) {
      ySideHtml =
        '<div class="stall-evidence-col">' +
          '<div class="stall-evidence-col-label y-side">Y-side visibility (structural)</div>' +
          '<div class="stall-evidence-col-text">' + esc(s.y_side_visibility) + '</div>' +
        '</div>';
    }
    var gridHtml = (xSideHtml || ySideHtml) ? '<div class="stall-evidence-grid">' + xSideHtml + ySideHtml + '</div>' : '';

    var notesHtml = s.notes ? '<p style="font-size:12px;color:var(--ink-muted);line-height:1.6;font-weight:300;font-style:italic;margin-top:10px">' + esc(s.notes) + '</p>' : '';

    var leverageHtml = '';
    if (s.leverage) {
      leverageHtml =
        '<div style="margin-top:10px">' +
          '<div class="stall-leverage-label">Leverage direction</div>' +
          '<div class="stall-item-leverage">' + esc(s.leverage) + '</div>' +
        '</div>';
    }

    cardsHtml +=
      '<div class="stall-item ' + borderClass + '">' +
        '<div class="stall-item-header">' +
          '<span class="stall-item-id">' + esc(s.id) + '</span>' +
          '<span class="stall-item-name">' + esc(s.name) + '</span>' +
          confBadge(s.confidence) +
          (s.signal ? ' <span style="font-family:var(--mono);font-size:8px;color:var(--teal);font-weight:700;letter-spacing:0.06em">' + esc(s.signal) + '</span>' : '') +
        '</div>' +
        (s.definition ? '<div class="stall-item-def">' + esc(s.definition) + '</div>' : '') +
        gridHtml +
        notesHtml +
        leverageHtml +
      '</div>';
  });

  document.getElementById('section-stalls').innerHTML =
    '<div class="doc-section" id="sec-stalls">' +
      '<div class="doc-section-label"><span class="doc-section-num">2</span>What we found</div>' +
      '<div class="doc-section-heading">Detected <em>stalls</em></div>' +
      '<p class="doc-body">The pipeline identified ' + stalls.length + ' stalls in this ecosystem, sorted by confidence. ' +
        'Each stall card shows the observable evidence (X-side) and the structural inference (Y-side). ' +
        'High-confidence stalls are well-supported by cross-domain pattern evidence. Low-confidence stalls are signals worth monitoring but not yet confirmed.</p>' +
      '<div class="stall-list">' + cardsHtml + '</div>' +
    '</div>';
}

function renderStacks(data) {
  var stacks = data.stacks || [];
  if (stacks.length === 0) {
    document.getElementById('section-stacks').innerHTML = '';
    return;
  }

  var cardsHtml = '';
  stacks.forEach(function(st) {
    var pillsHtml = '';
    (st.component_stalls || []).forEach(function(sid) {
      pillsHtml += '<span class="stack-pill">' + esc(sid) + '</span>';
    });

    var signalsHtml = '';
    if (st.absorbed_signals) {
      signalsHtml = '<p style="font-family:var(--mono);font-size:9px;color:var(--ink-muted);margin-top:10px"><strong>Absorbed signals:</strong> ' + esc(st.absorbed_signals) + '</p>';
    }

    var notesHtml = st.notes ? '<p style="font-size:12px;color:var(--ink-muted);line-height:1.6;font-weight:300;font-style:italic;margin-top:10px">' + esc(st.notes) + '</p>' : '';

    // Interpretive boundary — auto-generated from confidence
    var conf = (st.confidence || 'Low').toLowerCase();
    var interpText = '';
    if (conf === 'high') interpText = 'This stack configuration is well-supported by pattern evidence across multiple domains and time windows.';
    else if (conf === 'medium') interpText = 'This is a plausible configuration, but one or more component stalls has limited observability. Treat the reinforcing logic as a working hypothesis.';
    else interpText = 'This is a structural hypothesis based on limited evidence. Exercise caution — the component stalls may co-occur without mutual reinforcement.';

    var interpHtml =
      '<div class="interpretive-note">' +
        '<strong>Interpretive boundary:</strong> ' + interpText +
      '</div>';

    cardsHtml +=
      '<div class="stack-card">' +
        '<div class="stack-card-head">' +
          '<span style="font-family:var(--mono);font-size:9px;font-weight:700;color:rgba(255,255,255,0.6)">' + esc(st.stack_id) + '</span>' +
          '<span class="stack-card-name">' + esc(st.stack_name) + '</span>' +
          confBadge(st.confidence) +
          '<div class="stack-card-pills">' + pillsHtml + '</div>' +
        '</div>' +
        '<div class="stack-card-body">' +
          '<div class="stack-card-desc">' + esc(st.reinforcing_logic) + '</div>' +
          signalsHtml +
          notesHtml +
          interpHtml +
        '</div>' +
      '</div>';
  });

  document.getElementById('section-stacks').innerHTML =
    '<div class="doc-section" id="sec-stacks">' +
      '<div class="doc-section-label"><span class="doc-section-num">3</span>Why it persists</div>' +
      '<div class="doc-section-heading">Reinforcing <em>stacks</em></div>' +
      '<p class="doc-body">When stalls appear together they form reinforcing configurations — each providing cover for the others. ' +
        'Addressing one without the rest produces temporary change that the system absorbs. The stack is the unit of intervention, not the individual stall.</p>' +
      cardsHtml +
    '</div>';
}

function renderLeverage(data) {
  var levs = data.leverage || [];
  if (levs.length === 0) {
    document.getElementById('section-leverage').innerHTML = '';
    return;
  }

  var cardsHtml = '';
  levs.forEach(function(lev) {
    var metaHtml =
      '<div class="leverage-card-meta">' +
        (lev.affected_signal ? '<span style="font-family:var(--mono);font-size:9px;color:var(--teal);font-weight:700">Signal: ' + esc(lev.affected_signal) + '</span>' : '') +
        (lev.testability ? '<span>Testability: ' + testBadge(lev.testability) + '</span>' : '') +

function renderEpistemic(data) {
  var items = [];
  var stalls = data.stalls || [];
  var ev = data.evidence || {};
  var domains = ev.domains || {};
  var total = ev.total_items || 1;
  var stacks = data.stacks || [];

  // Low confidence stalls
  var lowStalls = stalls.filter(function(s) { return (s.confidence || '').toLowerCase() === 'low'; });
  if (lowStalls.length > 0) {
    var names = lowStalls.map(function(s) { return s.id + ' (' + esc(s.name) + ')'; }).join(', ');
    items.push({ label: 'Unconfirmed signals', text: 'The following stalls were detected at low confidence and should be treated as signals worth monitoring, not confirmed findings: ' + names + '.' });
  }

  // Evidence domain gaps
  var gapDomains = [];
  Object.entries(domains).forEach(function(e) {
    var pct = (e[1] / total) * 100;
    if (pct < 5) gapDomains.push(e[0] + ' (' + Math.round(pct) + '%)');
  });
  if (gapDomains.length > 0) {
    items.push({ label: 'Evidence gaps', text: 'The following domains represent less than 5% of total evidence: ' + gapDomains.join(', ') + '. Findings that depend on these domains have reduced observability.' });
  }

  // Stack falsifiability
  stacks.forEach(function(st) {
    var conf = (st.confidence || 'Low').toLowerCase();
    if (conf !== 'high') {
      items.push({ label: 'Stack hypothesis: ' + esc(st.stack_id), text: 'To confirm ' + esc(st.stack_name) + ', you would need to observe that removing one component stall does not reduce the other — i.e., that the reinforcing logic holds under perturbation. Without that test, co-occurrence and mutual reinforcement cannot be distinguished.' });
    }
  });

  // Correlation vs causation
  items.push({ label: 'Correlation vs causation', text: 'Pattern evidence establishes co-occurrence and structural plausibility. It does not establish causation. The reinforcing logic described in stack configurations is a hypothesis about mechanism, not a demonstrated causal chain.' });

  // Point in time
  items.push({ label: 'Point-in-time analysis', text: 'This report reflects the evidence base at the time of analysis (' + esc(ev.time_span || '—') + '). Ecosystem configurations shift. Findings should be re-validated if more than 12 months have elapsed since the evidence was collected.' });

  var html = '';
  items.forEach(function(item) {
    html +=
      '<div class="epistemic-item">' +
        '<div class="epistemic-item-label">' + item.label + '</div>' +
        '<div class="epistemic-item-text">' + item.text + '</div>' +
      '</div>';
  });

  document.getElementById('section-epistemic').innerHTML =
    '<div class="doc-section" id="sec-epistemic">' +
      '<div class="doc-section-label"><span class="doc-section-num">6</span>What this report cannot tell you</div>' +
      '<div class="doc-section-heading">Epistemic <em>honesty</em></div>' +
      '<p class="doc-body">Every diagnostic has boundaries. This section names them explicitly so readers can calibrate their confidence in the findings.</p>' +
      '<div class="epistemic-list">' + html + '</div>' +
    '</div>';
}
