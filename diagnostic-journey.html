<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic Journey — ClusterOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Light journey surface (aligned with site cream palette) ── */
  --dj-bg:      #f7f4ef;
  --dj-surface: #f0ece4;
  --dj-border:  #ddd8cf;
  --dj-chalk:   #1a1a1a;
  --dj-chalk-dim: #5a5650;
  --dj-chalk-muted: #8c8780;

  /* ── Shared with site (same values — safe to reference) ── */
  --signal:     #2a7a4f;   /* dark green for light mode active states */
  --signal-bg:  #c8f0d0;   /* light green background tint */
  --founder:    #d97706;   /* amber — site value */
  --steward:    #0c9488;   /* teal — site value */
  --researcher: #c0392b;   /* red — site value */
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'Geist', system-ui, -apple-system, sans-serif;
  --font-mono:  'Geist Mono', monospace;
}

html { background: var(--dj-bg); color: var(--dj-chalk); font-family: var(--font-sans); }
body { min-height: 100vh; }
#root { min-height: 100vh; display: flex; flex-direction: column; }
@media (max-width: 680px) { .stall-grid { grid-template-columns: repeat(2, 1fr) !important; } }
@media (max-width: 420px) { .stall-grid { grid-template-columns: 1fr !important; } }
@media (min-width: 769px) { .schema-mobile { display: none !important; } }
@media (max-width: 768px) { .schema-desktop { display: none !important; } .desktop-stepper-wrap { display: none !important; } }
@media (min-width: 769px) { .mobile-accordion-wrap { display: none !important; } }
@media (min-width: 769px) { .schema-mobile-stepper { display: none !important; } .mobile-expand-toggle { display: none !important; } .annot-panel-collapsed { display: block !important; } .mobile-accordion-wrap { display: none !important; } }
@keyframes pulse-dot { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

/* Comparator pill hover */
a.comparator-pill:hover { background: #2a3f55 !important; }

/* Suppress site sticky bar — journey has its own */
.sticky-bar, .sticky-bar-inner, .sticky-btn { display: none !important; }

/* Mobile responsive — 375px minimum */
@media (max-width: 768px) {
  /* Stage progress indicator — prevent overflow */
  .step-node { min-width: 80px !important; }
  .step-label { font-size: 9px !important; letter-spacing: 0.04em !important; }
  .step-subtitle { display: none !important; }
  .s0-outputs { grid-template-columns: 1fr !important; }
  .s0-cta-btn { width: 100% !important; justify-content: center !important; }
  .stage0-main { padding: 24px !important; }
  /* Stepper header: hide everything except mobile stepper card's own counter */
  .stepper-header { justify-content: center !important; }
  .stepper-config-badge { display: none !important; }
  .stepper-back-overview { display: none !important; }
  .stepper-counter { display: none !important; }
  /* Hide annotation panel title on mobile — MobileSchemaStep already shows layer heading */
  .annot-title-desktop { display: none !important; }
  /* Collapsible annotation panel on mobile */
  .annot-panel-collapsed { display: none !important; }
  .annot-panel-expanded { display: block !important; }
  /* Hide expand toggle on desktop */
  .mobile-expand-toggle { display: inline !important; }
  /* Cap commentary length on mobile */
  .digital-body {
    display: -webkit-box !important;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
}
@media (max-width: 600px) {
  .nav-bar-journey { flex-direction: column-reverse !important; gap: 8px !important; padding: 12px 16px !important; }
  .nav-bar-journey > div { flex: none !important; width: 100% !important; }
  .nav-bar-journey button { width: 100% !important; justify-content: center !important; }
  .schema-step-nav { flex-direction: column !important; }
  .schema-step-nav button { width: 100% !important; justify-content: center !important; }
}
@media (max-width: 480px) {
  .sticky-sub-label { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useCallback, useMemo, useEffect, useRef, createContext, useContext } = React;

/* ─── Stage definitions ────────────────────────────────────────────── */
const STAGES = [
  { id: 'behaviours', label: 'Behaviours',  subtitle: 'Stall identification & stack detection' },
  { id: 'leverage',   label: 'Leverage',     subtitle: 'Intervention hypotheses' },
  { id: 'digital-os', label: 'Digital OS',   subtitle: 'Architecture recommendation' },
];

/* ─── Stall data (fallback + API-loaded) ────────────────────────────── */
const FALLBACK_STALLS = [
  { id: 'S1', name: 'Re-proving',       sub: 'Resources flow to justification rather than execution. The ecosystem repeats the case for its own existence.' },
  { id: 'S2', name: 'Coordinating',     sub: 'Coordination becomes the output rather than the mechanism. Meetings and alignment substitute for committed action.' },
  { id: 'S3', name: 'Forgiving',        sub: 'Poor performance is tolerated to preserve relationships. Accountability systems are systematically avoided.' },
  { id: 'S4', name: 'Extracting',       sub: 'Anchor institutions extract value rather than circulating it. Talent, IP, and capital flow outward.' },
  { id: 'S5', name: 'Mediating',        sub: 'The ecosystem manages relationships between actors rather than enabling transactions between them.' },
  { id: 'S6', name: 'Stabilising',      sub: 'The ecosystem optimises for stability over adaptation. Existing structures are preserved even when they no longer serve.' },
  { id: 'S7', name: 'Narrating',        sub: 'Stories about progress substitute for evidence of change. Reporting substitutes for impact.' },
  { id: 'S8', name: 'Scaling Activity', sub: 'Early-stage activity is celebrated rather than evaluated. The ecosystem optimises for inputs and starts rather than outcomes.' },
  { id: 'S9', name: 'Waiting',          sub: 'Action is deferred pending external conditions — funding, policy clarity, anchor commitment. Waiting becomes structural.' },
];
let STALLS = FALLBACK_STALLS;

/* ─── Stack detection rules + leverage hypotheses (fallback + API) ── */
const FALLBACK_STACK_RULES = [
  { id: 'STK-05', name: 'Mediated Dependency Loop',    triggers: ['S5', 'S9'],
    logic: 'Mediation defers action to external actors, who are themselves waiting — creating a self-reinforcing dependency cycle where no party moves first.',
    regime: 'The ecosystem is locked into perpetual standby — every actor waits for another to move, and mediation sustains the waiting as productive activity.',
    entry: 'Identify the actor with the least to lose from unilateral action and change their constraint — not their willingness.',
    effect: 'One committed move breaks the symmetry of waiting; other actors follow once the cost of inaction exceeds the cost of going second.',
    confidence: 'High' },
  { id: 'STK-12', name: 'Evidence Without Commitment',  triggers: ['S1', 'S7'],
    logic: 'Re-proving generates narrative to justify existence, while narrating substitutes reporting for impact — evidence accumulates but never converts to committed action.',
    regime: 'The ecosystem is locked into a justification cycle — evidence is produced to sustain funding, not to inform decisions or trigger execution.',
    entry: 'Secure a single credible external validator who makes the case once and commits publicly, removing the need for continuous internal re-proving.',
    effect: 'Resources shift from justification to execution; narrative production drops as the case becomes settled rather than perpetually contested.',
    confidence: 'High' },
  { id: 'STK-03', name: 'Incumbent Lock',               triggers: ['S6', 'S4'],
    logic: 'Stabilising preserves structures that enable extraction — anchors maintain their position while the ecosystem optimises around them rather than adapting.',
    regime: 'The ecosystem is locked into serving incumbent anchors — stability protects extraction channels, and extraction funds the stability apparatus.',
    entry: 'Change anchor procurement or spin-out policy to redirect value circulation, rather than asking anchors to voluntarily change behaviour.',
    effect: 'Value begins circulating within the ecosystem; new entrants gain access to resources previously captured by incumbents.',
    confidence: 'Medium' },
  { id: 'STK-01', name: 'Activity-Alignment Stack',     triggers: ['S7', 'S2'],
    logic: 'The ecosystem reports activity to justify coordination, and coordinates to generate reportable activity. Neither breaks without changing both.',
    regime: 'The ecosystem is locked into performative coordination — meetings and reports are the primary output, and both exist to justify the other.',
    entry: 'Change what gets reported — shift metrics from activity and alignment to outcomes and commitments — before changing governance.',
    effect: 'Coordination without reportable outcomes loses justification; actors redirect effort toward measurable change.',
    confidence: 'High' },
  { id: 'STK-02', name: 'Justification Stack',          triggers: ['S1', 'S8'],
    logic: 'Early-stage activity is used as proof of concept rather than evaluated against outcomes. The case for scaling is never quite strong enough.',
    regime: 'The ecosystem is locked into pilot mode — starts accumulate but never graduate, because each is used as evidence rather than evaluated as progress.',
    entry: 'Change the measurement layer — redefine success from number of starts to rate of graduation — before changing programme design.',
    effect: 'Activity that does not convert to outcomes loses funding priority; resources concentrate on fewer, higher-conviction bets.',
    confidence: 'Medium' },
  { id: 'STK-04', name: 'Relationship Stack',           triggers: ['S2', 'S5'],
    logic: 'The ecosystem manages relationships as the primary output. Transactions are replaced by partnerships, and partnerships by further coordination.',
    regime: 'The ecosystem is locked into relationship maintenance — partnerships are preserved as ends in themselves, substituting for the transactions they were meant to enable.',
    entry: 'Restructure incentives so that actors benefit from completed transactions, not from maintaining partnership status.',
    effect: 'Partnerships that do not produce transactions dissolve naturally; remaining relationships become functional rather than ceremonial.',
    confidence: 'Medium' },
  { id: 'STK-06', name: 'Anchor Dependency Stack',      triggers: ['S5', 'S4'],
    logic: 'The ecosystem organises itself around managing anchor institutions rather than changing their behaviour. Value flows out while relationships are maintained.',
    regime: 'The ecosystem is locked into anchor servicing — mediation effort flows toward keeping anchors comfortable rather than changing their extraction behaviour.',
    entry: 'Change anchor procurement or IP policy at the institutional level, creating structural incentives for value to circulate rather than extract.',
    effect: 'Mediation effort redirects from relationship management to transaction facilitation; anchor behaviour shifts through changed constraints.',
    confidence: 'Low' },
  { id: 'STK-07', name: 'Tolerance Stack',              triggers: ['S8', 'S3'],
    logic: 'Poor performance at scale is tolerated to avoid disrupting the narrative of progress. Accountability is systematically deferred.',
    regime: 'The ecosystem is locked into tolerance of underperformance — scaling activity provides cover, and forgiving prevents the accountability that would expose it.',
    entry: 'Introduce conditional continuation — a funder or anchor changes the terms under which they will continue to support, creating accountability without confrontation.',
    effect: 'Underperforming programmes lose automatic renewal; resources shift toward programmes that demonstrate measurable progress.',
    confidence: 'Medium' },
];
let STACK_RULES = FALLBACK_STACK_RULES;

/* ─── Individual stall leverage (fallback + API-loaded) ────────────── */
const FALLBACK_STALL_LEVERAGE = {
  S1: 'Secure one credible external validator to make the case definitively — internal re-proving almost never resolves this.',
  S2: 'Identify the actor with the most to lose from the current arrangement and change their constraint, not their willingness to coordinate.',
  S3: 'Introduce conditional continuation from a funder or anchor — accountability breaks through changed conditions, not culture.',
  S4: 'Change anchor procurement or spin-out policy to redirect value circulation within the ecosystem.',
  S5: 'Restructure incentives so actors benefit from completed transactions rather than maintained relationships.',
  S6: 'The leverage is almost always external — a new entrant, a policy shift, or a funding regime change that disrupts incumbent comfort.',
  S7: 'Change what gets reported — shift from activity narratives to outcome evidence — before changing who reports.',
  S8: 'Redefine success from number of starts to rate of graduation — change the measurement layer before changing programmes.',
  S9: 'Find the actor with the least to lose from going first and remove their remaining constraint. Others follow.',
};
let STALL_LEVERAGE = FALLBACK_STALL_LEVERAGE;

/* ─── API loader ───────────────────────────────────────────────────── */
const KNOWLEDGE_API = 'https://clusteros-v3-production.up.railway.app/api/v1/knowledge';
let knowledgeLoaded = false;
let knowledgePromise = null;

function loadKnowledge() {
  if (knowledgePromise) return knowledgePromise;
  knowledgePromise = fetch(KNOWLEDGE_API)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(k => {
      console.log('[Knowledge API] Top-level keys:', Object.keys(k));
      // Map stalls
      if (k.stalls && k.stalls.length > 0) {
        STALLS = k.stalls.map(s => ({
          id:   s.id || s.stall_id,
          name: s.short || s.name,
          sub:  s.definition || s.y_substituted || '',
        }));
        // Rebuild STALL_LEVERAGE from API
        const leverageMap = {};
        k.stalls.forEach(s => {
          const id = s.id || s.stall_id;
          if (s.leverage) leverageMap[id] = s.leverage;
        });
        if (Object.keys(leverageMap).length > 0) STALL_LEVERAGE = { ...FALLBACK_STALL_LEVERAGE, ...leverageMap };
      }
      // Map stacks
      if (k.stacks && k.stacks.length > 0) {
        console.log('[Knowledge API] Raw stack object keys:', Object.keys(k.stacks[0]));
        console.log('[Knowledge API] First raw stack:', JSON.stringify(k.stacks[0]).substring(0, 500));
        STACK_RULES = k.stacks.map(s => ({
          id:         s.id || s.canonical_id || '',
          name:       s.name || '',
          triggers:   s.stalls || s.component_stalls || [],
          logic:      s.reinforcing_logic || s.description || '',
          regime:     s.regime || '',
          entry:      s.leverage_entry || s.entry || '',
          effect:     s.expected_effect || s.effect || '',
          confidence: s.confidence || 'Medium',
          comparators: s.clusters || s.comparators || s.cluster_examples || [],
        }));
      }
      knowledgeLoaded = true;
      console.log(`Knowledge API loaded: ${STALLS.length} stalls, ${STACK_RULES.length} stacks`);

      // Load cluster comparators from clusters.json (non-blocking)
      return fetch('/clusters.json')
        .then(cr => cr.ok ? cr.json() : [])
        .then(allClusters => {
          if (!Array.isArray(allClusters) || allClusters.length === 0) return;
          // Map cluster stall names to stall IDs
          const stallNameToId = {};
          STALLS.forEach(s => { stallNameToId[s.name.toLowerCase()] = s.id; });

          STACK_RULES.forEach(rule => {
            const triggerSet = new Set(rule.triggers);
            const matchedClusters = allClusters.filter(c =>
              (c.stacks || []).some(cs =>
                (cs.canonical_id === rule.id) ||
                (cs.stalls_involved && cs.stalls_involved.length === triggerSet.size &&
                 cs.stalls_involved.every(sid => triggerSet.has(sid)))
              )
            );
            rule.comparators = matchedClusters.slice(0, 5).map(c => ({ name: c.name || c.id, slug: c.id }));

            // Compute co-occurring stalls across matched clusters (medium+high confidence only)
            const coStallCounts = {};
            matchedClusters.forEach(c => {
              (c.stalls || []).forEach(cs => {
                if (cs.confidence !== 'medium' && cs.confidence !== 'high') return;
                // Map cluster stall name to ID
                const csName = (cs.name || '').split(' instead of')[0].split(' around')[0].trim().toLowerCase();
                const sid = stallNameToId[csName];
                if (sid && !triggerSet.has(sid)) {
                  coStallCounts[sid] = (coStallCounts[sid] || 0) + 1;
                }
              });
            });
            rule.coStallCounts = coStallCounts;
            rule.comparatorTotal = matchedClusters.length;
          });
          // Compute stall frequencies from clusters.json for journey.js
          const _stallFreq = {};
          const _stallNameMap = {
            'Re-proving instead of narrowing':'Re-proving','Coordinating instead of deciding':'Coordinating',
            'Forgiving instead of redesigning':'Forgiving','Extracting without reinvesting':'Extracting',
            'Mediating instead of coupling':'Mediating','Stabilizing around incumbents':'Stabilising',
            'Stabilising around incumbents':'Stabilising','Narrating instead of testing':'Narrating',
            'Scaling activity instead of throughput':'Scaling','Waiting for permission':'Waiting'
          };
          const _medHighCounts = {};
          allClusters.forEach(c => {
            (c.stalls || []).forEach(s => {
              if (s.confidence === 'medium' || s.confidence === 'high') {
                const short = _stallNameMap[s.name];
                if (short) _medHighCounts[short] = (_medHighCounts[short]||0) + 1;
              }
            });
          });
          Object.entries(_medHighCounts).forEach(([short, cnt]) => {
            _stallFreq[short] = Math.round(cnt / allClusters.length * 100);
          });
          window._CLUSTER_STALL_FREQ = _stallFreq;

          console.log('[Knowledge API] Cluster comparators loaded for', STACK_RULES.filter(r => (r.comparators || []).length > 0).length, 'stacks');
        })
        .catch(e => console.warn('[Knowledge API] clusters.json not loaded:', e.message));
    })
    .catch(err => {
      console.warn('Knowledge API unavailable — using fallback definitions:', err.message);
      knowledgeLoaded = true; // proceed with fallbacks
    });
  return knowledgePromise;
}

/* ─── Stage 3: Qualifier questions ─────────────────────────────────── */
const QUALIFIER_QUESTIONS = [
  { id: 'clusterType', question: 'What best describes your cluster?', multi: false,
    options: [
      { value: 'regional',    label: 'Regional Speciality',  desc: 'Place-based cluster with sector focus and local identity' },
      { value: 'national',    label: 'National Supercluster', desc: 'Cross-regional network with national strategic significance' },
      { value: 'corporate',   label: 'Corporate',             desc: 'Anchor-led ecosystem organised around corporate R&D or supply chain' },
      { value: 'city',        label: 'City cluster',           desc: 'Urban cluster with place-based identity and city-scale coordination' },
    ]},
  { id: 'anchorType', question: 'Who is the primary anchor in your ecosystem?', multi: false,
    options: [
      { value: 'university',  label: 'University',          desc: 'Higher education institution driving research and talent' },
      { value: 'research',    label: 'Research institute',  desc: 'Dedicated research organisation or national lab' },
      { value: 'corporate',   label: 'Large corporate',     desc: 'Major employer or R&D centre anchoring the ecosystem' },
      { value: 'public',      label: 'Public agency',       desc: 'Government body, EDA, or public development agency' },
      { value: 'hospital',    label: 'Hospital',             desc: 'NHS trust, health system, or clinical research centre' },
      { value: 'none',        label: 'None yet',             desc: 'No established anchor — ecosystem is pre-anchor stage' },
    ]},
  { id: 'stage', question: "What is your ecosystem's current stage?", multi: false,
    options: [
      { value: 'early',       label: 'Early-stage (forming)',    desc: 'Building initial connections and proving the cluster thesis' },
      { value: 'established', label: 'Established (operating)',  desc: 'Operating programmes and structures, seeking to deepen impact' },
      { value: 'mature',      label: 'Mature (optimising)',      desc: 'Optimising existing infrastructure and addressing structural stalls' },
    ]},
  { id: 'priority', question: 'What is your primary strategic priority?', multi: false,
    options: [
      { value: 'talent',      label: 'Retain & grow local talent' },
      { value: 'capital',     label: 'Attract external capital' },
      { value: 'research',    label: 'Convert research to commercial activity' },
      { value: 'supply',      label: 'Build anchor supply chains' },
      { value: 'growth',      label: 'Drive economic growth' },
    ]},
  { id: 'gap', question: 'Where is your biggest coordination gap?', multi: false,
    options: [
      { value: 'discovery',   label: "Actors can't find each other" },
      { value: 'flow',        label: "Knowledge doesn't flow between groups" },
      { value: 'access',      label: "Outside actors can't engage" },
      { value: 'conversion',  label: "Activity isn't converting to outcomes" },
    ]},
  { id: 'protect', question: 'What does your ecosystem need to protect?', multi: true,
    options: [
      { value: 'knowledge',   label: 'Local knowledge staying local' },
      { value: 'ip',          label: 'Institutional IP and research' },
      { value: 'trust',       label: 'Community relationships and trust' },
      { value: 'talent',      label: 'Founder and talent pipeline' },
      { value: 'sovereignty', label: 'Economic sovereignty' },
    ]},
];

/* ─── Configuration name taxonomy (fixed lookup) ──────────────────── */
/* Keys: clusterType|anchorType|priority — 15 canonical entries + fallback */
const CONFIG_NAMES = {
  // Regional
  'regional|university|research':  'Knowledge Commercialisation Cluster',
  'regional|university|talent':    'Knowledge Retention Cluster',
  'regional|corporate|supply':     'Anchor Supply Network',
  'regional|corporate|growth':     'Industrial Growth Cluster',
  'regional|public|capital':       'Investment-Ready Region',
  'regional|public|growth':        'Regional Development Cluster',
  // National
  'national|university|research':  'National Innovation Corridor',
  'national|corporate|supply':     'Strategic Supply Chain Network',
  'national|public|growth':        'National Growth Programme',
  'national|*|capital':            'Capital Mobilisation Network',
  // Enterprise (corporate cluster type)
  'corporate|corporate|supply':    'Supplier Ecosystem Network',
  'corporate|corporate|research':  'Corporate Innovation Cluster',
  'corporate|university|research': 'Corporate-Academic Alliance',
  'corporate|public|growth':       'Corporate Regional Partnership',
  'corporate|*|talent':            'Internal Talent Ecosystem',
};

function lookupConfigName(clusterType, anchorType, priority) {
  const ct = clusterType || 'regional';
  const at = anchorType || 'none';
  const pr = priority || 'growth';
  // Try exact match first
  const exact = CONFIG_NAMES[`${ct}|${at}|${pr}`];
  if (exact) return exact;
  // Try wildcard anchor match
  const wildAnchor = CONFIG_NAMES[`${ct}|*|${pr}`];
  if (wildAnchor) return wildAnchor;
  // Try wildcard priority match
  const wildPriority = CONFIG_NAMES[`${ct}|${at}|*`];
  if (wildPriority) return wildPriority;
  return 'Regional Operating System';
}

/* ─── OS configuration derivation ──────────────────────────────────── */
/* ─── Anchor type display labels ───────────────────────────────────── */
const ANCHOR_LABELS = {
  university: 'University',
  research:   'Research institute',
  corporate:  'Large corporate',
  public:     'Public agency',
  hospital:   'Hospital',
  none:       'Anchors',
};

function deriveOSConfig(qualifiers, stalls, detectedStacks) {
  const { clusterType, anchorType, stage, priority, gap, protect } = qualifiers;
  const protectSet = new Set(protect || []);
  const stallSet = new Set(stalls || []);

  // Configuration name — fixed taxonomy lookup (3-key)
  const configName = lookupConfigName(clusterType, anchorType, priority);
  const anchorLabel = ANCHOR_LABELS[anchorType] || 'Anchors';

  // Derived flags for infrastructure priority selection
  const researchFocus = priority === 'research' || protectSet.has('ip');
  const talentFocus = priority === 'talent' || protectSet.has('talent');
  const anchorLed = clusterType === 'corporate' || priority === 'supply';
  const sovereignty = protectSet.has('sovereignty') || protectSet.has('knowledge');

  // Derive infrastructure priorities
  const priorities = [];

  if (gap === 'discovery' || gap === 'access')
    priorities.push({ name: 'Actor Registry & Discovery Layer', desc: 'Structured directory enabling actors to find each other by capability, not just sector or geography.' });
  if (gap === 'flow' || researchFocus)
    priorities.push({ name: 'Knowledge Flow Infrastructure', desc: 'Controlled channels for research, data, and insight to move between groups without leaking sovereignty.' });
  if (gap === 'conversion' || stallSet.has('S7') || stallSet.has('S8'))
    priorities.push({ name: 'Outcome Measurement Layer', desc: 'Shared metrics that track conversion from activity to impact, replacing narrative reporting with evidence.' });
  if (sovereignty || protectSet.has('trust'))
    priorities.push({ name: 'Sovereign Data Membrane', desc: 'Permissioned boundary controlling what knowledge crosses the cluster edge and under what terms.' });
  if (anchorLed || stallSet.has('S4'))
    priorities.push({ name: 'Anchor Accountability Protocol', desc: 'Structural mechanism ensuring anchor institutions circulate value rather than extract it.' });
  if (talentFocus)
    priorities.push({ name: 'Talent Pipeline Tracker', desc: 'Visibility layer connecting education, founders, and employers within the ecosystem boundary.' });
  if (priority === 'capital')
    priorities.push({ name: 'Investment Signalling Layer', desc: 'Curated surface enabling external capital to engage with ecosystem opportunities without requiring mediation.' });
  if (detectedStacks.length > 0)
    priorities.push({ name: 'Stack Intervention Monitor', desc: 'Diagnostic layer tracking whether leverage interventions are shifting the reinforcing dynamics between stalls.' });

  // Take top 4
  const topPriorities = priorities.slice(0, 4);
  if (topPriorities.length < 3) {
    topPriorities.push({ name: 'Coordination Infrastructure', desc: 'Lightweight protocol layer replacing ad-hoc meetings with structured, accountable commitments.' });
  }

  // Derive membrane actors
  const outsideActors = [];
  if (priority === 'capital' || clusterType === 'national') outsideActors.push('Investors');
  if (researchFocus) outsideActors.push('Research partners');
  if (priority === 'talent' || protectSet.has('talent')) outsideActors.push('Talent networks');
  if (anchorLed) outsideActors.push('Supply chain partners');
  if (priority === 'growth') outsideActors.push('Trade bodies');
  if (clusterType === 'national') outsideActors.push('Regional EDAs');
  // Q5-driven outside actors
  if (protectSet.has('sovereignty') && !outsideActors.includes('Government / Policy')) outsideActors.push('Government / Policy');
  if (protectSet.has('talent') && !outsideActors.includes('Talent networks')) outsideActors.push('Talent networks');
  if (outsideActors.length === 0) outsideActors.push('External partners');
  if (outsideActors.length < 2) outsideActors.push('Policy actors');

  const insideActors = ['Founders', anchorLabel, 'Researchers', 'Stewards'];

  // Q5 protection selections — passed through for description and membrane rendering
  const protections = protect || [];

  return { configName, priorities: topPriorities, outsideActors: outsideActors.slice(0, 5), insideActors, clusterType: clusterType || 'regional', protections, anchorLabel };
}

/* ─── Leverage hypothesis card (provocation format) ────────────────── */
function LeverageCard({ stack, protections, priority, commentary }) {
  const triggerNames = stack.triggers
    .map(id => STALLS.find(s => s.id === id))
    .filter(Boolean);
  const protectModifiers = (protections || [])
    .map(p => PROTECT_LEVERAGE[p])
    .filter(Boolean);

  // Use cached commentary (parsed 3-part object) if available, otherwise build from stack data
  let diagnosis, consequence, mechanism;
  if (commentary && commentary.diagnosis) {
    diagnosis = commentary.diagnosis;
    consequence = commentary.consequence || (stack.entry
      ? `The leverage target is ${stack.entry.charAt(0).toLowerCase()}${stack.entry.slice(1)}`
      : '');
    mechanism = commentary.mechanism || stack.entry || 'Address the contributing stalls directly.';
  } else {
    diagnosis = stack.logic || '';
    consequence = stack.entry
      ? `Without intervention, this stack remains self-reinforcing. The leverage target is ${stack.entry.charAt(0).toLowerCase()}${stack.entry.slice(1)}`
      : 'Without intervention, this stack continues to reinforce itself.';
    if (priority === 'talent') consequence += ' Talent retention cannot improve while this pattern holds.';
    else if (priority === 'capital') consequence += ' Investment readiness cannot improve while this pattern holds.';
    else if (priority === 'research') consequence += ' Research commercialisation cannot progress while this pattern holds.';
    else if (priority === 'supply') consequence += ' Supply chain development stalls while this pattern holds.';
    else if (priority === 'growth') consequence += ' Economic growth is constrained while this pattern holds.';
    mechanism = stack.entry || 'Address the contributing stalls directly — the stack breaks when the reinforcing conditions are removed.';
  }

  return (
    <div style={s2.card}>
      <div style={s2.cardTop}>
        <div style={s2.cardMeta}>
          <span style={s2.cardId}>{stack.id}</span>
          <ConfidenceBadge level={stack.confidence} />
        </div>
        <h3 style={s2.cardName}>{stack.name}</h3>
        <div style={s2.cardTriggers}>
          {triggerNames.map(s => (
            <span key={s.id} style={s2.triggerPill}>{s.id} {s.name}</span>
          ))}
        </div>
      </div>

      <div style={s2.fieldGroup}>
        <div style={s2.field}>
          <span style={s2.provLabel}>Diagnosis</span>
          <span style={s2.provDiagnosis}>{diagnosis}</span>
        </div>
        <div style={s2.field}>
          <span style={s2.provLabel}>Consequence</span>
          <span style={s2.provText}>{consequence}</span>
        </div>
        <div style={s2.field}>
          <span style={s2.provLabel}>Mechanism</span>
          <span style={s2.provText}>{mechanism}</span>
        </div>
        {protectModifiers.length > 0 && (
          <div style={s2.field}>
            <span style={{ ...s2.provLabel, color: 'var(--founder)' }}>Protection context</span>
            <span style={s2.provText}>
              {protectModifiers.join(' ')}
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Stage 2: Leverage ────────────────────────────────────────────── */
function LeverageStage() {
  const { journeyState, updateJourneyState } = useJourney();
  const detectedStacks = journeyState.detectedStacks || [];
  const selectedStalls = journeyState.stalls || [];
  const protections = (journeyState.qualifierAnswers || {}).protect || [];

  const stallsInStacks = useMemo(() => {
    const set = new Set();
    detectedStacks.forEach(s => s.triggers.forEach(t => set.add(t)));
    return set;
  }, [detectedStacks]);

  const unstackedStalls = useMemo(() =>
    selectedStalls.filter(id => !stallsInStacks.has(id)),
    [selectedStalls, stallsInStacks]
  );

  const stackNames = detectedStacks.map(s => s.name);
  const framingLine = detectedStacks.length > 0
    ? `${stackNames.length === 1 ? stackNames[0] : stackNames.slice(0, -1).join(', ') + ' and ' + stackNames[stackNames.length - 1]} — leverage targets the reinforcing logic between stalls, not individual stalls in isolation.`
    : null;

  // Store leverage hypotheses in journey state for Stage 3
  useEffect(() => {
    updateJourneyState({
      leverageHypotheses: detectedStacks.map(s => ({
        stackId: s.id, name: s.name, entry: s.entry,
        effect: s.effect, confidence: s.confidence,
      })),
    });
  }, [detectedStacks]);

  return (
    <div style={s2.container}>
      {/* Framing */}
      {framingLine && <p style={s2.framing}>{framingLine}</p>}

      {/* Stack hypotheses */}
      {detectedStacks.length > 0 ? (
        <div style={s2.section}>
          {detectedStacks.map(stack => (
            <LeverageCard key={stack.id} stack={stack} protections={protections} priority={(journeyState.qualifierAnswers || {}).priority} commentary={(journeyState.stackCommentary || {})[stack.id]} />
          ))}
        </div>
      ) : (
        <div style={s2.emptyBox}>
          <p style={s2.emptyText}>
            No reinforcing stacks detected. Your stalls appear independent — each can be addressed directly.
          </p>
        </div>
      )}

      {/* Structural priorities — unstacked stalls */}
      {unstackedStalls.length > 0 && (
        <div style={s2.priorities}>
          <div style={s2.prioritiesHeader}>Structural priorities</div>
          <p style={s2.prioritiesSub}>
            Stalls not part of a detected stack — addressable independently.
          </p>
          {unstackedStalls.map(id => {
            const stall = STALLS.find(s => s.id === id);
            if (!stall) return null;
            return (
              <div key={id} style={s2.priorityRow}>
                <div style={s2.priorityLeft}>
                  <span style={s2.priorityId}>{id}</span>
                  <span style={s2.priorityName}>{stall.name}</span>
                </div>
                <div style={s2.priorityNote}>{STALL_LEVERAGE[id]}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Empty state — no stalls at all */}
      {selectedStalls.length === 0 && (
        <div style={s2.emptyBox}>
          <p style={s2.emptyText}>
            No stalls were selected in Stage 1. Go back to identify behavioural stalls before generating leverage hypotheses.
          </p>
        </div>
      )}
    </div>
  );
}

    <div style={s1.healthBar}>

/* ─── Configuration description builder ────────────────────────────── */
const PROTECT_LABELS = {
  knowledge:   'local knowledge staying local',
  ip:          'institutional IP and research',
  trust:       'community relationships and trust',
  talent:      'the founder and talent pipeline',
  sovereignty: 'economic sovereignty',
};

const PROTECT_INFRA = {
  knowledge:   'the sovereign data membrane controls what knowledge crosses the cluster edge',
  ip:          'knowledge flow infrastructure ensures research moves between groups without leaking IP',
  trust:       'the sovereign data membrane preserves relationship integrity at the boundary',
  talent:      'the talent pipeline tracker keeps visibility over founders and skills within the ecosystem',
  sovereignty: 'the sovereign data membrane and permissioned access layer protect economic self-determination',
};

function toClusterSlug(name) {
  return name.toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[àáâãäå]/g, 'a').replace(/[èéêë]/g, 'e').replace(/[ìíîï]/g, 'i')
    .replace(/[òóôõö]/g, 'o').replace(/[ùúûü]/g, 'u').replace(/[ñ]/g, 'n')
    .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
}

function articleFor(name) {
  // Words starting with U that sound like "yoo" take "A" not "An"
  if (/^Uni|^Use|^Util|^Usu/i.test(name)) return 'A';
  return /^[AEIOU]/i.test(name) ? 'An' : 'A';
}

function buildConfigDescription(config) {
  const { configName, protections, priorities } = config;
  const article = articleFor(configName);
  const protectNames = (protections || []).map(p => PROTECT_LABELS[p]).filter(Boolean);

  if (protectNames.length === 0) {
    return `${article} ${configName} configuration organises the ecosystem's digital infrastructure around its strategic priority. The architecture prioritises ${priorities.slice(0, 2).map(p => p.name.toLowerCase()).join(' and ')}.`;
  }

  const protectList = protectNames.length === 1
    ? protectNames[0]
    : protectNames.slice(0, -1).join(', ') + ' and ' + protectNames[protectNames.length - 1];

  const infraLinks = (protections || [])
    .map(p => PROTECT_INFRA[p])
    .filter(Boolean)
    .slice(0, 2);
  const infraSentence = infraLinks.length > 0
    ? ` Specifically, ${infraLinks.join(', and ')}.`
    : '';

  return `${article} ${configName} configuration prioritises protecting ${protectList}. The infrastructure recommendations are shaped by these protection priorities — every layer serves the boundary conditions your ecosystem has identified.${infraSentence}`;
}

/* ─── Protection-to-actor mapping for membrane foregrounding ───────── */
/* sovereignty maps to the anchor label dynamically — resolved in MembraneDiagram */
const PROTECT_ACTOR_MAP = {
  knowledge:   'Researchers',
  ip:          'Researchers',
  trust:       'Stewards',
  talent:      'Founders',
};

/* ─── Membrane diagram (SVG) ───────────────────────────────────────── */
function MembraneDiagram({ config }) {
  const { outsideActors, insideActors, clusterType, protections, anchorLabel } = config;
  const protectSet = new Set(protections || []);

  // Dynamic SVG dimensions based on outside actor count
  const outsideCount = outsideActors.length;
  const insideCount = insideActors.length;
  const w = 700, h = 420;
  const cx = w / 2, cy = h / 2;
  const outerR = Math.min(140, (Math.min(w, h) / 2) - 60);

  // Determine which inside actors are foregrounded by Q5
  const foregroundedActors = new Set();
  (protections || []).forEach(p => {
    const actor = PROTECT_ACTOR_MAP[p];
    if (actor) foregroundedActors.add(actor);
  });
  // Sovereignty foregrounds the anchor node (dynamic label)
  if (protectSet.has('sovereignty') && anchorLabel) foregroundedActors.add(anchorLabel);

  // Membrane permeability: tight if 3+ protections, dashed if 1-2
  const tightMembrane = protectSet.size >= 3;

  // Dynamic inside actor positioning — distribute evenly on a radius that fits
  const maxNodeR = 44;
  const insideOrbitR = Math.max(50, outerR - maxNodeR - 14);
  const insidePositions = insideActors.map((name, i) => {
    const angle = (i / insideCount) * Math.PI * 2 - Math.PI / 2;
    const fg = foregroundedActors.has(name);
    return { name, x: cx + Math.cos(angle) * insideOrbitR, y: cy + Math.sin(angle) * insideOrbitR, fg };
  });

  // Dynamic outside actor positioning — consistent distance, evenly spaced
  const outsideOrbitR = outerR + 60;
  const outsideStartAngle = -Math.PI / 4;
  const outsidePositions = outsideActors.map((name, i) => {
    const angle = outsideStartAngle + (i / outsideCount) * Math.PI * 2;
    const x = cx + Math.cos(angle) * outsideOrbitR;
    const y = cy + Math.sin(angle) * outsideOrbitR;
    // Clamp to SVG bounds with label padding
    const clampX = Math.max(100, Math.min(w - 100, x));
    const clampY = Math.max(24, Math.min(h - 20, y));
    return { name, x: clampX, y: clampY };
  });

  const label = clusterType === 'national' ? 'Supercluster boundary' : 'Cluster membrane';

  return (
    <div style={s3.diagramWrap}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', minWidth: '700px', height: 'auto' }}>
        {/* Membrane boundary */}
        <circle cx={cx} cy={cy} r={outerR} fill="none"
          stroke={tightMembrane ? '#b8b0a4' : '#ddd8cf'}
          strokeWidth={tightMembrane ? 2.5 : 1.5}
          strokeDasharray={tightMembrane ? 'none' : '8 4'} />
        {tightMembrane && (
          <circle cx={cx} cy={cy} r={outerR} fill="none"
            stroke="rgba(12,148,136,0.08)" strokeWidth="12" />
        )}
        <text x={cx} y={cy - outerR - 14} textAnchor="middle"
          fill="#8c8780" fontFamily="'Geist Mono', monospace" fontSize="9" letterSpacing="0.1em">
          {label.toUpperCase()}{tightMembrane ? ' — HIGH PROTECTION' : ''}
        </text>

        {/* Inside actors */}
        {insidePositions.map((actor, i) => {
          const r = actor.fg ? 44 : 36;
          return (
            <g key={i}>
              {actor.fg && (
                <circle cx={actor.x} cy={actor.y} r={r + 6} fill="none"
                  stroke="rgba(42,122,79,0.15)" strokeWidth="4" />
              )}
              <circle cx={actor.x} cy={actor.y} r={r}
                fill={actor.fg ? 'rgba(42,122,79,0.06)' : 'rgba(240,236,228,0.9)'}
                stroke={actor.fg ? 'rgba(42,122,79,0.4)' : '#ddd8cf'}
                strokeWidth={actor.fg ? 1.5 : 1.2} />
              <text x={actor.x} y={actor.y + 1} textAnchor="middle" dominantBaseline="middle"
                fill={actor.fg ? '#2a7a4f' : '#5a5650'}
                fontFamily="'Geist', system-ui" fontSize={actor.fg ? 11.5 : 10.5}
                fontWeight={actor.fg ? 500 : 400}>{actor.name}</text>
            </g>
          );
        })}

        {/* Connection lines between inside actors */}
        {insidePositions.map((a, i) =>
          insidePositions.slice(i + 1).map((b, j) => (
            <line key={`${i}-${j}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
              stroke={a.fg && b.fg ? 'rgba(42,122,79,0.2)' : '#ddd8cf'}
              strokeWidth="0.8" strokeDasharray="3 3" opacity="0.5" />
          ))
        )}

        {/* Outside actors */}
        {outsidePositions.map((actor, i) => {
          const angle = Math.atan2(actor.y - cy, actor.x - cx);
          const edgeX = cx + Math.cos(angle) * outerR;
          const edgeY = cy + Math.sin(angle) * outerR;
          return (
            <g key={i}>
              <line x1={edgeX} y1={edgeY} x2={actor.x} y2={actor.y}
                stroke="var(--steward)" strokeWidth="1" strokeDasharray="4 3" opacity="0.5" />
              <circle cx={actor.x} cy={actor.y} r="4" fill="var(--steward)" opacity="0.6" />
              <text x={actor.x + (actor.x > cx ? 10 : -10)} y={actor.y + 1}
                textAnchor={actor.x > cx ? 'start' : 'end'} dominantBaseline="middle"
                fill="var(--steward)" fontFamily="'Geist', system-ui" fontSize="10.5">{actor.name}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

    // TODO: populate from Railway API — field: clusterType, stage

    `The anchor pursued its own interest — finding the best supplier. The supplier pursued its own interest — finding a procurement opportunity. Neither needed a broker. The sovereign database held the capability signals that made the match possible. The procurement decision stayed local.\n\n` +
    `Your sovereign database now holds the record of that transaction. Over time it builds a picture of where local procurement is converting and where it is not. The steward sees value circulation as a measurable signal derived from real transactions — not as an aspiration in a strategy document.`;

  if (stkMediated || (stalls.includes('S5') && stalls.includes('S9'))) {
    // TODO: populate from Railway API — field: anchorType, clusterType, stage
    return `${openArticle} ${stageLabel} ${anchorLabel}-anchored ${clusterType} has a pathway problem that looks like a talent problem. The talent exists. The opportunities exist. But the connection depends on knowing the right person, being in the right room, arriving at the right moment. Most actors never find the pathway. They leave not because there is nothing for them — but because nothing visible tells them where to go.\n\n` +
    // TODO: populate from Railway API — field: stage, clusterType

    `The steward sees the pipeline moving. Not in a report. In the live intelligence picture that makes the next pathway more accurate than the last.`;

/* ─── Provocation builder (3-part: diagnosis, consequence, mechanism) */
function buildProvocation(stepIndex, journeyState, config) {

  const protectLabels = protections.map(p => PROTECT_LABELS[p]).filter(Boolean);
  const protectStr = protectLabels.length > 0
    ? (protectLabels.length === 1 ? protectLabels[0] : protectLabels.slice(0, -1).join(', ') + ' and ' + protectLabels[protectLabels.length - 1])
    : '';

  switch (stepIndex) {

    /* ── STEP 1: Governance & Access ── */
    case 0: {
      const diagnosis = `Your ${clusterLabel} with ${articleFor(anchorLabel).toLowerCase()} ${anchorLabel} anchor operates across multiple institutions with competing accountability structures. Without identity-first governance, coordination defaults to whoever has the most political capital — not whoever has the most relevant capability.`;

      let consequence = '';
      if (stalls.includes('S2')) consequence = 'Coordinating stall means your ecosystem is already producing alignment without accountability — more committees, more MoUs, more consultation with no audit trail.';
      else if (stalls.includes('S9')) consequence = 'Waiting stall means actors are deferring to gatekeepers. Without role-based access that makes pathways visible, deference becomes structural.';

      if (protections.includes('trust')) mechanism += ' Trust structures are preserved through role-based access — openness and confidentiality coexist without leakage.';

      return { diagnosis, consequence, mechanism };

    /* ── STEP 2: Sovereign Ecosystem Database + Bot Network ── */
    case 1: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');

      else if (stalls.includes('S1')) diagnosis = 'Re-proving means your ecosystem validates multiple pathways without letting proof collapse choice — no mechanism forces selection.';

      let consequence = `${articleFor(clusterLabel)} ${clusterLabel} without a sovereign database has no memory. Every new programme starts from zero. Every new steward inherits anecdote rather than evidence. `;

      else if (qa.priority === 'supply') mechanism = 'Actor Matching is your primary engine — identifying supply chain capability across your ecosystem and matching it to anchor procurement signals. No premature disclosure. No cold outreach.';
      else if (qa.priority === 'growth') mechanism = 'Steward Interrogation is your primary engine — live insight into system health, coordination load, and emerging risk. Not retrospective reporting. Adaptive governance.';
      else mechanism = 'All reasoning capabilities active — Journey Construction, Signal Propagation, Role-Aware Reframing, Actor Matching, Stall Detection, Steward Interrogation.';
      mechanism += ' Every actor experience is constructed here, from live data, on demand.';

      return { diagnosis, consequence, mechanism };
    }

    /* ── STEP 6: Application Layer ── */
    case 5: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis = `${stkEvidence.name} is partly a journey failure. Actors produce evidence because that is what the system rewards. Journey infrastructure changes what the system rewards — progress, connection, conversion.`;
      else if (stkMediated) diagnosis = `${stkMediated.name} means actor journeys run through human brokers. Infrastructure replaces the broker with a pathway — the actor pursues their own interest and the system routes them without mediation.`;
      else if (stalls.includes('S9')) diagnosis = 'Waiting stall means actors defer to gatekeepers. Journey infrastructure removes the gatekeeper from the critical path — actors see their next step without waiting for permission.';
      else diagnosis = 'Your actors currently navigate your ecosystem through personal networks and chance encounters. Journey infrastructure makes navigation repeatable — the same quality of pathway for every actor, regardless of who they know.';

      let consequence = '';
      if (qa.priority === 'talent') consequence = 'Without journey infrastructure, talent leaves not because there are no opportunities but because opportunities are invisible. A graduating engineer cannot see a pathway into your ecosystem so they take the visible pathway out of it.';
      else if (qa.priority === 'capital') consequence = 'Without journey infrastructure, investors cannot find credible entry points. They see activity but not momentum. They back ecosystems where the pipeline is legible.';
      else if (qa.priority === 'research') consequence = 'Without journey infrastructure, researchers cannot translate their work into commercial opportunity. They publish, present, and wait. The demand is there — the routing infrastructure is not.';
      else if (qa.priority === 'supply') consequence = 'Without journey infrastructure, supply chain actors cannot find anchor procurement signals. The anchor knows what it needs. The supplier knows what it offers. The matching never happens.';
      else if (qa.priority === 'growth') consequence = 'Without journey infrastructure, economic growth is personality-dependent — it compounds when brokers are active and stalls when they are not. Infrastructure makes growth repeatable.';
      else consequence = 'Without journey infrastructure, participation is unequal. Actors with strong networks navigate well. Actors without them do not. The ecosystem compounds inequality rather than capability.';

      // Mechanism includes cascade cards — return actor list for rendering
      let goalPhrase = 'pursuing their own goals';
      if (qa.priority === 'talent') goalPhrase = 'finding and developing their career';
      else if (qa.priority === 'capital') goalPhrase = 'finding the right investment opportunity';
      else if (qa.priority === 'research') goalPhrase = 'finding commercial applications for their work';
      else if (qa.priority === 'supply') goalPhrase = 'finding anchor procurement opportunities';
      else if (qa.priority === 'growth') goalPhrase = 'finding the conditions for their organisation to grow';

      const mechanism = `Every selfish action feeds the whole. No actor needs to care about the ecosystem. They only need to care about ${goalPhrase}. The platform makes their self-interest productive for the whole.`;

      // Get foregrounded actors for cascade cards
      const fgActors = [];
      const seen = new Set();
      (config.protections || []).forEach(p => {
        const actor = PROTECT_ACTOR_MAP[p];
        if (actor && ACTOR_CASCADES[actor] && !seen.has(actor)) { fgActors.push(actor); seen.add(actor); }
      });
      if (config.anchorLabel && ACTOR_CASCADES[config.anchorLabel] && !seen.has(config.anchorLabel)) { fgActors.push(config.anchorLabel); seen.add(config.anchorLabel); }
      if (!seen.has('Stewards')) fgActors.push('Stewards');
      const cascadeActors = fgActors.slice(0, 3);

      return { diagnosis, consequence, mechanism, cascadeActors };
    }

    /* ── STEP 7: Full Reveal ── */
    case 6: {
      const stallNames = stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; });
      let diagnosis = `You identified ${stalls.length} stall${stalls.length !== 1 ? 's' : ''} — ${stallNames.join(', ')}. `;
      if (stacks.length > 0) {
        const stackNames = stacks.map(s => s.name);
        diagnosis += `Your ecosystem is running ${stackNames.join(', ')}. `;
      } else {
        diagnosis += 'No reinforcing stacks detected — your stalls appear independent. ';
      }
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis += 'Evidence accumulates but never converts — the ecosystem justifies rather than executes.';
      else if (stkIncumbent) diagnosis += 'Value flows through incumbents rather than circulating locally — the ecosystem stabilises rather than compounds.';
      else if (stkMediated) diagnosis += 'Connections depend on brokers rather than forming directly — the ecosystem mediates rather than couples.';
      else if (stacks.length > 0) diagnosis += stacks[0].entry || '';
      else diagnosis += 'Each stall can be addressed independently — no reinforcing combination is locking the system into a single regime.';
      diagnosis += ` ${articleFor(config.configName)} ${config.configName} needs infrastructure that addresses this directly.`;

      let priorityLabel = 'economic growth';
      if (qa.priority === 'talent') priorityLabel = 'talent retention';
      else if (qa.priority === 'capital') priorityLabel = 'investment attraction';
      else if (qa.priority === 'research') priorityLabel = 'research commercialisation';
      else if (qa.priority === 'supply') priorityLabel = 'supply chain development';

      let consequence = `Without this infrastructure, ${priorityLabel} depends on the behaviours your stalls describe — brokerage, narrative, deference, tolerance of failure. `;
      if (protections.includes('knowledge')) consequence += 'The knowledge your ecosystem generates leaves with the people who hold it. ';
      if (protections.includes('ip')) consequence += 'The IP your anchor produces circulates beyond your boundary before it creates local value. ';
      if (protections.includes('trust')) consequence += 'The relationships your ecosystem depends on are invisible to any new actor who joins. ';
      if (protections.includes('talent')) consequence += 'The pipeline you build empties faster than you fill it. ';
      if (protections.includes('sovereignty')) consequence += 'The value your ecosystem creates is captured elsewhere. ';
      consequence += 'Coordination stays a social task rather than an infrastructural one.';

      let mechanism = `Every layer above exists in service of your sovereign ecosystem database — the one regional asset that compounds rather than depletes. ${config.configName} is not a platform you adopt. It is infrastructure you own.`;
      if (protectStr) mechanism += ` ${protectStr} — protected by architecture, not by policy.`;
      mechanism += ' The next step is a Snapshot diagnostic — a structured engagement that validates these findings with your ecosystem\'s actors and configures the platform for your specific context.';

      return { diagnosis, consequence, mechanism, showCTA: true };
    }

    default: return { diagnosis: '', consequence: '', mechanism: '' };
  }
}

function ArchWalkthrough({ journeyState, config, onClose }) {
  const [step, setStep] = useState(0);
  const totalSteps = 7; // 6 layers + final reveal

  const activeTools = useMemo(() => getActiveToolNames(journeyState), [journeyState]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setStep(s => Math.min(s + 1, totalSteps - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setStep(s => Math.max(s - 1, 0)); }
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const isFinal = step === 6;
  const provocation = buildProvocation(step, journeyState, config);

  return (
    <div style={arch.overlay}>
      {/* Close */}
      <button style={arch.closeBtn} onClick={onClose}>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 5L15 15M15 5L5 15" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>

      {/* Step counter */}
      <div style={arch.stepCounter}>{step + 1} of {totalSteps}</div>

      <div style={{
        ...arch.walkthroughLayout,
        gridTemplateColumns: (provocation && provocation.scenario) ? '1fr 600px' : '1fr 340px',
      }}>
        {/* Diagram column — circulation diagram for Step 2 + final, flat layers for others */}
        <div style={arch.diagramCol}>
          {(step === 1 || isFinal) ? (
            <CirculationDiagram journeyState={journeyState} allActive={isFinal} />
          ) : (
            ARCH_LAYERS.map((layer, i) => {
              const layerIndex = i;
              const isActive = layerIndex === step;
              const comps = layer.id === 'mcp' ? activeTools.slice(0, 12) : layer.components;
              return (
                <div key={layer.id} style={{
                  ...arch.layerBox,
                  opacity: isActive ? 1 : 0.15,
                  borderColor: isActive ? 'var(--steward)' : 'var(--dj-border)',
                  filter: isActive ? 'none' : 'blur(0.5px)',
                  transition: 'opacity 0.4s, border-color 0.4s, filter 0.4s',
                }}>
                  <div style={{
                    ...arch.layerTitle,
                    color: isActive ? 'var(--steward)' : 'var(--dj-chalk-muted)',
                  }}>{layer.label}</div>
                  <div style={arch.layerChips}>
                    {comps.map(c => (
                      <span key={c} style={{
                        ...arch.chip,
                        color: isActive ? 'var(--dj-chalk)' : 'var(--dj-chalk-muted)',
                        borderColor: isActive ? 'var(--dj-border)' : 'transparent',
                      }}>{c}</span>
                    ))}
                  </div>
                </div>
              );
            }).reverse()
          )}
        </div>

        {/* Annotation column — split layout for Step 2, single panel for others */}
        {provocation && provocation.scenario ? (
          <div style={arch.annotColSplit}>
            <div style={arch.annotLabel}>
              {ARCH_LAYERS[step].label}
            </div>
            <div style={arch.splitAnnot}>
              {/* Left: scenario story */}
              <div style={arch.splitLeft}>
                {provocation.scenario.split('\n\n').map((para, i) => (
                  <p key={i} style={arch.scenarioText}>{para}</p>
                ))}
              </div>
              {/* Divider */}
              <div style={arch.splitDivider} />
              {/* Right: provocation */}
              <div style={arch.splitRight}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
              </div>
            </div>
          </div>
        ) : (
          <div style={arch.annotCol}>
            <div style={arch.annotLabel}>
              {isFinal ? config.configName : ARCH_LAYERS[step].label}
            </div>

            {provocation && (
              <div style={arch.provocationWrap}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  {provocation.cascadeActors && provocation.cascadeActors.map(name => {
                    const c = ACTOR_CASCADES[name];
                    if (!c) return null;
                    return (
                      <div key={name} style={arch.cascadeCard}>
                        <div style={arch.cascadeActor}>{name}</div>
                        <div style={arch.cascadeRow}>
                          <span style={arch.cascadeStepText}>{c.action}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.signal}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.effect}</span>
                        </div>
                      </div>
                    );
                  })}
                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
                {provocation.showCTA && (
                  <a href="/get-started.html" style={arch.ctaLink}>
                    Talk to us about your configuration
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                      <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </a>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={arch.navRow}>
        <button style={{ ...arch.navBtn, opacity: step > 0 ? 1 : 0.3 }} onClick={() => setStep(s => Math.max(s - 1, 0))} disabled={step === 0}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8L10 12" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button style={{ ...arch.navBtn, opacity: step < totalSteps - 1 ? 1 : 0.3 }} onClick={() => setStep(s => Math.min(s + 1, totalSteps - 1))} disabled={step >= totalSteps - 1}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ─── Qualifier questions (standalone, used between Stage 1 and 2) ── */
function QualifierQuestions({ onComplete }) {
  const { journeyState, updateJourneyState } = useJourney();
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(journeyState.qualifierAnswers || {});
  const [multiSelect, setMultiSelect] = useState(answers.protect || []);

  const q = QUALIFIER_QUESTIONS[currentQ];
  const totalQ = QUALIFIER_QUESTIONS.length;

  const selectSingle = useCallback((qId, value) => {
    const next = { ...answers, [qId]: value };
    setAnswers(next);
    updateJourneyState({ qualifierAnswers: next, osConfig: null });
    if (currentQ < totalQ - 1) {
      setTimeout(() => setCurrentQ(currentQ + 1), 300);
    }
  }, [answers, currentQ, totalQ, updateJourneyState]);

  const toggleMulti = useCallback((value) => {
    setMultiSelect(prev =>
      prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value]
    );
  }, []);

  const submitMulti = useCallback(() => {
    const finalAnswers = { ...answers, protect: multiSelect };
    setAnswers(finalAnswers);
    const config = deriveOSConfig(finalAnswers, journeyState.stalls, journeyState.detectedStacks || []);
    updateJourneyState({ qualifierAnswers: finalAnswers, osConfig: config });
    onComplete();
  }, [answers, multiSelect, journeyState.stalls, journeyState.detectedStacks, updateJourneyState, onComplete]);

  const goBackQ = useCallback(() => {
    if (currentQ > 0) {
      const prevQ = currentQ - 1;
      setCurrentQ(prevQ);
      if (QUALIFIER_QUESTIONS[prevQ].multi) {
        setMultiSelect(answers[QUALIFIER_QUESTIONS[prevQ].id] || []);
      }
    }
  }, [currentQ, answers]);

  return (
    <div style={s3.container}>
      <div style={s3.qProgress}>
        <span style={s3.qProgressLabel}>Question {currentQ + 1} of {totalQ}</span>
        <div style={s3.qProgressTrack}>
          <div style={{ ...s3.qProgressFill, width: `${((currentQ + 1) / totalQ) * 100}%` }} />
        </div>
      </div>

      <h3 style={s3.qText}>{q.question}</h3>
      {q.multi && <p style={s3.qHint}>Select all that apply</p>}

      <div style={s3.optionGrid}>
        {q.options.map(opt => {
          const isSelected = q.multi
            ? multiSelect.includes(opt.value)
            : answers[q.id] === opt.value;
          return (
            <button
              key={opt.value}
              onClick={() => q.multi ? toggleMulti(opt.value) : selectSingle(q.id, opt.value)}
              style={{
                ...s3.optionCard,
                borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                background: isSelected ? 'rgba(12,148,136,0.06)' : 'var(--dj-surface)',
              }}
            >
              <div style={s3.optionHeader}>
                <span style={{
                  ...s3.optionLabel,
                  color: isSelected ? 'var(--dj-chalk)' : 'var(--dj-chalk-dim)',
                }}>{opt.label}</span>
                <div style={{
                  ...s3.optionCheck,
                  borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                  background: isSelected ? 'var(--steward)' : 'transparent',
                  borderRadius: q.multi ? '4px' : '50%',
                }}>
                  {isSelected && (
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 5L4.2 7.2L8 3" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>
              </div>
              {opt.desc && <div style={s3.optionDesc}>{opt.desc}</div>}
            </button>
          );
        })}
      </div>

      {q.multi && (
        <div style={s3.multiActions}>
          <button
            style={{
              ...styles.btnSignal,
              opacity: multiSelect.length > 0 ? 1 : 0.4,
              pointerEvents: multiSelect.length > 0 ? 'auto' : 'none',
            }}
            onClick={submitMulti}
          >
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>

function ArchitectureSchemaSVG({ activeLayer, secondaryLayers, selectedStalls, currentStep }) {
  const pad = 20, w = 900;
  const stallsArr = selectedStalls || [];
  const step = currentStep || 0;
  const active = activeLayer ? new Set(Array.isArray(activeLayer) ? activeLayer : [activeLayer]) : null;
  const secondary = secondaryLayers ? new Set(Array.isArray(secondaryLayers) ? secondaryLayers : [secondaryLayers]) : new Set();

  function layerOpacity(layerId) {
    if (!active) return 1; // no highlighting = all visible
    if (active.has(layerId)) return 1;
    if (secondary.has(layerId)) return 0.4;
    return 0.15;
  }

  return (
    <svg viewBox="0 0 900 720" style={{ width: '100%', height: 'auto', display: 'block' }}>
      {SCHEMA_LAYERS.map(layer => {
        const isSovereign = layer.split;
        const op = layerOpacity(layer.id);
        return (
          <g key={layer.id} style={{ opacity: op, transition: 'opacity 0.4s ease' }}>
            {/* Layer background */}
            <rect x={pad} y={layer.y} width={w - pad * 2} height={layer.h}
              rx="6" fill={isSovereign ? 'rgba(200,240,208,0.15)' : 'var(--dj-surface)'}
              stroke="var(--dj-border)" strokeWidth="1" />
            {/* Layer label */}
            <text x={pad + 12} y={layer.y + 14}
              fill="var(--steward)" fontFamily="'Geist Mono', monospace"
              fontSize="8" fontWeight="600" letterSpacing="0.1em">
              {isSovereign ? '\u2605 ' + layer.label : layer.label}
            </text>

            {/* Components */}
            {!isSovereign && layer.comps && (() => {
              const perRow = layer.cols || layer.comps.length;
              const rows = Math.ceil(layer.comps.length / perRow);
              const cw = (w - pad * 2 - 24) / perRow;
              const totalH = layer.h - 34;
              const rowH = (totalH - (rows - 1) * 4) / rows;
              return layer.comps.map((c, ci) => {
                const col = ci % perRow;
                const row = Math.floor(ci / perRow);
                const cx = pad + 12 + col * cw;
                const cy = layer.y + 24 + row * (rowH + 4);
                return (
                  <g key={c.id}>
                    <rect x={cx} y={cy} width={cw - 4} height={rowH}
                      rx="3" fill="var(--dj-bg)" stroke="var(--dj-border)" strokeWidth="0.8" />
                    <text x={cx + (cw - 4) / 2} y={cy + rowH / 2 + 1}
                      textAnchor="middle" dominantBaseline="middle"
                      fill="var(--dj-chalk-dim)"
                      fontFamily={c.mono ? "'Geist Mono', monospace" : "'Geist', system-ui"}
                      fontSize={c.mono ? '6.5' : '8'}>
                      {c.label}
                    </text>
                  </g>
                );
              });
            })()}

            {/* Split layout for sovereign — sub-categories + bots */}
            {isSovereign && (() => {
              const splitX = pad + 12;
              const totalW = w - pad * 2 - 24;
              const splitW = totalW * 0.65;
              const botX = splitX + splitW + 10;
              const botW = totalW * 0.35 - 10;
              const startY = layer.y + 24;
              const sovH = layer.h - 34;
              const cats = layer.sovereignCategories || [];
              const catCount = cats.length;
              const catH = (sovH - (catCount - 1) * 4) / catCount;
              const botCols = 2;
              const botRows = 2;
              const botCW = (botW - 4) / botCols;
              const botCH = 28;
              return (

                  <rect x={splitX} y={startY} width={splitW} height={sovH}

                  {/* Sub-categories */}
                  {cats.map((cat, ci) => {
                    const catY = startY + 4 + ci * (catH + 4);
                    const pillW = (splitW - 16) / Math.min(cat.items.length, 6);
                    return (
                      <g key={cat.label}>
                        {/* Category label */}
                        <text x={splitX + 8} y={catY + 10}

                        {cat.items.map((item, ii) => {
                          const ix = splitX + 8 + ii * pillW;
                          const iy = catY + 16;
                          const ih = catH - 20;
                          return (
                            <g key={item}>
                              <rect x={ix} y={iy} width={pillW - 3} height={Math.max(ih, 14)}
                                rx="2" fill="var(--dj-bg)" stroke="var(--dj-border)" strokeWidth="0.5" />
                              <text x={ix + (pillW - 3) / 2} y={iy + Math.max(ih, 14) / 2 + 1}
                                textAnchor="middle" dominantBaseline="middle"
                                fill="var(--dj-chalk-dim)" fontFamily="'Geist', system-ui" fontSize="6.5">
                                {item}
                              </text>
                            </g>
                          );
                        })}
                      </g>
                    );
                  })}
                  {/* Bot section */}
                  <rect x={botX} y={startY} width={botW} height={sovH}
                    rx="4" fill="var(--dj-bg)" stroke="var(--dj-border)" strokeWidth="0.8" />
                  <text x={botX + 8} y={startY + 12}
                    fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace"
                    fontSize="6" fontWeight="600" letterSpacing="0.1em">BOT NETWORK</text>
                  {layer.bots.map((c, ci) => {
                    const col = ci % botCols;
                    const row = Math.floor(ci / botCols);
                    const bx = botX + 6 + col * botCW;
                    const by = startY + 22 + row * (botCH + 4);
                    return (
                      <g key={c.id}>
                        <rect x={bx} y={by} width={botCW - 4} height={botCH}
                          rx="2" fill="var(--dj-surface)" stroke="var(--dj-border)" strokeWidth="0.5" />
                        <text x={bx + (botCW - 4) / 2} y={by + botCH / 2 + 1}
                          textAnchor="middle" dominantBaseline="middle"
                          fill="var(--dj-chalk-dim)" fontFamily="'Geist', system-ui" fontSize="6.5">
                          {c.label}
                        </text>
                      </g>
                    );
                  })}
                </React.Fragment>
              );
            })()}
          </g>
        );

      {/* Flow arrows */}

      </defs>
      {(() => {
        const arrows = [];
        const cx = w / 2;
        const arrowStyle = (visible) => ({
          opacity: visible ? 1 : 0, transition: 'opacity 0.3s',

        // Step 3: External Data → Sovereign Database
        const s3vis = step === 3 || step === 8;

            <path className={s3vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${cx+80} 570 L ${cx+80} 552`} fill="none" stroke="#7dd3c8" strokeWidth="2" markerEnd="url(#arrow-teal)" opacity={step === 8 ? 0.4 : 1} />
            {step === 3 && <text x={cx} y="565" textAnchor="middle" fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace" fontSize="8">Cold-start feed</text>}
          </g>
        );

        // Step 4: Bots → Sovereign (within sovereign layer)
        const s4vis = step === 4 || step === 8;
        arrows.push(
          <g key="arrow-bot-sov" style={arrowStyle(s4vis)}>
            <path className={s4vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${cx+200} 440 Q ${cx+100} 420 ${cx+50} 400`} fill="none" stroke="#7dd3c8" strokeWidth="2" markerEnd="url(#arrow-teal)" opacity={step === 8 ? 0.4 : 1} />
            {step === 4 && <text x={cx+150} y="415" textAnchor="middle" fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace" fontSize="8">Continuous enrichment</text>}
          </g>
        );

        // Step 5: Sovereign ↔ MCP (bidirectional)
        const s5vis = step === 5 || step === 8;
        arrows.push(
          <g key="arrow-sov-mcp" style={arrowStyle(s5vis)}>
            <path className={s5vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${cx} 340 L ${cx} 322`} fill="none" stroke="#7dd3c8" strokeWidth="2" markerEnd="url(#arrow-teal)" markerStart="url(#arrow-teal)" opacity={step === 8 ? 0.4 : 1} />
            {step === 5 && <text x={cx+70} y="334" fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace" fontSize="8">Live queries ↔ findings</text>}
          </g>
        );

        // Step 6: MCP ↔ AI (bidirectional)
        const s6vis = step === 6 || step === 8;
        arrows.push(
          <g key="arrow-mcp-ai" style={arrowStyle(s6vis)}>
            <path className={s6vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${cx} 220 L ${cx} 202`} fill="none" stroke="#7dd3c8" strokeWidth="2" markerEnd="url(#arrow-teal)" markerStart="url(#arrow-teal)" opacity={step === 8 ? 0.4 : 1} />
            {step === 6 && <text x={cx+70} y="214" fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace" fontSize="8">Findings ↔ intelligence</text>}

        );

        // Step 7: AI ↔ Journeys (bidirectional) + return loop
        const s7vis = step === 7 || step === 8;
        arrows.push(
          <g key="arrow-ai-journeys" style={arrowStyle(s7vis)}>
            <path className={s7vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${cx} 120 L ${cx} 102`} fill="none" stroke="#7dd3c8" strokeWidth="2" markerEnd="url(#arrow-teal)" markerStart="url(#arrow-teal)" opacity={step === 8 ? 0.4 : 1} />
            {step === 7 && <text x={cx+80} y="114" fill="var(--dj-chalk-muted)" fontFamily="'Geist Mono', monospace" fontSize="8">Pathways ↔ signals</text>}
          </g>
        );
        // Return arrow: journeys → sovereign (down right edge)
        arrows.push(
          <g key="arrow-return" style={arrowStyle(s7vis)}>
            <path className={s7vis && step !== 8 ? 'flow-arrow' : ''} d={`M ${w-pad-10} 100 Q ${w-pad+50} 220 ${w-pad-10} 340`} fill="none" stroke="#c8f0d0" strokeWidth="3" markerEnd="url(#arrow-green)" opacity={step === 8 ? 0.4 : 0.9} />
            {step === 7 && <text x={w-pad+20} y="220" fill="#2a7a4f" fontFamily="'Geist Mono', monospace" fontSize="8" textAnchor="start">Signal loop closes</text>}
          </g>
        );

        // Step 2 governance: pulse the governance boundary
        if (step === 2) {
          arrows.push(
            <rect key="gov-pulse" x={pad} y={650} width={w - pad * 2} height={50} rx="6" fill="none" stroke="var(--steward)" strokeWidth="2.5" strokeDasharray="8 4">
              <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
            </rect>
          );
        }

        return arrows;
      })()}

      {/* Stall tags on layers */}
      {(() => {
        const tagsByLayer = {};
        stallsArr.forEach(stallId => {
          const layerId = STALL_LAYER_MAP[stallId];
          if (!layerId) return;
          const stall = STALLS.find(s => s.id === stallId);
          if (!stall) return;
          if (!tagsByLayer[layerId]) tagsByLayer[layerId] = [];
          tagsByLayer[layerId].push({ id: stallId, name: stall.name });
        });
        return Object.entries(tagsByLayer).map(([layerId, tags]) => {
          const layer = SCHEMA_LAYERS.find(l => l.id === layerId);
          if (!layer) return null;
          const tagX = w - pad - 8;
          return tags.map((tag, ti) => {
            const tagY = layer.y + 6 + ti * 14;
            const label = `Addresses ${tag.id} ${tag.name}`;
            const isLayerActive = active && active.has(layerId);
            return (
              <g key={tag.id}>
                <rect x={tagX - 120} y={tagY} width="120" height="12" rx="6"
                  fill="#f5d97a" opacity="0.9">
