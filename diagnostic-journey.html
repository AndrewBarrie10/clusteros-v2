<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic Journey — ClusterOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #09101f;
  --surface: #111c2e;
  --border:  #1e2f45;
  --chalk:   #e8edf5;
  --chalk-dim: #8a95a8;
  --chalk-muted: #576275;
  --signal:  #c8f0d0;
  --amber:   #f5d97a;
  --teal:    #7dd3c8;
  --danger:  #f08080;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'Geist', system-ui, -apple-system, sans-serif;
  --font-mono:  'Geist Mono', monospace;
}

html { background: var(--bg); color: var(--chalk); font-family: var(--font-sans); }
body { min-height: 100vh; }
#root { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useCallback, useMemo, createContext, useContext } = React;

/* ─── Stage definitions ────────────────────────────────────────────── */
const STAGES = [
  { id: 'behaviours', label: 'Behaviours',  subtitle: 'Stall identification & stack detection' },
  { id: 'leverage',   label: 'Leverage',     subtitle: 'Intervention hypotheses' },
  { id: 'digital-os', label: 'Digital OS',   subtitle: 'Architecture recommendation' },
];

/* ─── Journey context (state carried forward across stages) ────────── */
const JourneyContext = createContext(null);

function useJourney() {
  const ctx = useContext(JourneyContext);
  if (!ctx) throw new Error('useJourney must be used within JourneyProvider');
  return ctx;
}

/* ─── Step indicator ───────────────────────────────────────────────── */
function StepIndicator({ current, completedUpTo }) {
  return (
    <div style={styles.stepBar}>
      {STAGES.map((stage, i) => {
        const isActive    = i === current;
        const isCompleted = i < completedUpTo;
        const isReachable = i <= completedUpTo;
        return (
          <React.Fragment key={stage.id}>
            {i > 0 && (
              <div style={{
                ...styles.connector,
                background: isReachable ? 'var(--teal)' : 'var(--border)',
              }} />
            )}
            <div style={styles.stepNode}>
              <div style={{
                ...styles.stepDot,
                background: isActive ? 'var(--signal)' : isCompleted ? 'var(--teal)' : 'var(--border)',
                boxShadow: isActive ? '0 0 0 4px rgba(200,240,208,0.2)' : 'none',
              }}>
                {isCompleted ? (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2.5 6L5 8.5L9.5 3.5" stroke="var(--bg)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : (
                  <span style={{
                    fontFamily: 'var(--font-mono)',
                    fontSize: '11px',
                    fontWeight: 600,
                    color: isActive ? 'var(--bg)' : 'var(--chalk-muted)',
                  }}>{i + 1}</span>
                )}
              </div>
              <div style={{ marginTop: '8px', textAlign: 'center' }}>
                <div style={{
                  fontFamily: 'var(--font-mono)',
                  fontSize: '10px',
                  fontWeight: 600,
                  letterSpacing: '0.1em',
                  textTransform: 'uppercase',
                  color: isActive ? 'var(--chalk)' : isCompleted ? 'var(--teal)' : 'var(--chalk-muted)',
                  marginBottom: '2px',
                }}>{stage.label}</div>
                <div style={{
                  fontFamily: 'var(--font-sans)',
                  fontSize: '11px',
                  color: 'var(--chalk-muted)',
                  maxWidth: '140px',
                }}>{stage.subtitle}</div>
              </div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ─── Stage placeholder ────────────────────────────────────────────── */
function StagePlaceholder({ stage }) {
  return (
    <div style={styles.stageContainer}>
      <h2 style={styles.stageHeading}>
        Stage {STAGES.findIndex(s => s.id === stage.id) + 1}: {stage.label}
      </h2>
      <p style={styles.stageSubtitle}>{stage.subtitle}</p>
      <div style={styles.placeholderBox}>
        <span style={styles.placeholderLabel}>Stage content</span>
        <span style={styles.placeholderHint}>Not yet implemented</span>
      </div>
    </div>
  );
}

/* ─── Exit confirmation modal ──────────────────────────────────────── */
function ExitModal({ stage, onConfirm, onCancel }) {
  return (
    <div style={styles.modalOverlay} onClick={onCancel}>
      <div style={styles.modal} onClick={e => e.stopPropagation()}>
        <h3 style={styles.modalTitle}>Stop after {stage.label}?</h3>
        <p style={styles.modalBody}>
          Your selections so far will be preserved. You can return and continue later.
        </p>
        <div style={styles.modalActions}>
          <button style={styles.btnGhost} onClick={onCancel}>Continue journey</button>
          <button style={styles.btnAmber} onClick={onConfirm}>Stop here</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Summary screen (shown after exit) ────────────────────────────── */
function ExitSummary({ exitedAt, journeyState }) {
  const stageLabel = STAGES[exitedAt].label;
  const { stalls, stacks } = journeyState;
  return (
    <div style={styles.summaryContainer}>
      <div style={styles.summaryCard}>
        <div style={styles.summaryBadge}>Journey paused</div>
        <h2 style={styles.summaryHeading}>
          Completed through: {stageLabel}
        </h2>
        <div style={styles.summarySection}>
          <div style={styles.summaryLabel}>Stalls identified</div>
          <div style={styles.summaryValue}>
            {stalls.length > 0 ? stalls.join(', ') : 'None yet'}
          </div>
        </div>
        <div style={styles.summarySection}>
          <div style={styles.summaryLabel}>Stacks detected</div>
          <div style={styles.summaryValue}>
            {stacks.length > 0 ? stacks.join(', ') : 'None yet'}
          </div>
        </div>
        {exitedAt < STAGES.length - 1 && (
          <div style={styles.summarySection}>
            <div style={styles.summaryLabel}>Stages remaining</div>
            <div style={styles.summaryValue}>
              {STAGES.slice(exitedAt + 1).map(s => s.label).join(', ')}
            </div>
          </div>
        )}
        <button
          style={{ ...styles.btnSignal, marginTop: '24px', width: '100%' }}
          onClick={() => window.location.reload()}
        >
          Start new journey
        </button>
      </div>
    </div>
  );
}

/* ─── Main app ─────────────────────────────────────────────────────── */
function DiagnosticJourney() {
  const [currentStage, setCurrentStage]   = useState(0);
  const [completedUpTo, setCompletedUpTo] = useState(0);
  const [showExitModal, setShowExitModal] = useState(false);
  const [exited, setExited]               = useState(false);
  const [exitedAt, setExitedAt]           = useState(null);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],           // selected stall IDs from Stage 1
    stacks: [],           // detected stack names from Stage 1
    leverageHypotheses: [],  // generated in Stage 2
    osConfig: null,          // generated in Stage 3
  });

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => ({ ...prev, ...patch }));
  }, []);

  /* ── Navigation ── */
  const goNext = useCallback(() => {
    const next = currentStage + 1;
    if (next < STAGES.length) {
      setCompletedUpTo(prev => Math.max(prev, next));
      setCurrentStage(next);
    }
  }, [currentStage]);

  const goBack = useCallback(() => {
    if (currentStage > 0) setCurrentStage(currentStage - 1);
  }, [currentStage]);

  const requestExit = useCallback(() => {
    setShowExitModal(true);
  }, []);

  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    setExitedAt(currentStage);
    setExited(true);
  }, [currentStage]);

  const cancelExit = useCallback(() => {
    setShowExitModal(false);
  }, []);

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage    = STAGES[currentStage];
  const isFirst  = currentStage === 0;
  const isLast   = currentStage === STAGES.length - 1;

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Header ── */}
        <header style={styles.header}>
          <a href="/" style={styles.logo}>
            Cluster<span>OS</span>
          </a>
          <div style={styles.headerLabel}>Diagnostic Journey</div>
        </header>

        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          <StagePlaceholder stage={stage} />
        </main>

        {/* ── Navigation bar ── */}
        <nav style={styles.navBar}>
          <div style={styles.navLeft}>
            {!isFirst && (
              <button style={styles.btnGhost} onClick={goBack}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                  <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Back
              </button>
            )}
          </div>
          <div style={styles.navCenter}>
            <button style={styles.btnExit} onClick={requestExit}>
              Stop here
            </button>
          </div>
          <div style={styles.navRight}>
            {!isLast ? (
              <button style={styles.btnSignal} onClick={goNext}>
                Continue
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                  <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            ) : (
              <button style={styles.btnSignal} onClick={goNext}>
                Finish
              </button>
            )}
          </div>
        </nav>

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}

/* ─── Styles ───────────────────────────────────────────────────────── */
const styles = {
  /* Shell */
  shell: {
    display: 'flex',
    flexDirection: 'column',
    minHeight: '100vh',
    background: 'var(--bg)',
  },

  /* Header */
  header: {
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    padding: '0 32px',
    height: '56px',
    borderBottom: '1px solid var(--border)',
    background: 'rgba(9,16,31,0.95)',
    backdropFilter: 'blur(12px)',
    flexShrink: 0,
  },
  logo: {
    fontFamily: 'var(--font-serif)',
    fontSize: '18px',
    color: 'var(--chalk)',
    textDecoration: 'none',
    letterSpacing: '-0.01em',
  },
  headerLabel: {
    fontFamily: 'var(--font-mono)',
    fontSize: '10px',
    fontWeight: 600,
    letterSpacing: '0.12em',
    textTransform: 'uppercase',
    color: 'var(--chalk-muted)',
  },

  /* Step indicator */
  stepBar: {
    display: 'flex',
    alignItems: 'flex-start',
    justifyContent: 'center',
    padding: '32px 32px 24px',
    gap: '0',
    flexShrink: 0,
  },
  stepNode: {
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    minWidth: '120px',
  },
  stepDot: {
    width: '28px',
    height: '28px',
    borderRadius: '50%',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    transition: 'all 0.3s ease',
  },
  connector: {
    width: '64px',
    height: '2px',
    marginTop: '13px',
    borderRadius: '1px',
    transition: 'background 0.3s ease',
    flexShrink: 0,
  },

  /* Main content area */
  main: {
    flex: 1,
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    padding: '24px 32px 32px',
  },

  /* Stage placeholder */
  stageContainer: {
    width: '100%',
    maxWidth: '640px',
  },
  stageHeading: {
    fontFamily: 'var(--font-serif)',
    fontSize: '32px',
    fontWeight: 400,
    color: 'var(--chalk)',
    marginBottom: '6px',
    letterSpacing: '-0.01em',
  },
  stageSubtitle: {
    fontFamily: 'var(--font-sans)',
    fontSize: '14px',
    color: 'var(--chalk-dim)',
    marginBottom: '32px',
  },
  placeholderBox: {
    border: '1px dashed var(--border)',
    borderRadius: '8px',
    padding: '64px 32px',
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    gap: '8px',
    background: 'var(--surface)',
  },
  placeholderLabel: {
    fontFamily: 'var(--font-mono)',
    fontSize: '12px',
    fontWeight: 600,
    letterSpacing: '0.08em',
    textTransform: 'uppercase',
    color: 'var(--chalk-muted)',
  },
  placeholderHint: {
    fontFamily: 'var(--font-sans)',
    fontSize: '13px',
    color: 'var(--chalk-muted)',
    opacity: 0.6,
  },

  /* Navigation bar */
  navBar: {
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    padding: '16px 32px',
    borderTop: '1px solid var(--border)',
    background: 'var(--surface)',
    flexShrink: 0,
  },
  navLeft:   { flex: 1, display: 'flex', justifyContent: 'flex-start' },
  navCenter: { flex: 1, display: 'flex', justifyContent: 'center' },
  navRight:  { flex: 1, display: 'flex', justifyContent: 'flex-end' },

  /* Buttons */
  btnSignal: {
    fontFamily: 'var(--font-mono)',
    fontSize: '12px',
    fontWeight: 600,
    letterSpacing: '0.04em',
    color: 'var(--bg)',
    background: 'var(--signal)',
    border: 'none',
    borderRadius: '4px',
    padding: '10px 24px',
    cursor: 'pointer',
    display: 'flex',
    alignItems: 'center',
    transition: 'opacity 0.2s',
  },
  btnGhost: {
    fontFamily: 'var(--font-mono)',
    fontSize: '12px',
    fontWeight: 500,
    letterSpacing: '0.04em',
    color: 'var(--chalk-dim)',
    background: 'transparent',
    border: '1px solid var(--border)',
    borderRadius: '4px',
    padding: '10px 20px',
    cursor: 'pointer',
    display: 'flex',
    alignItems: 'center',
    transition: 'border-color 0.2s, color 0.2s',
  },
  btnExit: {
    fontFamily: 'var(--font-mono)',
    fontSize: '11px',
    fontWeight: 500,
    letterSpacing: '0.06em',
    textTransform: 'uppercase',
    color: 'var(--amber)',
    background: 'transparent',
    border: '1px solid rgba(245,217,122,0.25)',
    borderRadius: '4px',
    padding: '8px 18px',
    cursor: 'pointer',
    transition: 'border-color 0.2s, background 0.2s',
  },
  btnAmber: {
    fontFamily: 'var(--font-mono)',
    fontSize: '12px',
    fontWeight: 600,
    letterSpacing: '0.04em',
    color: 'var(--bg)',
    background: 'var(--amber)',
    border: 'none',
    borderRadius: '4px',
    padding: '10px 24px',
    cursor: 'pointer',
    transition: 'opacity 0.2s',
  },

  /* Exit modal */
  modalOverlay: {
    position: 'fixed',
    inset: 0,
    background: 'rgba(9,16,31,0.85)',
    backdropFilter: 'blur(4px)',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    zIndex: 1000,
  },
  modal: {
    background: 'var(--surface)',
    border: '1px solid var(--border)',
    borderRadius: '12px',
    padding: '32px',
    maxWidth: '420px',
    width: '90%',
  },
  modalTitle: {
    fontFamily: 'var(--font-serif)',
    fontSize: '22px',
    fontWeight: 400,
    color: 'var(--chalk)',
    marginBottom: '12px',
  },
  modalBody: {
    fontFamily: 'var(--font-sans)',
    fontSize: '14px',
    color: 'var(--chalk-dim)',
    lineHeight: 1.6,
    marginBottom: '24px',
  },
  modalActions: {
    display: 'flex',
    gap: '12px',
    justifyContent: 'flex-end',
  },

  /* Exit summary */
  summaryContainer: {
    minHeight: '100vh',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    padding: '32px',
    background: 'var(--bg)',
  },
  summaryCard: {
    background: 'var(--surface)',
    border: '1px solid var(--border)',
    borderRadius: '12px',
    padding: '40px',
    maxWidth: '480px',
    width: '100%',
  },
  summaryBadge: {
    fontFamily: 'var(--font-mono)',
    fontSize: '10px',
    fontWeight: 600,
    letterSpacing: '0.12em',
    textTransform: 'uppercase',
    color: 'var(--amber)',
    background: 'rgba(245,217,122,0.1)',
    border: '1px solid rgba(245,217,122,0.2)',
    borderRadius: '3px',
    padding: '4px 10px',
    display: 'inline-block',
    marginBottom: '16px',
  },
  summaryHeading: {
    fontFamily: 'var(--font-serif)',
    fontSize: '26px',
    fontWeight: 400,
    color: 'var(--chalk)',
    marginBottom: '24px',
    lineHeight: 1.3,
  },
  summarySection: {
    padding: '12px 0',
    borderTop: '1px solid var(--border)',
  },
  summaryLabel: {
    fontFamily: 'var(--font-mono)',
    fontSize: '10px',
    fontWeight: 600,
    letterSpacing: '0.1em',
    textTransform: 'uppercase',
    color: 'var(--chalk-muted)',
    marginBottom: '4px',
  },
  summaryValue: {
    fontFamily: 'var(--font-sans)',
    fontSize: '14px',
    color: 'var(--chalk-dim)',
  },
};

/* ─── Mount ────────────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DiagnosticJourney />);
</script>
</body>
</html>
