/* ─── Stall-to-layer mapping for tags ──────────────────────────────── */
const STALL_LAYER_MAP = {
  S1: 'layer-mcp',        S2: 'layer-journeys',   S3: 'layer-governance',
  S4: 'layer-governance',  S5: 'layer-journeys',   S6: 'layer-sovereign',
  S7: 'layer-sovereign',   S8: 'layer-sovereign',  S9: 'layer-journeys',
};

/* ─── Schema stepper annotation builder ─────────────────────────────── */
const STEP_CONFIG = [
  { active: null, secondary: null, nav: [null, 'Start with the heart →'] },                                    // 0: full schema
  { active: 'layer-sovereign', secondary: null, nav: ['← Back', 'Next: the boundary →'] },                     // 1: sovereign
  { active: 'layer-governance', secondary: 'layer-sovereign', nav: ['← The heart', 'Next: what feeds it →'] },  // 2: governance
  { active: 'layer-external', secondary: 'layer-sovereign', nav: ['← Governance', 'Next: continuous enrichment →'] }, // 3: external
  { active: 'layer-sovereign', secondary: null, nav: ['← External data', 'Next: how it thinks →'], botFocus: true }, // 4: bots
  { active: 'layer-mcp', secondary: 'layer-sovereign', nav: ['← Bots', 'Next: the runtime →'] },               // 5: MCP
  { active: 'layer-ai', secondary: ['layer-mcp', 'layer-sovereign'], nav: ['← Intelligence', 'Next: actor journeys →'] }, // 6: AI
  { active: 'layer-journeys', secondary: 'layer-ai', nav: ['← AI engine', 'Next: your sovereign boundary →'] }, // 7: journeys
  { active: null, secondary: null, allActive: true, nav: ['← Actor journeys', null] },                          // 8: reveal
];
const TOTAL_STEPS = STEP_CONFIG.length;

function buildStepAnnotation(step, journeyState, config) {
  const qa = journeyState.qualifierAnswers || {};
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'your ecosystem';
  const anchorLabel = config.anchorLabel || 'Anchors';
  const protections = (qa.protect || []).map(p => PROTECT_LABELS[p]).filter(Boolean);
  const protectStr = protections.length > 0
    ? (protections.length === 1 ? protections[0] : protections.slice(0, -1).join(', ') + ' and ' + protections[protections.length - 1])
    : '';

  switch (step) {
    case 1: {
      let body = `The heart of your ${config.configName}. This sovereign database holds everything your ${clusterLabel} knows — structured around five domains. `;
      body += `Structure tracks your ${clusterLabel} hierarchy from supercluster down to individual pathways and events. `;
      body += `Actors holds profiles for every participant including your ${anchorLabel} anchor, with journey states that show where each actor is and where they are heading. `;
      if (stacks.length > 0) body += `Intelligence holds the stall records and leverage hypotheses your diagnostic has already identified — ${stacks[0].name} is recorded here as a structural finding, not an anecdote. `;
      else if (stalls.length > 0) body += `Intelligence holds the stall records your diagnostic has identified — ${stalls.length} behavioural patterns recorded as structural findings, not anecdotes. `;
      body += 'Signals tracks what the system is reading in real time — behavioural patterns, health scores, pipeline formation.';
      return { title: `The heart of your ${config.configName}`, body };
    }
    case 2: {
      let body = '';
      if (stalls.includes('S4') || stalls.includes('S6'))
        body = 'Incumbent Lock requires governance infrastructure that makes value circulation enforceable — the audit trail records what flows across the boundary and under what terms.';
      else if (stalls.includes('S2'))
        body = 'Coordinating stall means alignment without accountability — identity-first governance changes this. Every actor, every action, fully auditable.';
      else
        body = 'Identity-first governance at every level — Supercluster \u2192 Cluster \u2192 Group \u2192 Actor. Every actor holds one system identity. Permissions are explicit, inherited, and auditable.';
      if ((qa.protect || []).includes('sovereignty'))
        body += ` Economic sovereignty is enforced at the governance layer — no data leaves the ${clusterLabel} boundary without consent recorded here.`;
      return { title: 'The boundary that protects it', body };
    }
    case 3: {
      const GAP_DESC = {
        discovery: 'Your coordination gap is discovery — actors can\'t find each other. The Govt Support Directory surfaces programme listings and funding routes so actors find support before any human broker is involved.',
        flow: 'Your coordination gap is knowledge flow — intelligence doesn\'t reach the actors who need it. The Community Services API makes knowledge outside institutional boundaries visible inside them.',
        access: 'Your coordination gap is membrane permeability — outside actors can\'t engage. Publication Databases give investors and partners credible entry points through research rather than cold outreach.',
        conversion: 'Your coordination gap is conversion — activity doesn\'t become outcomes. Professional Identity makes conversion visible by giving actors persistent, enrichable identities.',
      };
      const body = (GAP_DESC[qa.gap] || 'External data feeds your ecosystem before any actor joins — solving the cold-start problem so new actors see a populated ecosystem from day one.') +
        ' All external data lives at the supercluster level — available to every cluster, never duplicated.';
      return { title: 'What feeds your ecosystem before any actor joins', body };
    }
    case 4: {
      let body = 'Four autonomous bots write structured signals into your sovereign database continuously. ';
      if (stalls.includes('S1') || stalls.includes('S7')) body += 'Evidence Ingestion Bot is critical for your configuration — it structures incoming evidence so it informs decisions rather than accumulating as justification. ';
      if (stalls.includes('S8') || stalls.includes('S9')) body += 'Signal Monitoring Bot detects when activity grows without conversion — essential given your stall pattern. ';
      if (stalls.includes('S2') || stalls.includes('S5')) body += 'Actor Enrichment Bot enriches profiles from system behaviour rather than self-report — breaking dependency on brokered introductions. ';
      body += 'Health Monitoring Bot tracks system health across all clusters continuously. Cold-start solved: the platform knows the ecosystem before any actor joins.';
      return { title: 'Continuous enrichment', body };
    }
    case 5: {
      const tools = getActiveToolNames(journeyState);
      let body = `Each tool is a structured call from the AI to your live sovereign database. Active for your configuration: ${tools.slice(0, 6).join(', ')}. `;
      if (stacks.length > 0) body += `These tools detect ${stacks[0].name} and surface the leverage entry point — intelligence assembled at runtime, not pre-baked.`;
      else body += 'Intelligence assembled at runtime — not pre-baked, not static.';
      return { title: 'How your ecosystem thinks', body };
    }
    case 6: {
      const PRI_ENGINE = {
        talent: 'Journey Construction is your primary engine — personalised pathways for every actor.',
        capital: 'Signal Propagation is your primary engine — surfacing pipeline formation to external capital.',
        research: 'Role-Aware Reframing is your primary engine — translating research into commercial language.',
        supply: 'Actor Matching is your primary engine — mapping supply chain capability to procurement signals.',
        growth: 'Steward Interrogation is your primary engine — live insight into system health.',
      };
      let body = 'The AI is the runtime, not a feature. ' + (PRI_ENGINE[qa.priority] || 'All reasoning capabilities active.') + ' Every actor experience is constructed here, from live data, on demand.';
      body += ' The AI reads signals for every actor type — but for stewards it surfaces something different: not a pathway, but a system health briefing. What is moving. What is stalling. Where intervention would have the most effect. Adaptive governance, not retrospective reporting.';
      return { title: 'The runtime, not a feature', body };
    }
    case 7: {
      const fgActors = [];
      const seen = new Set();
      (qa.protect || []).forEach(p => {
        const actor = PROTECT_ACTOR_MAP[p];
        if (actor && ACTOR_CASCADES[actor] && !seen.has(actor)) { fgActors.push(actor); seen.add(actor); }
      });
      if (config.anchorLabel && ACTOR_CASCADES[config.anchorLabel] && !seen.has(config.anchorLabel)) { fgActors.push(config.anchorLabel); seen.add(config.anchorLabel); }
      if (!seen.has('Stewards')) fgActors.push('Stewards');
      return { title: 'What your actors experience', body: null, cascadeActors: fgActors.slice(0, 3) };
    }
    case 8: {
      let body = `Your sovereign boundary — ${config.configName}. Not a platform you adopt. Infrastructure you own.`;
      if (protectStr) body += ` ${protectStr} — protected by architecture, not by policy.`;
      body += ' The next step is a Snapshot diagnostic — a structured engagement that validates these findings with your ecosystem\'s actors.';
      return { title: config.configName, body, showCTA: true };
    }
    default: return null;
  }
}

/* ─── Stage 3: Digital OS (recommendation only, qualifiers moved) ── */
function DigitalOSStage() {
  const { journeyState, updateJourneyState } = useJourney();

  // Compute osConfig if qualifierAnswers exist but osConfig doesn't
  useEffect(() => {
    if (journeyState.qualifierAnswers && Object.keys(journeyState.qualifierAnswers).length > 0 && !journeyState.osConfig) {
      const config = deriveOSConfig(journeyState.qualifierAnswers, journeyState.stalls, journeyState.detectedStacks || []);
      updateJourneyState({ osConfig: config });
    }
  }, [journeyState.qualifierAnswers, journeyState.osConfig, journeyState.stalls, journeyState.detectedStacks, updateJourneyState]);

  const [schemaStep, setSchemaStep] = useState(-1);

  const reviseFromStart = useCallback(() => {
    setSchemaStep(-1);
    updateJourneyState({ osConfig: null, qualifierAnswers: {}, _reviseQualifiers: true });
  }, [updateJourneyState]);

  if (!journeyState.osConfig) {
    return (
      <div style={s3.container}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', color: 'var(--dj-chalk-muted)' }}>
          Computing your configuration...
        </span>
      </div>
    );
  }

  const config = journeyState.osConfig;

  // Overview — config summary + dense schema + Start button
  if (schemaStep === -1) {
    return (
      <div style={s3.containerWide}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
          <div style={s3.configBadge}>Your configuration</div>
          <button style={styles.btnGhost} onClick={reviseFromStart}>Revise answers</button>
        </div>
        <h2 style={s3.configName}>{config.configName}</h2>
        <p style={s3.configSummary}>
          Based on {journeyState.stalls.length} behavioural stall{journeyState.stalls.length !== 1 ? 's' : ''},{' '}
          {(journeyState.detectedStacks || []).length} reinforcing stack{(journeyState.detectedStacks || []).length !== 1 ? 's' : ''},{' '}
          and your qualifier responses.
        </p>
        <p style={s3.configDescription}>{buildConfigDescription(config)}</p>
        <div style={s3.section}>
          <InfrastructureDiagramEmbed />
          <p style={schema.orientation}>
            This is ClusterOS fully deployed — the complete digital and cognitive infrastructure for a regional operating system.
            Over the next steps we will show you which parts matter most for your {CLUSTER_TYPE_LABELS[(journeyState.qualifierAnswers || {}).clusterType] || 'ecosystem'} and why, starting with the heart of the system.
          </p>
          <button style={styles.btnSignal} onClick={() => setSchemaStep(0)}>
            Show me my configuration
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Stepper — steps 0-7
  const stepCfg = STEP_CONFIG[schemaStep] || STEP_CONFIG[0];
  const annotation = schemaStep > 0 ? buildStepAnnotation(schemaStep, journeyState, config) : null;

  return (
    <div style={s3.containerWide}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div style={s3.configBadge}>{config.configName}</div>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', color: 'var(--dj-chalk-muted)', letterSpacing: '0.08em' }}>
            Step {schemaStep + 1} of {TOTAL_STEPS}
          </span>
          <button style={styles.btnGhost} onClick={() => setSchemaStep(-1)}>Back to overview</button>
        </div>
      </div>

      {/* SVG schema with layer highlighting */}
      <div className="schema-desktop">
        <ArchitectureSchemaSVG
          activeLayer={stepCfg.allActive ? SCHEMA_LAYERS.map(l => l.id) : stepCfg.active}
          secondaryLayers={stepCfg.secondary}
          selectedStalls={journeyState.stalls}
          currentStep={schemaStep}
        />
      </div>
      <div className="schema-mobile">
        <ArchitectureSchemaCards selectedStalls={journeyState.stalls} />
      </div>

      {/* Step 0: full schema label */}
      {schemaStep === 0 && (
        <div style={{ textAlign: 'center', padding: '16px 0' }}>
          <p style={{ fontFamily: 'var(--font-serif)', fontSize: '16px', color: 'var(--dj-chalk)', marginBottom: '16px' }}>
            This is ClusterOS fully deployed. Every layer exists in service of your sovereign ecosystem.
          </p>
          <button style={styles.btnSignal} onClick={() => setSchemaStep(1)}>
            Start with the heart
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      )}

      {/* Annotation panel (steps 1-7) */}
      {annotation && (
        <div style={schema.annotPanel}>
          <h3 style={schema.annotTitle}>{annotation.title}</h3>
          {annotation.body && <p style={schema.annotBody}>{annotation.body}</p>}
          {annotation.cascadeActors && annotation.cascadeActors.map(name => {
            const c = ACTOR_CASCADES[name];
            if (!c) return null;
            return (
              <div key={name} style={schema.cascadeCard}>
                <div style={schema.cascadeActor}>{name}</div>
                <div style={schema.cascadeFlow}>
                  <span style={schema.cascadeStep}>{c.action}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.signal}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.effect}</span>
                </div>
              </div>
            );
          })}
          {annotation.showCTA && (
            <a href="/get-started.html" style={s3.ctaButton}>
              Talk to us about your configuration
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </a>
          )}
        </div>
      )}

      {/* Navigation (steps 1-7) */}
      {schemaStep > 0 && (
        <div style={schema.stepNav}>
          <button style={styles.btnGhost} onClick={() => setSchemaStep(s => Math.max(s - 1, 0))}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '4px' }}>
              <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            {stepCfg.nav[0] || 'Back'}
          </button>
          {schemaStep < TOTAL_STEPS - 1 && (
            <button style={styles.btnSignal} onClick={() => setSchemaStep(s => s + 1)}>
              {stepCfg.nav[1] || 'Next'}
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '4px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Report capture modal ─────────────────────────────────────────── */
function ReportModal({ phase, journeyState, onClose }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [ecosystem, setEcosystem] = useState('');
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  const stageLabel = phase <= 1 ? 'behaviours' : phase <= 3 ? 'leverage' : 'digital_os';
  const qa = journeyState.qualifierAnswers || {};
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const healthRatio = stalls.length / 9;
  const healthScore = stalls.length === 0 ? 100 : Math.round((1 - healthRatio) * 100);

  const handleSubmit = async () => {
    if (!name || !email) return;
    setSending(true);

    const payload = {
      stage: stageLabel,
      name, email, ecosystem,
      sector: qa.clusterType || 'ecosystem',
      region: qa.clusterType || 'regional',
      stalls: stalls.map(id => { const s = STALLS.find(x => x.id === id); return { id, short: s ? s.name : id }; }),
      health: healthScore,
      stacks: stacks.map(s => ({ name: s.name, sev: 'high', desc: s.logic || '' })),
      commentary: '',
      stackCommentary: journeyState.stackCommentary || {},
      submitted_at: new Date().toISOString(),
      qualifier_answers: qa,
      config_name: (journeyState.osConfig || {}).configName || '',
    };

    try {
      await fetch('https://clusteros-v3-production.up.railway.app/api/v1/report-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) { console.error('Railway report error:', e); }

    try {
      await fetch('https://clusteros-v3-production.up.railway.app/api/v1/contact-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: name, email, cluster_name: ecosystem,
          engagement_type: 'diagnostic-report',
          message: `Stalls: ${stalls.join(', ')}. Health: ${healthScore}. Stacks: ${stacks.map(s=>s.name).join(', ')}`,
          submitted_at: new Date().toISOString(),
        }),
      });
    } catch (e) { console.error('HubSpot error:', e); }

    setSent(true);
    setTimeout(onClose, 3000);
  };

  return (
    <div style={sticky.modalOverlay} onClick={onClose}>
      <div style={sticky.modal} onClick={e => e.stopPropagation()}>
        {sent ? (
          <div style={{ textAlign: 'center', padding: '24px 0' }}>
            <p style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', color: 'var(--dj-chalk)' }}>

            </p>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginTop: '8px' }}>
              Check your inbox in the next minute.
            </p>
          </div>
        ) : (
          <React.Fragment>
            <h3 style={sticky.modalTitle}>Get your diagnostic report</h3>
            <p style={sticky.modalSub}>
              {stageLabel === 'behaviours' ? 'Behaviours report' : stageLabel === 'leverage' ? 'Behaviours + Leverage report' : 'Full diagnostic report'}
              {' · '}{stalls.length} stall{stalls.length !== 1 ? 's' : ''} identified
            </p>
            <div style={sticky.field}>
              <label style={sticky.label}>Your name</label>
              <input style={sticky.input} type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Full name" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your email</label>
              <input style={sticky.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="work@example.com" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your ecosystem name</label>
              <input style={sticky.input} type="text" value={ecosystem} onChange={e => setEcosystem(e.target.value)} placeholder="e.g. Edinburgh Life Sciences" />
            </div>
            <button style={{ ...sticky.submitBtn, opacity: (name && email) ? 1 : 0.4 }} onClick={handleSubmit} disabled={sending || !name || !email}>
              {sending ? 'Sending...' : 'Send my report →'}
            </button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ─── Transition card between stages ───────────────────────────────── */
function TransitionCard({ transitionType, journeyState, onContinue, onStop }) {
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const stallNames = stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; });
  const qa = journeyState.qualifierAnswers || {};

  // Transition: Stage 1 (stalls) → Qualifier questions
  if (transitionType === 'stalls-to-qualifiers') {
    const stackNames = stacks.map(s => s.name);
    const stallStr = stallNames.join(', ');
    let body = `You've identified ${stalls.length} stall${stalls.length !== 1 ? 's' : ''} — ${stallStr}. `;
    if (stacks.length > 0) {
      body += `Your ecosystem is running ${stackNames.join(', ')}. `;
    } else {
      body += 'No reinforcing stacks detected — your stalls appear independent. ';
    }
    body += `Before we show you where to intervene, we need a little more context about your ecosystem. ${QUALIFIER_QUESTIONS.length} quick questions.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Qualifiers completed → Stage 2 Leverage
  if (transitionType === 'qualifiers-to-leverage') {
    const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'your ecosystem';
    const anchorLabel = ANCHOR_LABELS[qa.anchorType] || 'Anchors';
    const body = `Thank you. Based on your ${clusterLabel} with ${articleFor(anchorLabel).toLowerCase()} ${anchorLabel} anchor, here is where your leverage is. Your answers will shape everything that follows.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnSignal} onClick={onContinue}>
            See your leverage
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Stage 2 Leverage → Stage 3 Digital OS
  if (transitionType === 'leverage-to-os') {
    let target = '';
    let entryText = '';
    if (stacks.length > 0) {
      target = stacks[0].name;
      entryText = stacks[0].entry ? ` — ${stacks[0].entry.charAt(0).toLowerCase()}${stacks[0].entry.slice(1)}` : '';
    } else if (stalls.length > 0) {
      target = stallNames[0];
      entryText = ' — addressing the stall patterns independently';
    }
    const body = `Your leverage hypothesis targets ${target}${entryText}. The next stage translates this into infrastructure — what your ecosystem needs to be built on, configured for your specific context.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue to Digital OS
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  return null;
}

/* ─── Main app ─────────────────────────────────────────────────────── */
/* ─── Flow phases:
     0: behaviours (Stage 1)
     1: transition stalls→qualifiers
     2: qualifier questions
     3: transition qualifiers→leverage
     4: leverage (Stage 2)
     5: transition leverage→os
     6: digital os (Stage 3)
   ── */
function DiagnosticJourney() {
  const [phase, setPhase] = useState(-1);
  const [exited, setExited] = useState(false);
  const [exitedAt, setExitedAt] = useState(null);
  const [showExitModal, setShowExitModal] = useState(false);
  const [loadingCommentary, setLoadingCommentary] = useState(false);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],
    stacks: [],
    leverageHypotheses: [],
    qualifierAnswers: {},
    osConfig: null,
    stackCommentary: {},
  });

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => {
      const next = { ...prev, ...patch };
      // Clear internal flag after read
      delete next._reviseQualifiers;
      return next;
    });
  }, []);

  // Handle "Revise answers" from Stage 3
  useEffect(() => {
    if (journeyState._reviseQualifiers) {
      setPhase(2); // jump to qualifier questions
    }
  }, [journeyState._reviseQualifiers]);

  /* ── Phase navigation ── */
  const goNext = useCallback(() => {
    if (phase === 0) setPhase(1);       // behaviours → transition
    else if (phase === 1) setPhase(2);  // transition → qualifiers
    else if (phase === 2) setPhase(3);  // qualifiers done → transition (called by QualifierQuestions onComplete)
    else if (phase === 3) setPhase(4);  // transition → leverage
    else if (phase === 4) setPhase(5);  // leverage → transition
    else if (phase === 5) setPhase(6);  // transition → digital os
  }, [phase]);

  const goBack = useCallback(() => {
    if (phase === 1) setPhase(0);       // transition → behaviours
    else if (phase === 2) setPhase(0);  // qualifiers → behaviours (back to stall selection)
    else if (phase === 3) setPhase(2);  // transition → qualifiers
    else if (phase === 4) setPhase(3);  // leverage → transition (which auto-shows post-qualifier)
    else if (phase === 5) setPhase(4);  // transition → leverage
    else if (phase === 6) setPhase(4);  // digital os → leverage
  }, [phase]);

  const requestExit = useCallback(() => { setShowExitModal(true); }, []);
  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    // Map phase to stage for exit summary
    const stageIndex = phase <= 1 ? 0 : phase <= 3 ? 0 : phase <= 5 ? 1 : 2;
    setExitedAt(stageIndex);
    setExited(true);
  }, [phase]);
  const cancelExit = useCallback(() => { setShowExitModal(false); }, []);

  /* ── Commentary fetch after qualifiers complete ── */
  const handleQualifierComplete = useCallback(() => {
    const stacks = journeyState.detectedStacks || [];
    if (stacks.length === 0) { setPhase(3); return; }

    setLoadingCommentary(true);
    const qa = journeyState.qualifierAnswers || {};
    const STAGE_LABEL_MAP = { early: 'Early-stage', established: 'Established', mature: 'Mature' };
    const PRIORITY_LABEL_MAP = { talent: 'Retain & grow local talent', capital: 'Attract external capital', research: 'Convert research to commercial activity', supply: 'Build anchor supply chains', growth: 'Drive economic growth' };
    const GAP_LABEL_MAP = { discovery: "Actors can't find each other", flow: "Knowledge doesn't flow between groups", access: "Outside actors can't engage", conversion: "Activity isn't converting to outcomes" };
    const PROTECT_LABEL_MAP = { knowledge: 'Local knowledge staying local', ip: 'Institutional IP and research', trust: 'Community relationships and trust', talent: 'Founder and talent pipeline', sovereignty: 'Economic sovereignty' };

    const calls = stacks.map(stack =>
      fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          stackId: stack.id,
          stackName: stack.name,
          stalls: stack.triggers || [],
          clusterType: CLUSTER_TYPE_LABELS[qa.clusterType] || 'Regional Speciality',
          anchorType: (ANCHOR_LABELS[qa.anchorType] || 'Anchors'),
          scale: STAGE_LABEL_MAP[qa.stage] || 'Established',
          priority: PRIORITY_LABEL_MAP[qa.priority] || 'Drive economic growth',
          gap: GAP_LABEL_MAP[qa.gap] || '',
          protect: (qa.protect || []).map(p => PROTECT_LABEL_MAP[p] || p),
        }),
      })
        .then(r => r.ok ? r.json() : null)
        .then(data => data ? { stackId: stack.id, commentary: data.commentary || data.text || JSON.stringify(data) } : null)
        .catch(err => { console.warn(`Commentary fetch failed for ${stack.id}:`, err.message); return null; })
    );

    Promise.all(calls).then(results => {
      const commentary = {};
      results.forEach(r => { if (r) commentary[r.stackId] = r.commentary; });
      setJourneyState(prev => ({ ...prev, stackCommentary: { ...prev.stackCommentary, ...commentary } }));
      setLoadingCommentary(false);
      setPhase(3);
    });
  }, [journeyState.detectedStacks, journeyState.qualifierAnswers]);

  // Map phase to stage index for indicators
  const currentStage = phase <= 2 ? 0 : phase <= 4 ? 1 : 2;
  const completedUpTo = phase >= 4 ? (phase >= 6 ? 2 : 1) : 0;

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage = STAGES[currentStage];
  const isFirst = phase <= 0;
  const isLast = phase === 6;

  // Stage 0 — intro screen (no step indicator, no nav, no sticky bar)
  if (phase === -1) {
    return (
      <div style={styles.shell}>
        <main style={{ ...styles.main, alignItems: 'center' }}>
          <div style={s0.container}>
            <h1 style={s0.heading}>A behavioural diagnostic for your innovation ecosystem</h1>
            <p style={s0.body}>
              This diagnostic identifies the behavioural patterns preventing your ecosystem from compounding value. It works by asking you to recognise stalls — substitution behaviours your ecosystem has adopted instead of the outcomes you're trying to produce.
            </p>
            <p style={s0.body}>
              You will identify stalls, detect reinforcing combinations, and receive a configuration recommendation for your digital infrastructure. Each stage produces a standalone report. The whole journey takes 10–15 minutes.
            </p>
            <div style={s0.outputRow}>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Behaviours</div>
                <div style={s0.outputText}>Stall identification and stack detection</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Leverage</div>
                <div style={s0.outputText}>Intervention hypotheses targeted at your specific configuration</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Digital OS</div>
                <div style={s0.outputText}>A personalised infrastructure recommendation</div>
              </div>
            </div>
            <button style={s0.cta} onClick={() => setPhase(0)}>
              Begin diagnostic
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '8px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </main>
      </div>
    );
  }

  // Determine what to show in main content area
  let mainContent;
  if (phase === 0) {
    mainContent = <BehavioursStage />;
  } else if (phase === 1) {
    mainContent = (
      <TransitionCard transitionType="stalls-to-qualifiers" journeyState={journeyState}
        onContinue={goNext}
        onStop={() => { console.log('stop-behaviours'); setExitedAt(0); setExited(true); }} />
    );
  } else if (phase === 2 && loadingCommentary) {
    mainContent = (
      <div style={{ width: '100%', maxWidth: '480px', textAlign: 'center', padding: '80px 0' }}>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '24px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '12px' }}>
          Preparing your leverage analysis
        </h2>
        <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', color: 'var(--dj-chalk-muted)', marginBottom: '24px' }}>
          Analysing your configuration against detected stacks
        </p>
        <div style={{ display: 'flex', justifyContent: 'center', gap: '6px' }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              width: '8px', height: '8px', borderRadius: '50%', background: 'var(--steward)',
              animation: `pulse-dot 1.2s ease-in-out ${i * 0.2}s infinite`,
            }} />
          ))}
        </div>
      </div>
    );
  } else if (phase === 2) {
    mainContent = <QualifierQuestions onComplete={handleQualifierComplete} />;
  } else if (phase === 3) {
    mainContent = (
      <TransitionCard transitionType="qualifiers-to-leverage" journeyState={journeyState}
        onContinue={goNext} onStop={() => {}} />
    );
  } else if (phase === 4) {
    mainContent = <LeverageStage />;
  } else if (phase === 5) {
    mainContent = (
      <TransitionCard transitionType="leverage-to-os" journeyState={journeyState}
        onContinue={goNext}
        onStop={() => { console.log('stop-leverage'); setExitedAt(1); setExited(true); }} />
    );
  } else {
    mainContent = <DigitalOSStage />;
  }

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          {mainContent}
        </main>

        {/* ── Navigation bar (hidden on transition cards) ── */}
        {phase !== 1 && phase !== 3 && phase !== 5 && (
          <nav style={styles.navBar}>
            <div style={styles.navLeft}>
              {!isFirst && (
                <button style={styles.btnGhost} onClick={goBack}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                    <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Back
                </button>
              )}
            </div>
            <div style={styles.navRight}>
              {phase !== 2 && !isLast && (
                <button style={styles.btnSignal} onClick={goNext}>
                  Continue
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                    <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              )}
            </div>
          </nav>
        )}

        {/* ── Sticky bar ── */}
        <StickyBar phase={phase} journeyState={journeyState} />

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}

  );
  return <DiagnosticJourney />;
}
