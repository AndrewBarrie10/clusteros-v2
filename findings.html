<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What 75 Diagnostics Found — ClusterOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">


<script>
document.querySelectorAll('.nav-dropdown').forEach(function(dd) {
  var t = dd.querySelector('.nav-dropdown-toggle');
  var m = dd.querySelector('.nav-dropdown-menu');
  t.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = m.classList.contains('open');
    document.querySelectorAll('.nav-dropdown-menu').forEach(function(x){ x.classList.remove('open'); });
    document.querySelectorAll('.nav-dropdown-toggle').forEach(function(x){ x.classList.remove('active'); });
    if (!open) { m.classList.add('open'); t.classList.add('active'); }
  });
});
document.addEventListener('click', function() {
  document.querySelectorAll('.nav-dropdown-menu').forEach(function(x){ x.classList.remove('open'); });
  document.querySelectorAll('.nav-dropdown-toggle').forEach(function(x){ x.classList.remove('active'); });
});
(function(){
  var h = document.getElementById('nav-hamburger');
  var m = document.getElementById('nav-mobile-menu');
  if (!h || !m) return;
  h.addEventListener('click', function(e){ e.stopPropagation(); var o=m.classList.contains('open'); m.classList.toggle('open',!o); h.classList.toggle('open',!o); });
  document.addEventListener('click', function(){ m.classList.remove('open'); h.classList.remove('open'); });
})();
</script>
</body>
</html>
