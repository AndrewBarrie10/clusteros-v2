<title>Diagnostic Journey — ClusterOS</title>

     time into diagnostic-journey.app.js (see scripts/build-diagnostic-journey.js),
     so the page no longer downloads @babel/standalone (~3 MB) or transpiles
     ~400 KB of JSX in the browser on every visit. Edit diagnostic-journey.jsx
     and rerun the build to change the app. defer => run in order after parse. -->
<script defer crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" onerror="window.__djCdnFail&&window.__djCdnFail('react')"></script>
<script defer crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" onerror="window.__djCdnFail&&window.__djCdnFail('react-dom')"></script>
<script defer src="/diagnostic-journey.app.js" onerror="window.__djCdnFail&&window.__djCdnFail('app')"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Light journey surface (aligned with site cream palette) ── */
  --dj-bg:      #f7f4ef;
  --dj-surface: #f0ece4;
  --dj-border:  #ddd8cf;
  --dj-chalk:   #1a1a1a;
  --dj-chalk-dim: #5a5650;
  --dj-chalk-muted: #8c8780;

  /* ── Shared with site (same values — safe to reference) ── */
  --signal:     #2a7a4f;   /* dark green for light mode active states */
  --signal-bg:  #c8f0d0;   /* light green background tint */
  --founder:    #d97706;   /* amber — site value */
  --steward:    #0c9488;   /* teal — site value */
  --researcher: #c0392b;   /* red — site value */
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'Geist', system-ui, -apple-system, sans-serif;
  --font-mono:  'Geist Mono', monospace;
}

html { background: var(--dj-bg); color: var(--dj-chalk); font-family: var(--font-sans); }
body { min-height: 100vh; }
#root { min-height: 100vh; display: flex; flex-direction: column; }
@media (max-width: 680px) { .stall-grid { grid-template-columns: repeat(2, 1fr) !important; } }
@media (max-width: 420px) { .stall-grid { grid-template-columns: 1fr !important; } }
@media (min-width: 769px) { .schema-mobile { display: none !important; } }
@media (max-width: 768px) { .schema-desktop { display: none !important; } .desktop-stepper-wrap { display: none !important; } }
@media (min-width: 769px) { .mobile-accordion-wrap { display: none !important; } }
@media (min-width: 769px) { .schema-mobile-stepper { display: none !important; } .mobile-expand-toggle { display: none !important; } .annot-panel-collapsed { display: block !important; } .mobile-accordion-wrap { display: none !important; } }
@keyframes pulse-dot { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

/* Comparator pill hover */
a.comparator-pill:hover { background: #2a3f55 !important; }

/* Suppress site sticky bar — journey has its own */
.sticky-bar, .sticky-bar-inner, .sticky-btn { display: none !important; }

/* Mobile responsive — 375px minimum */
@media (max-width: 768px) {
  /* Stage progress indicator — prevent overflow */
  .step-node { min-width: 80px !important; }
  .step-label { font-size: 9px !important; letter-spacing: 0.04em !important; }
  .step-subtitle { display: none !important; }
  .s0-outputs { grid-template-columns: 1fr !important; }
  .s0-cta-btn { width: 100% !important; justify-content: center !important; }
  .stage0-main { padding: 24px !important; }
  /* Stepper header: hide everything except mobile stepper card's own counter */
  .stepper-header { justify-content: center !important; }
  .stepper-config-badge { display: none !important; }
  .stepper-back-overview { display: none !important; }
  .stepper-counter { display: none !important; }
  /* Hide annotation panel title on mobile — MobileSchemaStep already shows layer heading */
  .annot-title-desktop { display: none !important; }
  /* Collapsible annotation panel on mobile */
  .annot-panel-collapsed { display: none !important; }
  .annot-panel-expanded { display: block !important; }
  /* Hide expand toggle on desktop */
  .mobile-expand-toggle { display: inline !important; }
  /* Cap commentary length on mobile */
  .digital-body {
    display: -webkit-box !important;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
}
@media (max-width: 600px) {
  .nav-bar-journey { flex-direction: column-reverse !important; gap: 8px !important; padding: 12px 16px !important; }
  .nav-bar-journey > div { flex: none !important; width: 100% !important; }
  .nav-bar-journey button { width: 100% !important; justify-content: center !important; }
  .schema-step-nav { flex-direction: column !important; }
  .schema-step-nav button { width: 100% !important; justify-content: center !important; }
}
@media (max-width: 480px) {
  .sticky-sub-label { display: none !important; }
}
</style>

</head>
<body>
<div id="root"><div id="dj-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-sans);color:var(--dj-chalk-dim);gap:14px">
  <div style="width:28px;height:28px;border:3px solid var(--dj-border);border-top-color:var(--dj-chalk);border-radius:50%;animation:dj-spin .8s linear infinite"></div>
  <div style="font-size:14px;letter-spacing:.02em">Loading the diagnostic journey…</div>
</div></div>
<style>@keyframes dj-spin{to{transform:rotate(360deg)}}</style>
<script>
/* Failsafe: if a required script fails to load, React never mounts and
   #dj-loading is left in place. Surface a recoverable error instead of a
   silent blank page. */
(function () {
  var failed = [];
  function showError() {
    var root = document.getElementById('root');
    if (!root) return;
    root.innerHTML =
      '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;'
      + 'font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:32px;color:#1a1a1a">'
      + '<div style="font-size:18px;margin-bottom:10px">The diagnostic journey couldn’t finish loading.</div>'
      + '<div style="font-size:14px;color:#5a5650;max-width:420px;margin-bottom:22px;line-height:1.5">'
      + 'This is usually a temporary network issue loading required libraries. Check your connection and try again.</div>'
      + '<button onclick="location.reload()" style="font:inherit;padding:10px 22px;border:1px solid #1a1a1a;'
      + 'background:#1a1a1a;color:#fff;border-radius:6px;cursor:pointer">Reload</button>'
      + (failed.length ? '<div style="font-size:11px;color:#8c8780;margin-top:18px">Failed to load: ' + failed.join(', ') + '</div>' : '')
      + '</div>';
  }
  window.__djCdnFail = function (name) { if (failed.indexOf(name) < 0) failed.push(name); showError(); };
  window.addEventListener('load', function () {
    // Allow a moment for deferred scripts to execute / mount on slow connections.
    setTimeout(function () {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') { showError(); return; }
      if (document.getElementById('dj-loading')) showError(); // libs present but app never mounted
    }, 8000);
  });
})();
</script>

</body>
</html>
