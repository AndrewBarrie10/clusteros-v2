function ArchWalkthrough({ journeyState, config, onClose }) {
  const [step, setStep] = useState(0);
  const totalSteps = 7; // 6 layers + final reveal

  const activeTools = useMemo(() => getActiveToolNames(journeyState), [journeyState]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setStep(s => Math.min(s + 1, totalSteps - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setStep(s => Math.max(s - 1, 0)); }
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const isFinal = step === 6;
  const provocation = buildProvocation(step, journeyState, config);

  return (
    <div style={arch.overlay}>
      {/* Close */}
      <button style={arch.closeBtn} onClick={onClose}>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 5L15 15M15 5L5 15" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>

      {/* Step counter */}
      <div style={arch.stepCounter}>{step + 1} of {totalSteps}</div>

      <div style={{
        ...arch.walkthroughLayout,
        gridTemplateColumns: (provocation && provocation.scenario) ? '1fr 600px' : '1fr 340px',
      }}>
        {/* Diagram column — circulation diagram for Step 2 + final, flat layers for others */}
        <div style={arch.diagramCol}>
          {(step === 1 || isFinal) ? (
            <CirculationDiagram journeyState={journeyState} allActive={isFinal} />
          ) : (
            ARCH_LAYERS.map((layer, i) => {
              const layerIndex = i;
              const isActive = layerIndex === step;
              const comps = layer.id === 'mcp' ? activeTools.slice(0, 12) : layer.components;
              return (
                <div key={layer.id} style={{
                  ...arch.layerBox,
                  opacity: isActive ? 1 : 0.15,
                  borderColor: isActive ? 'var(--steward)' : 'var(--dj-border)',
                  filter: isActive ? 'none' : 'blur(0.5px)',
                  transition: 'opacity 0.4s, border-color 0.4s, filter 0.4s',
                }}>
                  <div style={{
                    ...arch.layerTitle,
                    color: isActive ? 'var(--steward)' : 'var(--dj-chalk-muted)',
                  }}>{layer.label}</div>
                  <div style={arch.layerChips}>
                    {comps.map(c => (
                      <span key={c} style={{
                        ...arch.chip,
                        color: isActive ? 'var(--dj-chalk)' : 'var(--dj-chalk-muted)',
                        borderColor: isActive ? 'var(--dj-border)' : 'transparent',
                      }}>{c}</span>
                    ))}
                  </div>
                </div>
              );
            }).reverse()
          )}
        </div>

        {/* Annotation column — split layout for Step 2, single panel for others */}
        {provocation && provocation.scenario ? (
          <div style={arch.annotColSplit}>
            <div style={arch.annotLabel}>
              {ARCH_LAYERS[step].label}
            </div>
            <div style={arch.splitAnnot}>
              {/* Left: scenario story */}
              <div style={arch.splitLeft}>
                {provocation.scenario.split('\n\n').map((para, i) => (
                  <p key={i} style={arch.scenarioText}>{para}</p>
                ))}
              </div>
              {/* Divider */}
              <div style={arch.splitDivider} />
              {/* Right: provocation */}
              <div style={arch.splitRight}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
              </div>
            </div>
          </div>
        ) : (
          <div style={arch.annotCol}>
            <div style={arch.annotLabel}>
              {isFinal ? config.configName : ARCH_LAYERS[step].label}
            </div>

            {provocation && (
              <div style={arch.provocationWrap}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  {provocation.cascadeActors && provocation.cascadeActors.map(name => {
                    const c = ACTOR_CASCADES[name];
                    if (!c) return null;
                    return (
                      <div key={name} style={arch.cascadeCard}>
                        <div style={arch.cascadeActor}>{name}</div>
                        <div style={arch.cascadeRow}>
                          <span style={arch.cascadeStepText}>{c.action}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.signal}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.effect}</span>
                        </div>
                      </div>
                    );
                  })}
                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
                {provocation.showCTA && (
                  <a href="/get-started.html" style={arch.ctaLink}>
                    Talk to us about your configuration
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                      <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </a>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={arch.navRow}>
        <button style={{ ...arch.navBtn, opacity: step > 0 ? 1 : 0.3 }} onClick={() => setStep(s => Math.max(s - 1, 0))} disabled={step === 0}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8L10 12" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button style={{ ...arch.navBtn, opacity: step < totalSteps - 1 ? 1 : 0.3 }} onClick={() => setStep(s => Math.min(s + 1, totalSteps - 1))} disabled={step >= totalSteps - 1}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ─── Qualifier questions (standalone, used between Stage 1 and 2) ── */
function QualifierQuestions({ onComplete }) {
  const { journeyState, updateJourneyState } = useJourney();
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(journeyState.qualifierAnswers || {});
  const [multiSelect, setMultiSelect] = useState(answers.protect || []);

  const q = QUALIFIER_QUESTIONS[currentQ];
  const totalQ = QUALIFIER_QUESTIONS.length;

  const selectSingle = useCallback((qId, value) => {
    const next = { ...answers, [qId]: value };
    setAnswers(next);
    updateJourneyState({ qualifierAnswers: next, osConfig: null });
    if (currentQ < totalQ - 1) {
      setTimeout(() => setCurrentQ(currentQ + 1), 300);
    }
  }, [answers, currentQ, totalQ, updateJourneyState]);

  const toggleMulti = useCallback((value) => {
    setMultiSelect(prev =>
      prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value]
    );
  }, []);

  const submitMulti = useCallback(() => {
    const finalAnswers = { ...answers, protect: multiSelect };
    setAnswers(finalAnswers);
    const config = deriveOSConfig(finalAnswers, journeyState.stalls, journeyState.detectedStacks || []);
    updateJourneyState({ qualifierAnswers: finalAnswers, osConfig: config });
    onComplete();
  }, [answers, multiSelect, journeyState.stalls, journeyState.detectedStacks, updateJourneyState, onComplete]);

  const goBackQ = useCallback(() => {
    if (currentQ > 0) {
      const prevQ = currentQ - 1;
      setCurrentQ(prevQ);
      if (QUALIFIER_QUESTIONS[prevQ].multi) {
        setMultiSelect(answers[QUALIFIER_QUESTIONS[prevQ].id] || []);
      }
    }
  }, [currentQ, answers]);

  return (
    <div style={s3.container}>
      <div style={s3.qProgress}>
        <span style={s3.qProgressLabel}>Question {currentQ + 1} of {totalQ}</span>
        <div style={s3.qProgressTrack}>
          <div style={{ ...s3.qProgressFill, width: `${((currentQ + 1) / totalQ) * 100}%` }} />
        </div>
      </div>

      <h3 style={s3.qText}>{q.question}</h3>
      {q.multi && <p style={s3.qHint}>Select all that apply</p>}

      <div style={s3.optionGrid}>
        {q.options.map(opt => {
          const isSelected = q.multi
            ? multiSelect.includes(opt.value)
            : answers[q.id] === opt.value;
          return (
            <button
              key={opt.value}
              onClick={() => q.multi ? toggleMulti(opt.value) : selectSingle(q.id, opt.value)}
              style={{
                ...s3.optionCard,
                borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                background: isSelected ? 'rgba(12,148,136,0.06)' : 'var(--dj-surface)',
              }}
            >
              <div style={s3.optionHeader}>
                <span style={{
                  ...s3.optionLabel,
                  color: isSelected ? 'var(--dj-chalk)' : 'var(--dj-chalk-dim)',
                }}>{opt.label}</span>
                <div style={{
                  ...s3.optionCheck,
                  borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                  background: isSelected ? 'var(--steward)' : 'transparent',
                  borderRadius: q.multi ? '4px' : '50%',
                }}>
                  {isSelected && (
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 5L4.2 7.2L8 3" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>
              </div>
              {opt.desc && <div style={s3.optionDesc}>{opt.desc}</div>}
            </button>
          );
        })}
      </div>

      {q.multi && (
        <div style={s3.multiActions}>
          <button
            style={{
              ...styles.btnSignal,
              opacity: multiSelect.length > 0 ? 1 : 0.4,
              pointerEvents: multiSelect.length > 0 ? 'auto' : 'none',
            }}
            onClick={submitMulti}
          >
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      )}

      {currentQ > 0 && (
        <button style={{ ...styles.btnGhost, marginTop: '16px' }} onClick={goBackQ}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
            <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Previous question
        </button>
      )}
    </div>
  );
}

function ArchitectureSchemaSVG({ activeLayer, secondaryLayers, selectedStalls, currentStep }) {
  const pad = 20, w = 900;
  const stallsArr = selectedStalls || [];
  const step = currentStep || 0;
  const active = activeLayer ? new Set(Array.isArray(activeLayer) ? activeLayer : [activeLayer]) : null;
  const secondary = secondaryLayers ? new Set(Array.isArray(secondaryLayers) ? secondaryLayers : [secondaryLayers]) : new Set();

  function layerOpacity(layerId) {
    if (!active) return 1; // no highlighting = all visible
    if (active.has(layerId)) return 1;
    if (secondary.has(layerId)) return 0.4;
    return 0.15;
  }

  return (
    <svg viewBox="0 0 900 720" style={{ width: '100%', height: 'auto', display: 'block' }}>
      {SCHEMA_LAYERS.map(layer => {
        const isSovereign = layer.split;
        const op = layerOpacity(layer.id);
        return (
          <g key={layer.id} style={{ opacity: op, transition: 'opacity 0.4s ease' }}>
            {/* Layer background */}
            <rect x={pad} y={layer.y} width={w - pad * 2} height={layer.h}
              rx="6" fill={isSovereign ? 'rgba(200,240,208,0.15)' : 'var(--dj-surface)'}
              stroke="var(--dj-border)" strokeWidth="1" />
            {/* Layer label */}
            <text x={pad + 12} y={layer.y + 14}
              fill="var(--steward)" fontFamily="'Geist Mono', monospace"
              fontSize="8" fontWeight="600" letterSpacing="0.1em">
              {isSovereign ? '\u2605 ' + layer.label : layer.label}
            </text>

            {/* Components */}
            {!isSovereign && layer.comps && (() => {
              const perRow = layer.cols || layer.comps.length;
              const rows = Math.ceil(layer.comps.length / perRow);
              const cw = (w - pad * 2 - 24) / perRow;
              const totalH = layer.h - 34;
              const rowH = (totalH - (rows - 1) * 4) / rows;
              return layer.comps.map((c, ci) => {
                const col = ci % perRow;
                const row = Math.floor(ci / perRow);
                const cx = pad + 12 + col * cw;
                const cy = layer.y + 24 + row * (rowH + 4);
                return (
                  <g key={c.id}>
                    <rect x={cx} y={cy} width={cw - 4} height={rowH}
                      rx="3" fill="var(--dj-bg)" stroke="var(--dj-border)" strokeWidth="0.8" />
                    <text x={cx + (cw - 4) / 2} y={cy + rowH / 2 + 1}
                      textAnchor="middle" dominantBaseline="middle"
                      fill="var(--dj-chalk-dim)"
                      fontFamily={c.mono ? "'Geist Mono', monospace" : "'Geist', system-ui"}
                      fontSize={c.mono ? '6.5' : '8'}>
                      {c.label}
                    </text>
                  </g>
                );
              });
            })()}

            {/* Split layout for sovereign — sub-categories + bots */}
            {isSovereign && (() => {
              const splitX = pad + 12;
              const totalW = w - pad * 2 - 24;
              const splitW = totalW * 0.65;
              const botX = splitX + splitW + 10;
              const botW = totalW * 0.35 - 10;
              const startY = layer.y + 24;
              const sovH = layer.h - 34;
              const cats = layer.sovereignCategories || [];
              const catCount = cats.length;
              const catH = (sovH - (catCount - 1) * 4) / catCount;
              const botCols = 2;
              const botRows = 2;
              const botCW = (botW - 4) / botCols;
              const botCH = 28;
              return (
                <React.Fragment>
                  {/* Sovereign section background */}
                  <rect x={splitX} y={startY} width={splitW} height={sovH}
                    rx="4" fill="rgba(200,240,208,0.1)" stroke="rgba(42,122,79,0.2)" strokeWidth="0.8" />
                  {/* Sub-categories */}
                  {cats.map((cat, ci) => {
                    const catY = startY + 4 + ci * (catH + 4);
                    const pillW = (splitW - 16) / Math.min(cat.items.length, 6);
                    return (
                      <g key={cat.label}>
                        {/* Category label */}
                        <text x={splitX + 8} y={catY + 10}
                          fill="var(--steward)" fontFamily="'Geist Mono', monospace"
                          fontSize="6" fontWeight="600" letterSpacing="0.1em">
                          {cat.label}
                        </text>
                        {/* Items as pills */}
                        {cat.items.map((item, ii) => {
                          const ix = splitX + 8 + ii * pillW;
                          const iy = catY + 16;
                          const ih = catH - 20;
                          return (
                            <g key={item}>
                              <rect x={ix} y={iy} width={pillW - 3} height={Math.max(ih, 14)}
                                rx="2" fill="var(--dj-bg)" stroke="var(--dj-border)" strokeWidth="0.5" />
                              <text x={ix + (pillW - 3) / 2} y={iy + Math.max(ih, 14) / 2 + 1}
                                textAnchor="middle" dominantBaseline="middle"
                                fill="var(--dj-chalk-dim)" fontFamily="'Geist', system-ui" fontSize="6.5">
                                {item}
                              </text>
                            </g>
                          );
                        })}
                      </g>
                    );
                  })}
                  {/* Bot section */}

/* ─── Helper: render text with **bold** markers as React elements ── */
function BoldText({ text }) {
  if (!text) return null;
  const parts = text.split(/\*\*(.+?)\*\*/g);
  return parts.map((part, i) => i % 2 === 1
    ? React.createElement('strong', { key: i }, part)
    : part
  );
}

function buildStepAnnotation(step, journeyState, config) {
  const qa = journeyState.qualifierAnswers || {};
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'your ecosystem';
  const anchorLabel = config.anchorLabel || 'Anchors';
  const protections = (qa.protect || []).map(p => PROTECT_LABELS[p]).filter(Boolean);
  const protectStr = protections.length > 0
    ? (protections.length === 1 ? protections[0] : protections.slice(0, -1).join(', ') + ' and ' + protections[protections.length - 1])
    : '';
  const stackNames = stacks.map(s => s.name);
  const allStackBold = stackNames.map(n => `**${n}**`).join(', ');
  const allStackPlain = stackNames.join(', ');

  switch (step) {
    // Step 1: Sovereign Database
    case 1: {
      let body = `Most ecosystems run on institutional memory — reports, relationships, informal knowledge held by individuals. When people leave, it leaves with them. The Sovereign Database gives your ${clusterLabel} a structured record that belongs to the ecosystem, not to any organisation within it. Every actor profile, every stall finding, every leverage hypothesis your diagnostic has already identified — recorded here as a structural fact, not an anecdote.`;
      if (allStackBold) body += ` ${allStackBold} lose their reinforcement when evidence has a record that exists independently of the story told about it.`;
      return { title: `The heart of your ${config.configName}`, body };
    }
    // Step 2: Governance
    case 2: {
      let body = 'Value leaves ecosystems quietly. A researcher takes IP to a better-funded institution. A founder relocates to be closer to a customer. An anchor stops attending and nobody notices until the pipeline is empty. The Federated Governance layer makes these movements visible by requiring a consent record for every flow across the ecosystem boundary. You cannot extract what the audit trail has already claimed.';
      if (stalls.includes('S4')) body += ' This directly addresses **S4 Extracting** — extraction persists precisely because it currently leaves no trace.';
      if (stalls.includes('S3')) body += ' This directly addresses **S3 Forgiving** — accountability becomes structural when every action has an audit trail.';
      if ((qa.protect || []).includes('sovereignty'))
        body += ` Economic sovereignty is enforced here — no data leaves the ${clusterLabel} boundary without consent recorded at the governance layer.`;
      return { title: 'The boundary that protects it', body };
    }
    // Step 3: Integration Layer
    case 3: {
      const GAP_DESC = {
        discovery: `Your biggest coordination gap is discovery — actors who should connect don't know each other exists. Government Support Directory and Professional Identity solve the cold-start problem: your ecosystem knows who is available before anyone has to make an introduction.`,
        flow: `Your biggest coordination gap is knowledge circulation — research findings and commercial intelligence sit in separate silos. Publication Databases feed structured knowledge into the ecosystem layer, available to every cluster without anyone having to broker it.`,
        access: `Your biggest coordination gap is membrane permeability — outside investors, diaspora talent, and global partners can't find a structured entry point. Professional Identity and Publication Databases give them one, resolved at the supercluster level before any cluster has to manage it.`,
        conversion: `Your biggest coordination gap is conversion — activity is happening but outcomes aren't compounding. Community Services API and Professional Identity make actor progression visible as structured signal, not anecdote. The system reads conversion, not just activity.`,
      };
      const body = GAP_DESC[qa.gap] || 'Without external data at the supercluster level, every new ecosystem starts empty. Actors arrive and see nothing. The cold-start problem kills momentum before the platform generates its own signal.';
      return { title: 'What feeds your ecosystem before any actor joins', body };
    }
    // Step 4: Bots / Continuous enrichment
    case 4: {
      const body = 'Every ecosystem has a cold-start problem: the platform only becomes useful once it knows enough about the ecosystem to be useful. The bot network solves this without requiring anyone to manually enter data. Evidence Ingestion Bot reads public sources continuously and writes structured findings to your sovereign database. Actor Enrichment Bot updates profiles from behaviour rather than self-report. Health Monitoring Bot tracks system health across all clusters. By the time your first actor joins, the ecosystem already knows itself.';
      return { title: 'Continuous enrichment', body };
    }
    // Step 5: MCP Intelligence
    case 5: {
      let body = `Reports get written, circulated, and overtaken by events. By the time a report reaches a board, the ecosystem has moved. This layer replaces reports with live queries. When you ask what is stalling, the system reads current actor behaviour — not last quarter's narrative. When you ask where a founder dropped out, it checks the journey record, not the programme manager's recollection.`;
      if (allStackBold) body += ` ${allStackBold} lose their fuel source when findings are separated from the process of producing them.`;
      return { title: 'How your ecosystem thinks', body };
    }
    // Step 6: AI Engine — renamed heading
    case 6: {
      const body = `A founder joins and declares their technology domain. The system reads that against live procurement signals from your ${anchorLabel} anchor and constructs their pathway — not a generic onboarding flow, but a specific sequence of connections, groups, and milestones based on what this ecosystem actually has. A researcher publishes a finding. The system reads it against active founder profiles and surfaces it to the three founders most likely to need it. You interrogate the ecosystem. The system reads the same signals and tells you what is stalling, what is converting, and where one intervention would have the most effect. Same data. Different questions. Different outputs.`;
      return { title: 'How your ecosystem makes decisions', body };

    // Step 7: Application Layer — anchor-type-driven cards
    case 7: {
      const actorMap = {
        'University': ['Researchers', 'Founders', 'Stewards'],
        'Research institute': ['Researchers', 'Founders', 'Stewards'],
        'Large corporate': ['Founders', config.anchorLabel, 'Stewards'],

        'Hospital': ['Founders', 'Researchers', 'Stewards'],

      return { title: 'What your actors experience', body: null, cascadeActors: actors.slice(0, 3) };

    case 8: {

      if (protectStr) body += ` ${protectStr} — protected by architecture, not by policy.`;

          'Board-ready evidence generated from the same data your actors are already producing',
        ],

      return { title: config.configName, body, stewardSection, showCTA: true };

  }
}

      {/* Header */}
      <div className="stepper-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div className="stepper-config-badge" style={s3.configBadge}>{config.configName}</div>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <span className="stepper-counter" style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', color: 'var(--dj-chalk-muted)', letterSpacing: '0.08em' }}>
            Step {schemaStep + 1} of {TOTAL_STEPS}
          </span>
          <button className="stepper-back-overview" style={styles.btnGhost} onClick={() => setSchemaStep(0)}>Back to start</button>
        </div>
      </div>

      {/* Step 0: intro text ABOVE the diagram */}
      {schemaStep === 0 && (
        <div style={{ padding: '20px 0' }}>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '24px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '10px', letterSpacing: '-0.01em' }}>
            Your {config.configName} — fully configured.

          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '8px' }}>
            This is the infrastructure stack recommended for your ecosystem, built around what your diagnostic found. Step through each layer to see what it does, why it's in your configuration, and what it addresses.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginBottom: '20px' }}>
            {TOTAL_STEPS} layers{(journeyState.detectedStacks || []).length > 0 ? ` · ${(journeyState.detectedStacks || []).map(s => s.name).join(', ')}` : ''}
          </p>
        </div>
      )}

      {/* SVG schema with layer highlighting */}
      <div className="schema-desktop">
        <ArchitectureSchemaSVG
          activeLayer={stepCfg.allActive ? SCHEMA_LAYERS.map(l => l.id) : stepCfg.active}
          secondaryLayers={stepCfg.secondary}
          selectedStalls={journeyState.stalls}
          currentStep={schemaStep}
        />
      </div>
      <div className="schema-mobile-stepper">
        <MobileSchemaStep schemaStep={schemaStep} configName={config.configName} selectedStalls={journeyState.stalls} />
      </div>

      {/* Step 0: CTA button below diagram */}
      {schemaStep === 0 && (
        <div style={{ padding: '16px 0', textAlign: 'center' }}>
          <button style={styles.btnSignal} onClick={() => setSchemaStep(1)}>
            Walk through your stack
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      )}

      {/* Annotation panel (steps 1-8) */}
      {annotation && (() => {
        const STEP_LAYER_KEY = { 1: 'sovereignDatabase', 2: 'governanceAccess', 3: 'integrationLayer', 4: 'automationLayer', 5: 'intelligenceSubstrate', 6: 'aiRuntime', 7: 'applicationLayer' };
        const layerKey = STEP_LAYER_KEY[schemaStep];
        const dcObj = journeyState.digitalCommentary;
        const dc = (dcObj && layerKey && dcObj[layerKey]) ? dcObj[layerKey] : null;
        if (schemaStep >= 1 && schemaStep <= 7) {
          console.log('[Render Step', schemaStep, '] layerKey:', layerKey, 'digitalCommentary exists:', !!dcObj, 'dc:', dc);
        }
        return (
        <div style={schema.annotPanel}>
          <h3 className="annot-title-desktop" style={schema.annotTitle}>{annotation.title}</h3>

          {/* Tech recommendation badge */}
          {(() => {
            const tc = journeyState.techConfig;
            if (!tc) return null;
            const STEP_TECH = {
              1: tc.sovereignDatabase ? { pills: tc.sovereignDatabase.clusters, type: 'clusters' } : null,
              2: tc.governanceAccess ? { label: tc.governanceAccess.label, rationale: tc.governanceAccess.rationale, delivery: tc.governanceAccess.delivery } : null,
              5: tc.intelligenceSubstrate ? { label: tc.intelligenceSubstrate.label, rationale: tc.intelligenceSubstrate.rationale, delivery: tc.intelligenceSubstrate.delivery } : null,
              6: tc.aiRuntime ? { label: tc.aiRuntime.label, rationale: tc.aiRuntime.rationale, delivery: tc.aiRuntime.delivery } : null,
            };
            const tech = STEP_TECH[schemaStep];
            if (!tech) return null;
            if (tech.type === 'clusters' && tech.pills && tech.pills.length > 0) {
              return (
                <div style={{ marginBottom: '14px' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
                    {tech.pills.map(p => <span key={p} style={{ fontFamily: 'var(--font-mono)', fontSize: '9px', color: '#0c9488', background: 'rgba(12,148,136,0.1)', border: '1px solid rgba(12,148,136,0.2)', borderRadius: '3px', padding: '3px 7px' }}>{p}</span>)}
                  </div>
                </div>
              );
            }
            const badgeColor = tech.delivery === 'live' ? '#c8f0d0' : '#f5d97a';
            return (
              <div style={{ marginBottom: '14px' }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', fontWeight: 600, letterSpacing: '0.04em', color: '#09101f', background: badgeColor, borderRadius: '3px', padding: '4px 10px', display: 'inline-block', marginBottom: '6px' }}>{tech.label}</span>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: '12px', lineHeight: 1.5, color: 'var(--dj-chalk-muted)' }}>{tech.rationale}</p>
              </div>
            );
          })()}

          {/* Digital commentary inside/outside — replaces body text when available (steps 1-7 only) */}
          {schemaStep >= 1 && schemaStep <= 7 && (dc && dc.inside ? (
            <div>
              <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: '11px', fontWeight: 600, letterSpacing: '0.08em', color: '#f5d97a', marginBottom: '6px' }}>FROM THE INSIDE</div>
              <p className="digital-body" style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk)' }}>{dc.inside}</p>
              <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: '11px', fontWeight: 600, letterSpacing: '0.08em', color: '#2a6b5e', marginTop: '16px', marginBottom: '6px' }}>FROM THE OUTSIDE</div>
              <p className="digital-body" style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk)' }}>{dc.outside}</p>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 0' }}>
              <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#7dd3c8', animation: 'pulse-dot 1.2s ease-in-out infinite' }} />
              <span style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)' }}>Generating your configuration commentary...</span>
            </div>
          ))}
          {annotation.cascadeActors && annotation.cascadeActors.map(name => {
            const c = ACTOR_CASCADES[name];
            if (!c) return null;
            return (
              <div key={name} style={schema.cascadeCard}>
                <div style={schema.cascadeActor}>{name}</div>
                <div style={schema.cascadeFlow}>
                  <span style={schema.cascadeStep}>{c.action}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.signal}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.effect}</span>
                </div>
              </div>

          })}

          {/* Steward section (Step 8 final reveal) */}
          {annotation.stewardSection && (
            <div style={schema.stewardSection}>
              <h3 style={schema.stewardHeading}>{annotation.stewardSection.heading}</h3>
              <div style={schema.stewardSub}>{annotation.stewardSection.subheading}</div>
              <p style={schema.stewardBody}><BoldText text={annotation.stewardSection.body} /></p>
              <ul style={schema.stewardBullets}>
                {annotation.stewardSection.bullets.map((b, i) => (
                  <li key={i} style={schema.stewardBullet}>
                    <span style={{ color: '#c8f0d0', marginRight: '8px' }}>{'\u2022'}</span>{b}
                  </li>
                ))}
              </ul>
            </div>
          )}

          {annotation.showCTA && (
            <TalkToUsCTA journeyState={journeyState} style={{ ...s3.ctaButton, marginTop: '24px' }} />
          )}
        </div>
        );
      })()}

      {/* Navigation (steps 1-8) */}
      {schemaStep > 0 && (
        <div className="schema-step-nav" style={schema.stepNav}>
          <button style={styles.btnGhost} onClick={() => setSchemaStep(s => Math.max(s - 1, 0))}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '4px' }}>
              <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            {stepCfg.nav[0] || 'Back'}
          </button>
          {schemaStep < TOTAL_STEPS - 1 && (
            <button style={styles.btnSignal} onClick={() => setSchemaStep(s => s + 1)}>
              {stepCfg.nav[1] || 'Next'}
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '4px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Report capture modal ─────────────────────────────────────────── */
function ReportModal({ phase, journeyState, onClose }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [ecosystem, setEcosystem] = useState('');
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  const stageLabel = phase <= 1 ? 'behaviours' : phase <= 3 ? 'leverage' : 'digital_os';
  const qa = journeyState.qualifierAnswers || {};
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const healthRatio = stalls.length / 9;
  const healthScore = stalls.length === 0 ? 100 : Math.round((1 - healthRatio) * 100);

  const handleSubmit = async () => {
    if (!name || !email) return;
    setSending(true);

    const payload = {
      stage: stageLabel,
      name, email, ecosystem,
      sector: qa.clusterType || 'ecosystem',
      region: qa.clusterType || 'regional',
      stalls: stalls.map(id => { const s = STALLS.find(x => x.id === id); return { id, short: s ? s.name : id }; }),
      health: healthScore,
      stacks: stacks.map(s => ({ name: s.name, sev: 'high', desc: s.logic || '' })),
      commentary: '',
      stackCommentary: journeyState.stackCommentary || {},
      digitalCommentary: journeyState.digitalCommentary || null,
      techConfig: journeyState.techConfig || null,
      submitted_at: new Date().toISOString(),
      qualifier_answers: qa,
      config_name: (journeyState.osConfig || {}).configName || '',
    };

    try {
      await fetch('https://clusteros-v3-production.up.railway.app/api/v1/report-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) { console.error('Railway report error:', e); }

    try {
      await fetch('https://clusteros-v3-production.up.railway.app/api/v1/contact-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: name, email, cluster_name: ecosystem,
          engagement_type: 'diagnostic-report',
          message: `Stalls: ${stalls.join(', ')}. Health: ${healthScore}. Stacks: ${stacks.map(s=>s.name).join(', ')}`,
          submitted_at: new Date().toISOString(),
        }),
      });
    } catch (e) { console.error('HubSpot error:', e); }

    setSent(true);
    setTimeout(onClose, 3000);
  };

  return (
    <div style={sticky.modalOverlay} onClick={onClose}>
      <div style={sticky.modal} onClick={e => e.stopPropagation()}>
        {sent ? (
          <div style={{ textAlign: 'center', padding: '24px 0' }}>
            <p style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', color: 'var(--dj-chalk)' }}>
              Your report is on its way to {email}.
            </p>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginTop: '8px' }}>
              Check your inbox in the next minute.
            </p>
          </div>
        ) : (
          <React.Fragment>
            <h3 style={sticky.modalTitle}>Get your diagnostic report</h3>
            <p style={sticky.modalSub}>
              {stageLabel === 'behaviours' ? 'Behaviours report' : stageLabel === 'leverage' ? 'Behaviours + Leverage report' : 'Full diagnostic report'}
              {' · '}{stalls.length} stall{stalls.length !== 1 ? 's' : ''} identified
            </p>
            <div style={sticky.field}>
              <label style={sticky.label}>Your name</label>
              <input style={sticky.input} type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Full name" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your email</label>
              <input style={sticky.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="work@example.com" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your ecosystem name</label>
              <input style={sticky.input} type="text" value={ecosystem} onChange={e => setEcosystem(e.target.value)} placeholder="e.g. Edinburgh Life Sciences" />
            </div>
            <button style={{ ...sticky.submitBtn, opacity: (name && email) ? 1 : 0.4 }} onClick={handleSubmit} disabled={sending || !name || !email}>
              {sending ? 'Sending...' : 'Send my report →'}
            </button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ─── Transition card between stages ───────────────────────────────── */
function TransitionCard({ transitionType, journeyState, onContinue, onStop, onBack, updateJourneyState }) {
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const stallNames = stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; });
  const qa = journeyState.qualifierAnswers || {};

  const backBtn = onBack ? (
    <button style={styles.btnGhost} onClick={onBack}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
        <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      Back
    </button>
  ) : null;

  // Transition: Stage 1 (stalls) → Qualifier questions
  if (transitionType === 'stalls-to-qualifiers') {
    return (
      <div style={trans.card}>
        {/* Heading */}
        <h2 style={trans.heading}>
          Your ecosystem isn't stalling in {stalls.length} places. It's running {stacks.length} reinforcing pattern{stacks.length !== 1 ? 's' : ''}.
        </h2>

        {/* Explainer */}
        <p style={trans.subtext}>
          A stack is a set of behaviours that reinforce each other. Fixing one leaves the others intact. The pattern persists.
        </p>

        {/* Stack cards */}
        {stacks.length > 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '20px' }}>
            {stacks.map(s => {
              const triggerNames = (s.triggers || []).map(id => { const st = STALLS.find(x => x.id === id); return st ? st.name : id; });
              let logic = s.logic || '';
              const firstSentence = logic.split('.')[0];
              logic = firstSentence.split(/\s+/).length > 30 ? firstSentence.split(/\s+/).slice(0, 30).join(' ') + '...' : firstSentence + '.';
              const comparators = (s.comparators || []).slice(0, 3);
              return (
                <div key={s.id} style={trans.stackCard}>
                  <div style={trans.stackCardName}>{s.name}</div>
                  <p style={trans.stackCardLogic}>{logic}</p>
                  <div style={trans.stackCardPills}>
                    {triggerNames.map(name => (
                      <span key={name} style={trans.stallPill}>{name}</span>
                    ))}
                  </div>
                  {comparators.length > 0 && (
                    <div style={{ marginTop: '10px' }}>
                      <span style={{ fontFamily: 'var(--font-sans)', fontSize: '11px', color: 'var(--dj-chalk-muted)', marginRight: '6px' }}>Also detected in:</span>
                      {comparators.map((c, i) => {
                        const name = typeof c === 'string' ? c : (c.name || '');
                        const slug = typeof c === 'object' && c.slug ? c.slug : toClusterSlug(name);
                        return name ? <a key={i} className="comparator-pill" href={`/clusters/${slug}.html`} target="_blank" rel="noopener" style={trans.comparatorPill}>{name}</a> : null;
                      })}
                    </div>
                  )}
                  <a href="#" data-stack-id={s.id} style={{ display: 'inline-block', marginTop: '8px', fontFamily: 'var(--font-sans)', fontSize: '12px', color: '#0c9488', textDecoration: 'none' }}>
                    &rarr; Read the Lab Note
                  </a>
                </div>
              );
            })}
          </div>
        ) : (
          <p style={trans.subtext}>{stalls.length} independent stall{stalls.length !== 1 ? 's' : ''} identified — {stallNames.join(', ')}. No reinforcing combinations detected.</p>
        )}

        {/* Blind Spot */}
        {(() => {
          // Compute blind spot: most common co-occurring stall across comparator clusters not selected by steward
          const stallSet = new Set(stalls);
          const coStallAgg = {};
          // D = total unique comparator clusters across all detected stacks
          const allComparatorNames = new Set();
          stacks.forEach(s => {
            if (s.coStallCounts) {
              Object.entries(s.coStallCounts).forEach(([sid, count]) => {
                if (!stallSet.has(sid)) coStallAgg[sid] = (coStallAgg[sid] || 0) + count;
              });
            }
            (s.comparators || []).forEach(c => { const n = typeof c === 'string' ? c : (c.name || ''); if (n) allComparatorNames.add(n); });
          });
          const totalUniqueComparators = allComparatorNames.size;
          const sorted = Object.entries(coStallAgg).sort((a, b) => b[1] - a[1]);
          if (sorted.length === 0) return null;
          const [blindSpotId, blindSpotCount] = sorted[0];
          const blindSpotStall = STALLS.find(s => s.id === blindSpotId);
          if (!blindSpotStall) return null;
          const stackNameStr = stacks.map(s => s.name).join(' and ');
          return (
            <div style={trans.blindSpotBox}>
              <div style={trans.blindSpotLabel}>STEWARD'S BLIND SPOT</div>
              <h4 style={trans.blindSpotHeading}>{blindSpotStall.name} — you didn't identify this.</h4>
              <p style={trans.blindSpotBody}>
                Ecosystems running {stackNameStr} also show {blindSpotStall.name}. Either it isn't present in your ecosystem — or it hasn't surfaced yet.
              </p>
              <button
                style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: '13px', color: '#0c9488', padding: 0 }}
                onClick={() => {
                  if (updateJourneyState) updateJourneyState({ blindSpotStall: blindSpotId });
                  if (onBack) onBack();
                }}
              >
                &rarr; Go back and check
              </button>
            </div>
          );
        })()}

        {/* Handover section */}
        <div style={{ marginTop: '24px', borderTop: '1px solid #1e2f45', paddingTop: '24px' }}>
          <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '20px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '12px', letterSpacing: '-0.01em' }}>
            Where does this pattern break?
          </h3>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '12px' }}>
            Stacks don't break through effort — they break through structural intervention at a specific entry point. To identify that entry point for your ecosystem, we need to understand your configuration: what type of cluster you run, who your anchor is, what you're trying to protect, and where coordination is failing.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '24px' }}>
            6 questions. Your answers will shape everything that follows — the leverage hypotheses, the infrastructure recommendation, and the report you receive.
          </p>
        </div>

        {/* Buttons */}
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={{ ...styles.btnSignal, marginLeft: 'auto', background: '#7dd3c8', color: '#1e2f45' }} onClick={onContinue}>
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Qualifiers completed → Stage 2 Leverage
  if (transitionType === 'qualifiers-to-leverage') {
    const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'your ecosystem';
    const anchorLabel = ANCHOR_LABELS[qa.anchorType] || 'Anchors';

    return (
      <div style={trans.card}>
        <p style={trans.text}>
          You've told us enough to locate your leverage. {articleFor(clusterLabel)} {clusterLabel} with {articleFor(anchorLabel).toLowerCase()} {anchorLabel} anchor running:
        </p>
        {stacks.length > 0 ? (
          <div style={{ margin: '0 0 16px 0' }}>
            {stacks.map(s => (
              <div key={s.id} style={trans.stackLine}>— {s.name}</div>
            ))}
          </div>
        ) : (
          <div style={{ margin: '0 0 16px 0' }}>
            <div style={trans.stackLine}>— independent stall patterns</div>
          </div>
        )}
        <p style={trans.text}>has a specific intervention entry point. Here's where it is.</p>
        <div style={trans.actions}>
          {backBtn}
          <button style={{ ...styles.btnSignal, marginLeft: 'auto' }} onClick={onContinue}>
            See your leverage
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Stage 2 Leverage → Stage 3 Digital OS
  if (transitionType === 'leverage-to-os') {
    const allStackNames = stacks.length > 0 ? stacks.map(s => s.name).join(', ') : stallNames.join(', ');
    const body = `Your leverage hypotheses target ${allStackNames} — the reinforcing logic between stalls, not individual stalls in isolation. The next stage translates this into infrastructure: what your ecosystem needs to be built on, configured for your specific context.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue to Digital OS
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  return null;
}

/* ─── Main app ─────────────────────────────────────────────────────── */
/* ─── Flow phases:
     0: behaviours (Stage 1)
     1: transition stalls→qualifiers
     2: qualifier questions
     3: transition qualifiers→leverage
     4: leverage (Stage 2)
     5: transition leverage→os
     6: digital os (Stage 3)
   ── */
function DiagnosticJourney() {
  const [phase, setPhase] = useState(-1);
  const [exited, setExited] = useState(false);
  const [exitedAt, setExitedAt] = useState(null);
  const [showExitModal, setShowExitModal] = useState(false);
  const [loadingCommentary, setLoadingCommentary] = useState(false);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],
    stacks: [],
    leverageHypotheses: [],
    qualifierAnswers: {},
    osConfig: null,
    stackCommentary: {},
    digitalCommentary: null,
  });

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => {
      const next = { ...prev, ...patch };
      // Clear internal flag after read
      delete next._reviseQualifiers;
      return next;
    });
  }, []);

  // Handle "Revise answers" from Stage 3
  useEffect(() => {
    if (journeyState._reviseQualifiers) {
      setPhase(2); // jump to qualifier questions
    }
  }, [journeyState._reviseQualifiers]);

  /* ── Phase navigation ── */
  const goNext = useCallback(() => {
    if (phase === 0) setPhase(1);       // behaviours → transition
    else if (phase === 1) setPhase(2);  // transition → qualifiers
    else if (phase === 2) setPhase(3);  // qualifiers done → transition (called by QualifierQuestions onComplete)
    else if (phase === 3) setPhase(4);  // transition → leverage
    else if (phase === 4) setPhase(5);  // leverage → transition
    else if (phase === 5) setPhase(6);  // transition → digital os
  }, [phase]);

  const goBack = useCallback(() => {
    if (phase === 1) setPhase(0);       // transition → behaviours
    else if (phase === 2) setPhase(0);  // qualifiers → behaviours (back to stall selection)
    else if (phase === 3) setPhase(2);  // transition → qualifiers
    else if (phase === 4) setPhase(3);  // leverage → transition (which auto-shows post-qualifier)
    else if (phase === 5) setPhase(4);  // transition → leverage
    else if (phase === 6) setPhase(4);  // digital os → leverage
  }, [phase]);

  const requestExit = useCallback(() => { setShowExitModal(true); }, []);
  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    // Map phase to stage for exit summary
    const stageIndex = phase <= 1 ? 0 : phase <= 3 ? 0 : phase <= 5 ? 1 : 2;
    setExitedAt(stageIndex);
    setExited(true);
  }, [phase]);
  const cancelExit = useCallback(() => { setShowExitModal(false); }, []);

  /* ── Parse commentary response into 3 sections ── */
  function parseCommentary(text) {
    const sections = { diagnosis: '', consequence: '', mechanism: '' };
    const strip = s => s.replace(/\*\*/g, '').trim();
    const diagMatch = text.match(/DIAGNOSIS[:\s]*(.+?)(?=CONSEQUENCE|$)/is);
    const consMatch = text.match(/CONSEQUENCE[:\s]*(.+?)(?=MECHANISM|$)/is);
    const mechMatch = text.match(/MECHANISM[:\s]*(.+?)$/is);
    if (diagMatch) sections.diagnosis = strip(diagMatch[1]);
    if (consMatch) sections.consequence = strip(consMatch[1]);
    if (mechMatch) sections.mechanism = strip(mechMatch[1]);
    if (!sections.diagnosis && !sections.consequence && !sections.mechanism) {
      sections.diagnosis = strip(text);
    }
    return sections;
  }

  /* ── Commentary fetch after qualifiers complete ── */
  const handleQualifierComplete = useCallback(() => {
    const stacks = journeyState.detectedStacks || [];
    const qa = journeyState.qualifierAnswers || {};
    const STAGE_LABEL_MAP = { early: 'Early-stage', established: 'Established', mature: 'Mature' };
    const PRIORITY_LABEL_MAP = { talent: 'Retain & grow local talent', capital: 'Attract external capital', research: 'Convert research to commercial activity', supply: 'Build anchor supply chains', growth: 'Drive economic growth' };
    const GAP_LABEL_MAP = { discovery: "Actors can't find each other", flow: "Knowledge doesn't flow between groups", access: "Outside actors can't engage", conversion: "Activity isn't converting to outcomes" };
    const PROTECT_LABEL_MAP = { knowledge: 'Local knowledge staying local', ip: 'Institutional IP and research', trust: 'Community relationships and trust', talent: 'Founder and talent pipeline', sovereignty: 'Economic sovereignty' };

    const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'Regional Speciality';
    const anchorLabel = ANCHOR_LABELS[qa.anchorType] || 'Anchors';
    const scaleLabel = STAGE_LABEL_MAP[qa.stage] || 'Established';
    const priorityLabel = PRIORITY_LABEL_MAP[qa.priority] || 'Drive economic growth';
    const gapLabel = GAP_LABEL_MAP[qa.gap] || '';
    const protectList = (qa.protect || []).map(p => PROTECT_LABEL_MAP[p] || p).join(', ');

    // If no stacks and no qualifier data worth sending, skip
    if (stacks.length === 0 && !qa.clusterType) { setPhase(3); return; }

    setLoadingCommentary(true);

    // Compute techConfig
    const protect = qa.protect || [];
    const selectedStalls = journeyState.stalls || [];
    const techConfig = {
      aiRuntime: (protect.includes('sovereignty') || protect.includes('ip'))
        ? { recommendation: 'SLM', label: 'Small Language Model — on-premise', rationale: 'Your protection priorities require inference that stays within your sovereign boundary. A Small Language Model deployed within your infrastructure keeps all reasoning inside your ecosystem.', delivery: 'scoped' }
        : { recommendation: 'LLM', label: 'Large Language Model — Anthropic Claude', rationale: 'Cloud inference via Anthropic API. Role-aware and ecosystem-context-aware. Every response is grounded in your sovereign database.', delivery: 'live' },
      intelligenceSubstrate: (qa.stage === 'early' || qa.anchorType === 'none')
        ? { recommendation: 'Clawbot', label: 'Clawbot — lightweight intelligence agent', rationale: 'At early stage, full MCP infrastructure is ahead of where your ecosystem is. Clawbot handles signal monitoring, stall detection, and actor matching with lower overhead.', delivery: 'scoped' }
        : { recommendation: 'MCP', label: 'MCP Intelligence Substrate', rationale: 'Full Model Context Protocol substrate. Each AI capability is a structured tool call against your live sovereign database.', delivery: 'live' },
      governanceAccess: (qa.anchorType === 'public' || qa.anchorType === 'hospital')
        ? { model: 'regulatory', label: 'Regulatory compliance model', rationale: 'Public sector anchor requires GDPR-aligned data residency, full audit trail, and explicit consent records for every cross-boundary data flow.', delivery: 'scoped' }
        : protect.includes('trust')
          ? { model: 'relationship-first', label: 'Relationship-first access model', rationale: 'Trust tiers built on existing institutional structures. Actors gain access through verified relationships before role-based permissions apply.', delivery: 'scoped' }
          : { model: 'standard', label: 'Federated governance — standard', rationale: 'Identity-first, role-based access across the full hierarchy. Full audit trail. Every data flow across the sovereign boundary requires a consent record.', delivery: 'live' },
      sovereignDatabase: {
        clusters: [
          ...(selectedStalls.includes('S2') ? ['Coordination pathways'] : []),
          ...(selectedStalls.includes('S6') ? ['Anchor engagement pipeline'] : []),
          ...(selectedStalls.includes('S1') ? ['Evidence & validation records'] : []),
          ...(selectedStalls.includes('S7') ? ['Narrative vs outcome tracking'] : []),
          ...(selectedStalls.includes('S4') ? ['Value flow audit trail'] : []),
          ...(selectedStalls.includes('S9') ? ['Permission & dependency records'] : []),
          ...(selectedStalls.includes('S3') ? ['Talent retention signals'] : []),
          ...(selectedStalls.includes('S5') ? ['Intermediary relationship map'] : []),
          ...(selectedStalls.includes('S8') ? ['Activity-to-outcome conversion'] : []),
        ],
        clusterType: qa.clusterType,
      },
    };
    setJourneyState(prev => ({ ...prev, techConfig }));

    // 1. Stack commentary calls (one per stack)
    const stackCalls = stacks.map(stack => {
      const stallNames = (stack.triggers || []).map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; }).join(' and ');
      const prompt = `You are a diagnostic analyst for ClusterOS. A ${clusterLabel} with a ${anchorLabel} anchor has identified the following behavioural stall pattern: ${stack.name} — a reinforcing combination of ${stallNames}. The reinforcing logic is: ${stack.logic || ''}. The leverage entry point is: ${stack.entry || ''}. Their strategic priority is ${priorityLabel}. Their biggest coordination gap is ${gapLabel}. They are protecting: ${protectList || 'not specified'}. Their ecosystem is ${scaleLabel} stage.\n\nWrite three sections — DIAGNOSIS, CONSEQUENCE, MECHANISM.\n\nEach section is exactly one sentence. Maximum 30 words per sentence. No exceptions.\n\nDIAGNOSIS: What this specific stack pattern means for this ecosystem type and anchor combination. Name the stack.\nCONSEQUENCE: What remains locked if this stack is not addressed, connected directly to their stated priority.\nMECHANISM: The single most targeted intervention that addresses the entry point. Be concrete and specific to this configuration.\n\nRules:\n- Do not use markdown formatting. No asterisks, no bold markers, no bullet points.\n- Do not use the words "platform", "solution", "leverage" or "dashboard".\n- Do not add preamble, labels, or any text outside the three sections.\n- Write for a Chief Executive who recognises their ecosystem in every sentence.\n- Each section must start with its label followed by a colon.\n\nFormat:\nDIAGNOSIS: [one sentence]\nCONSEQUENCE: [one sentence]\nMECHANISM: [one sentence]`;

      return fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return null;
          // Extract text from any response format
          let text = data.commentary || data.text || '';
          if (!text && Array.isArray(data.content) && data.content[0]) text = data.content[0].text || '';
          if (!text && typeof data === 'string') text = data;
          if (!text) { console.warn(`[Stack ${stack.id}] No text in response. Keys:`, Object.keys(data)); return null; }
          // Strip markdown code fences robustly
          text = String(text)
            .replace(/^```json\s*/i, '')
            .replace(/^```\s*/i, '')
            .replace(/```\s*$/i, '')
            .trim();
          console.log(`[Stack ${stack.id}] Cleaned text:`, text.substring(0, 100));
          return { stackId: stack.id, ...parseCommentary(text) };
        })
        .catch(err => { console.warn(`[Stack ${stack.id}] Fetch failed:`, err.message); return null; });
    });

    // 2. Digital commentary call (one call for all 7 layers)
    const stackDescs = stacks.map(s => `${s.name} — ${s.logic || ''}`).join('; ');
    const digitalPrompt = `You are writing the narrative for a digital infrastructure recommendation for a regional innovation ecosystem steward. Write in the voice of a trusted senior advisor — specific, direct, no jargon. Think McKinsey partner who also understands complex adaptive systems.\n\nThis steward runs a ${clusterLabel} with a ${anchorLabel} anchor. Their ecosystem is ${scaleLabel} stage. Their strategic priority is ${priorityLabel}. Their coordination gap is ${gapLabel}. They are protecting: ${protectList || 'not specified'}. Their diagnostic has identified these stacks: ${stackDescs || 'no reinforcing stacks detected — independent stall patterns'}.\n\nWrite commentary for each of the following 7 infrastructure layers. For each layer write exactly two short sections:\n\nFROM THE INSIDE: 2 sentences maximum. What actors in this ecosystem currently experience without this layer — the specific friction, invisibility, or wasted motion that this steward's ecosystem has, given their stalls and stacks.\n\nFROM THE OUTSIDE: 2 sentences maximum. What this steward specifically gains when this layer is working — the signal, pattern, or evidence that becomes visible to them, connected to their priority and coordination gap.\n\nLayers to cover:\n1. sovereignDatabase — the structured record layer\n2. governanceAccess — governance and access control layer\n3. integrationLayer — external data and cold-start layer\n4. automationLayer — bot network and continuous enrichment\n5. intelligenceSubstrate — intelligence tool substrate\n6. aiRuntime — AI reasoning engine\n7. applicationLayer — personalised pathway and actor experience layer\n\nRules:\n- Name detected stacks and stalls in the text where relevant — they are proper nouns, not generic descriptions\n- Never use the words "platform", "solution", "leverage" or "dashboard"\n- Never explain what ClusterOS is — the steward already completed the diagnostic\n- Write as if continuing a conversation that started in the Leverage section\n- Each FROM THE INSIDE must describe something this specific steward will recognise from their own ecosystem\n- Each FROM THE OUTSIDE must connect to their stated priority: ${priorityLabel}\n\nTechnology configuration for this ecosystem:\n- AI Runtime: ${techConfig.aiRuntime.label} — ${techConfig.aiRuntime.rationale}\n- Intelligence Substrate: ${techConfig.intelligenceSubstrate.label} — ${techConfig.intelligenceSubstrate.rationale}\n- Governance model: ${techConfig.governanceAccess.label} — ${techConfig.governanceAccess.rationale}\n- Sovereign Database priority clusters: ${techConfig.sovereignDatabase.clusters.join(', ') || 'general'}\n\nWrite commentary that references these specific technology choices. Do not present generic options — present the recommendation that has already been made for this configuration.\n\nReturn as JSON only, no preamble:\n{"sovereignDatabase":{"inside":"...","outside":"..."},"governanceAccess":{"inside":"...","outside":"..."},"integrationLayer":{"inside":"...","outside":"..."},"automationLayer":{"inside":"...","outside":"..."},"intelligenceSubstrate":{"inside":"...","outside":"..."},"aiRuntime":{"inside":"...","outside":"..."},"applicationLayer":{"inside":"...","outside":"..."}}`;

    const digitalCall = (function() {
      console.log('[Digital Commentary] Firing API call');
      return fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: digitalPrompt }),
      })
        .then(r => {
          console.log('[Digital Commentary] Response status:', r.status);
          return r.ok ? r.text() : null;
        })
        .then(rawText => {
          if (!rawText) { console.warn('[Digital Commentary] Empty response'); return null; }

          // Step 1: Parse the API wrapper
          let data;
          try { data = JSON.parse(rawText); } catch (e) { console.error('[Digital Commentary] API response not JSON:', e.message); return null; }

          // Step 2: Extract the inner text from any response format
          let innerText = '';
          if (data.sovereignDatabase) { console.log('[Digital Commentary] Direct result object'); return data; }
          if (data.commentary) innerText = data.commentary;
          else if (data.text) innerText = data.text;
          else if (Array.isArray(data.content) && data.content[0] && data.content[0].text) innerText = data.content[0].text;
          else if (typeof data === 'string') innerText = data;

          if (!innerText) { console.warn('[Digital Commentary] No text extracted. Keys:', Object.keys(data)); return null; }
          console.log('[Digital Commentary] Inner text (first 200):', String(innerText).substring(0, 200));

          // If innerText is already an object
          if (typeof innerText === 'object' && innerText.sovereignDatabase) { console.log('[Digital Commentary] Inner text is object'); return innerText; }

          // Step 3: Clean markdown fences robustly
          let cleaned = String(innerText)
            .replace(/^```json\s*/i, '')
            .replace(/^```\s*/i, '')
            .replace(/```\s*$/i, '')
            .trim();
          console.log('[Digital Commentary] After fence strip (first 200):', cleaned.substring(0, 200));

          // Step 4: Parse the cleaned text
          try {
            const parsed = JSON.parse(cleaned);
            if (parsed.sovereignDatabase) {
              console.log('[Digital Commentary] SUCCESS — parsed. Keys:', Object.keys(parsed));
              return parsed;
            }
          } catch (e) {
            console.error('[Digital Commentary] Parse failed:', e.message);
            // Last resort: extract JSON block
            const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              try {
                const parsed = JSON.parse(jsonMatch[0]);
                if (parsed.sovereignDatabase) { console.log('[Digital Commentary] SUCCESS — extracted JSON block'); return parsed; }
              } catch (e2) { console.error('[Digital Commentary] JSON block parse also failed:', e2.message); }
            }
            console.error('[Digital Commentary] Raw cleaned text:', cleaned.substring(0, 500));
          }
          return null;
        })
        .catch(err => { console.error('[Digital Commentary] Fetch error:', err.message); return null; });
    })();

    // Wait for all calls
    Promise.all([Promise.all(stackCalls), digitalCall]).then(([stackResults, digitalResult]) => {
      console.log('[Commentary] Stack results:', stackResults.filter(Boolean).length, 'Digital result:', !!digitalResult);
      if (digitalResult) {
        console.log('[Commentary] Digital commentary loaded:', digitalResult);
        console.log('[Commentary] Digital keys:', Object.keys(digitalResult));
      } else {
        console.warn('[Commentary] Digital commentary is NULL — fallback text will show');
      }
      const commentary = {};
      stackResults.forEach(r => {
        if (r) commentary[r.stackId] = { diagnosis: r.diagnosis, consequence: r.consequence, mechanism: r.mechanism };
      });
      setJourneyState(prev => {
        const next = {
          ...prev,
          stackCommentary: { ...prev.stackCommentary, ...commentary },
          digitalCommentary: digitalResult || prev.digitalCommentary || null,
        };
        console.log('[Commentary] Stored digitalCommentary:', !!next.digitalCommentary);
        return next;
      });
      setLoadingCommentary(false);
      setPhase(3);
    });
  }, [journeyState.detectedStacks, journeyState.qualifierAnswers]);

  // Map phase to stage index for indicators
  const currentStage = phase <= 2 ? 0 : phase <= 4 ? 1 : 2;
  const completedUpTo = phase >= 4 ? (phase >= 6 ? 2 : 1) : 0;

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage = STAGES[currentStage];
  const isFirst = phase <= 0;
  const isLast = phase === 6;

  // Stage 0 — intro screen (no step indicator, no nav, no sticky bar)
  if (phase === -1) {
    return (
      <div style={{ minHeight: '100vh', background: 'var(--dj-bg)', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        {/* Minimal header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 32px', flexShrink: 0 }}>
          <a href="/" style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', color: 'var(--dj-chalk)', textDecoration: 'none', letterSpacing: '-0.01em' }}>
            Cluster<span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, fontSize: '14px', color: '#2a7a4f' }}>OS</span>
          </a>
          <a href="https://clusteros.io" style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--dj-chalk-muted)', textDecoration: 'none', letterSpacing: '0.04em' }}>
            &larr; Back to site
          </a>
        </div>
        {/* Content */}
        <main className="stage0-main" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 32px' }}>
          <div style={s0.container}>
            <h1 style={s0.heading}>Find out what's holding your ecosystem back.</h1>
            <p style={s0.body}>
              Select the behavioural patterns you recognise in your ecosystem. We'll identify the reinforcing dynamics — and show you what to do about them.
            </p>
            <div className="s0-outputs" style={s0.outputRow}>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Report</div>
                <div style={s0.outputText}>Stall profile and stack analysis, emailed to you</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Leverage</div>
                <div style={s0.outputText}>Intervention hypotheses with confidence ratings</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Digital OS</div>
                <div style={s0.outputText}>Infrastructure configuration recommendation</div>
              </div>
            </div>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginBottom: '24px' }}>
              8–12 minutes
            </p>
            <button className="s0-cta-btn" style={s0.cta} onClick={() => setPhase(0)}>
              Start the diagnostic
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '8px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </main>
      </div>
    );
  }

  // Determine what to show in main content area
  let mainContent;
  if (phase === 0) {
    mainContent = <BehavioursStage />;
  } else if (phase === 1) {
    mainContent = (
      <TransitionCard transitionType="stalls-to-qualifiers" journeyState={journeyState}
        onContinue={goNext}
        onBack={() => setPhase(0)}
        onStop={() => { console.log('stop-behaviours'); setExitedAt(0); setExited(true); }}
        updateJourneyState={updateJourneyState} />
    );
  } else if (phase === 2 && loadingCommentary) {
    mainContent = (
      <div style={{ width: '100%', maxWidth: '480px', textAlign: 'center', padding: '80px 0' }}>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '24px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '12px' }}>
          Preparing your leverage analysis
        </h2>
        <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', color: 'var(--dj-chalk-muted)', marginBottom: '24px' }}>
          Analysing your configuration against detected stacks
        </p>
        <div style={{ display: 'flex', justifyContent: 'center', gap: '6px' }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              width: '8px', height: '8px', borderRadius: '50%', background: 'var(--steward)',
              animation: `pulse-dot 1.2s ease-in-out ${i * 0.2}s infinite`,
            }} />
          ))}
        </div>
      </div>
    );
  } else if (phase === 2) {
    mainContent = <QualifierQuestions onComplete={handleQualifierComplete} />;
  } else if (phase === 3) {
    mainContent = (
      <TransitionCard transitionType="qualifiers-to-leverage" journeyState={journeyState}
        onContinue={goNext} onBack={() => setPhase(2)} onStop={() => {}} />
    );
  } else if (phase === 4) {
    mainContent = <LeverageStage />;
  } else if (phase === 5) {
    mainContent = (
      <TransitionCard transitionType="leverage-to-os" journeyState={journeyState}
        onContinue={goNext}
        onStop={() => { console.log('stop-leverage'); setExitedAt(1); setExited(true); }} />
    );
  } else {
    mainContent = <DigitalOSStage />;
  }

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          {mainContent}
        </main>

        {/* ── Navigation bar (hidden on transition cards and Stage 3 which has its own stepper nav) ── */}
        {phase !== 1 && phase !== 3 && phase !== 5 && phase !== 6 && (
          <nav className="nav-bar-journey" style={styles.navBar}>
            <div style={styles.navLeft}>
              {!isFirst && (
                <button style={styles.btnGhost} onClick={goBack}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                    <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Back
                </button>
              )}
            </div>
            <div style={styles.navRight}>
              {phase !== 2 && !isLast && (
                <button style={styles.btnSignal} onClick={goNext}>
                  Continue
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                    <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              )}
            </div>
          </nav>
        )}

        {/* ── Sticky bar ── */}
        <StickyBar phase={phase} journeyState={journeyState} />

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}

}
