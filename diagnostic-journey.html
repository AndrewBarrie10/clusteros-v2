<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic Journey — ClusterOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Dark journey surface (namespaced to avoid site-var drift) ── */
  --dj-bg:      #09101f;
  --dj-surface: #111c2e;
  --dj-border:  #1e2f45;
  --dj-chalk:   #e8edf5;
  --dj-chalk-dim: #8a95a8;
  --dj-chalk-muted: #576275;

  /* ── Shared with site (same values — safe to reference) ── */
  --signal:     #c8f0d0;
  --founder:    #f5d97a;   /* amber in journey palette */
  --steward:    #7dd3c8;   /* teal in journey palette */
  --researcher: #f08080;   /* danger/coral */
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'Geist', system-ui, -apple-system, sans-serif;
  --font-mono:  'Geist Mono', monospace;
}

html { background: var(--dj-bg); color: var(--dj-chalk); font-family: var(--font-sans); }
body { min-height: 100vh; }
#root { min-height: 100vh; display: flex; flex-direction: column; }
@media (max-width: 680px) { .stall-grid { grid-template-columns: repeat(2, 1fr) !important; } }
@media (max-width: 420px) { .stall-grid { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useCallback, useMemo, useEffect, createContext, useContext } = React;

/* ─── Stage definitions ────────────────────────────────────────────── */
const STAGES = [
  { id: 'behaviours', label: 'Behaviours',  subtitle: 'Stall identification & stack detection' },
  { id: 'leverage',   label: 'Leverage',     subtitle: 'Intervention hypotheses' },
  { id: 'digital-os', label: 'Digital OS',   subtitle: 'Architecture recommendation' },
];

/* ─── Stall data ───────────────────────────────────────────────────── */
const STALLS = [
  { id: 'S1', name: 'Re-proving',       sub: 'Resources flow to justification rather than execution. The ecosystem repeats the case for its own existence.' },
  { id: 'S2', name: 'Coordinating',     sub: 'Coordination becomes the output rather than the mechanism. Meetings and alignment substitute for committed action.' },
  { id: 'S3', name: 'Forgiving',        sub: 'Poor performance is tolerated to preserve relationships. Accountability systems are systematically avoided.' },
  { id: 'S4', name: 'Extracting',       sub: 'Anchor institutions extract value rather than circulating it. Talent, IP, and capital flow outward.' },
  { id: 'S5', name: 'Mediating',        sub: 'The ecosystem manages relationships between actors rather than enabling transactions between them.' },
  { id: 'S6', name: 'Stabilising',      sub: 'The ecosystem optimises for stability over adaptation. Existing structures are preserved even when they no longer serve.' },
  { id: 'S7', name: 'Narrating',        sub: 'Stories about progress substitute for evidence of change. Reporting substitutes for impact.' },
  { id: 'S8', name: 'Scaling Activity', sub: 'Early-stage activity is celebrated rather than evaluated. The ecosystem optimises for inputs and starts rather than outcomes.' },
  { id: 'S9', name: 'Waiting',          sub: 'Action is deferred pending external conditions — funding, policy clarity, anchor commitment. Waiting becomes structural.' },
];

/* ─── Stack detection rules + leverage hypotheses ──────────────────── */
const STACK_RULES = [
  { id: 'STK-05', name: 'Mediated Dependency Loop',    triggers: ['S5', 'S9'],
    logic: 'Mediation defers action to external actors, who are themselves waiting — creating a self-reinforcing dependency cycle where no party moves first.',
    regime: 'The ecosystem is locked into perpetual standby — every actor waits for another to move, and mediation sustains the waiting as productive activity.',
    entry: 'Identify the actor with the least to lose from unilateral action and change their constraint — not their willingness.',
    effect: 'One committed move breaks the symmetry of waiting; other actors follow once the cost of inaction exceeds the cost of going second.',
    confidence: 'High' },
  { id: 'STK-12', name: 'Evidence Without Commitment',  triggers: ['S1', 'S7'],
    logic: 'Re-proving generates narrative to justify existence, while narrating substitutes reporting for impact — evidence accumulates but never converts to committed action.',
    regime: 'The ecosystem is locked into a justification cycle — evidence is produced to sustain funding, not to inform decisions or trigger execution.',
    entry: 'Secure a single credible external validator who makes the case once and commits publicly, removing the need for continuous internal re-proving.',
    effect: 'Resources shift from justification to execution; narrative production drops as the case becomes settled rather than perpetually contested.',
    confidence: 'High' },
  { id: 'STK-03', name: 'Incumbent Lock',               triggers: ['S6', 'S4'],
    logic: 'Stabilising preserves structures that enable extraction — anchors maintain their position while the ecosystem optimises around them rather than adapting.',
    regime: 'The ecosystem is locked into serving incumbent anchors — stability protects extraction channels, and extraction funds the stability apparatus.',
    entry: 'Change anchor procurement or spin-out policy to redirect value circulation, rather than asking anchors to voluntarily change behaviour.',
    effect: 'Value begins circulating within the ecosystem; new entrants gain access to resources previously captured by incumbents.',
    confidence: 'Medium' },
  { id: 'STK-01', name: 'Activity-Alignment Stack',     triggers: ['S7', 'S2'],
    logic: 'The ecosystem reports activity to justify coordination, and coordinates to generate reportable activity. Neither breaks without changing both.',
    regime: 'The ecosystem is locked into performative coordination — meetings and reports are the primary output, and both exist to justify the other.',
    entry: 'Change what gets reported — shift metrics from activity and alignment to outcomes and commitments — before changing governance.',
    effect: 'Coordination without reportable outcomes loses justification; actors redirect effort toward measurable change.',
    confidence: 'High' },
  { id: 'STK-02', name: 'Justification Stack',          triggers: ['S1', 'S8'],
    logic: 'Early-stage activity is used as proof of concept rather than evaluated against outcomes. The case for scaling is never quite strong enough.',
    regime: 'The ecosystem is locked into pilot mode — starts accumulate but never graduate, because each is used as evidence rather than evaluated as progress.',
    entry: 'Change the measurement layer — redefine success from number of starts to rate of graduation — before changing programme design.',
    effect: 'Activity that does not convert to outcomes loses funding priority; resources concentrate on fewer, higher-conviction bets.',
    confidence: 'Medium' },
  { id: 'STK-04', name: 'Relationship Stack',           triggers: ['S2', 'S5'],
    logic: 'The ecosystem manages relationships as the primary output. Transactions are replaced by partnerships, and partnerships by further coordination.',
    regime: 'The ecosystem is locked into relationship maintenance — partnerships are preserved as ends in themselves, substituting for the transactions they were meant to enable.',
    entry: 'Restructure incentives so that actors benefit from completed transactions, not from maintaining partnership status.',
    effect: 'Partnerships that do not produce transactions dissolve naturally; remaining relationships become functional rather than ceremonial.',
    confidence: 'Medium' },
  { id: 'STK-06', name: 'Anchor Dependency Stack',      triggers: ['S5', 'S4'],
    logic: 'The ecosystem organises itself around managing anchor institutions rather than changing their behaviour. Value flows out while relationships are maintained.',
    regime: 'The ecosystem is locked into anchor servicing — mediation effort flows toward keeping anchors comfortable rather than changing their extraction behaviour.',
    entry: 'Change anchor procurement or IP policy at the institutional level, creating structural incentives for value to circulate rather than extract.',
    effect: 'Mediation effort redirects from relationship management to transaction facilitation; anchor behaviour shifts through changed constraints.',
    confidence: 'Low' },
  { id: 'STK-07', name: 'Tolerance Stack',              triggers: ['S8', 'S3'],
    logic: 'Poor performance at scale is tolerated to avoid disrupting the narrative of progress. Accountability is systematically deferred.',
    regime: 'The ecosystem is locked into tolerance of underperformance — scaling activity provides cover, and forgiving prevents the accountability that would expose it.',
    entry: 'Introduce conditional continuation — a funder or anchor changes the terms under which they will continue to support, creating accountability without confrontation.',
    effect: 'Underperforming programmes lose automatic renewal; resources shift toward programmes that demonstrate measurable progress.',
    confidence: 'Medium' },
];

/* ─── Individual stall leverage (for stalls not in any stack) ──────── */
const STALL_LEVERAGE = {
  S1: 'Secure one credible external validator to make the case definitively — internal re-proving almost never resolves this.',
  S2: 'Identify the actor with the most to lose from the current arrangement and change their constraint, not their willingness to coordinate.',
  S3: 'Introduce conditional continuation from a funder or anchor — accountability breaks through changed conditions, not culture.',
  S4: 'Change anchor procurement or spin-out policy to redirect value circulation within the ecosystem.',
  S5: 'Restructure incentives so actors benefit from completed transactions rather than maintained relationships.',
  S6: 'The leverage is almost always external — a new entrant, a policy shift, or a funding regime change that disrupts incumbent comfort.',
  S7: 'Change what gets reported — shift from activity narratives to outcome evidence — before changing who reports.',
  S8: 'Redefine success from number of starts to rate of graduation — change the measurement layer before changing programmes.',
  S9: 'Find the actor with the least to lose from going first and remove their remaining constraint. Others follow.',
};

/* ─── Journey context (state carried forward across stages) ────────── */
const JourneyContext = createContext(null);

function useJourney() {
  const ctx = useContext(JourneyContext);
  if (!ctx) throw new Error('useJourney must be used within JourneyProvider');
  return ctx;
}

/* ─── Step indicator ───────────────────────────────────────────────── */
function StepIndicator({ current, completedUpTo }) {
  return (
    <div style={styles.stepBar}>
      {STAGES.map((stage, i) => {
        const isActive    = i === current;
        const isCompleted = i < completedUpTo;
        const isReachable = i <= completedUpTo;
        return (
          <React.Fragment key={stage.id}>
            {i > 0 && (
              <div style={{
                ...styles.connector,
                background: isReachable ? 'var(--steward)' : 'var(--dj-border)',
              }} />
            )}
            <div style={styles.stepNode}>
              <div style={{
                ...styles.stepDot,
                background: isActive ? 'var(--signal)' : isCompleted ? 'var(--steward)' : 'var(--dj-border)',
                boxShadow: isActive ? '0 0 0 4px rgba(200,240,208,0.2)' : 'none',
              }}>
                {isCompleted ? (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2.5 6L5 8.5L9.5 3.5" stroke="var(--dj-bg)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : (
                  <span style={{
                    fontFamily: 'var(--font-mono)',
                    fontSize: '11px',
                    fontWeight: 600,
                    color: isActive ? 'var(--dj-bg)' : 'var(--dj-chalk-muted)',
                  }}>{i + 1}</span>
                )}
              </div>
              <div style={{ marginTop: '8px', textAlign: 'center' }}>
                <div style={{
                  fontFamily: 'var(--font-mono)',
                  fontSize: '10px',
                  fontWeight: 600,
                  letterSpacing: '0.1em',
                  textTransform: 'uppercase',
                  color: isActive ? 'var(--dj-chalk)' : isCompleted ? 'var(--steward)' : 'var(--dj-chalk-muted)',
                  marginBottom: '2px',
                }}>{stage.label}</div>
                <div style={{
                  fontFamily: 'var(--font-sans)',
                  fontSize: '11px',
                  color: 'var(--dj-chalk-muted)',
                  maxWidth: '140px',
                }}>{stage.subtitle}</div>
              </div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ─── Stage placeholder (for Stage 3) ──────────────────────────────── */
function StagePlaceholder({ stage }) {
  const stageIndex = STAGES.findIndex(s => s.id === stage.id);
  return (
    <div style={styles.stageContainer}>
      <h2 style={styles.stageHeading}>
        Stage {stageIndex + 1}: {stage.label}
      </h2>
      <p style={styles.stageSubtitle}>{stage.subtitle}</p>
      <div style={styles.placeholderBox}>
        <span style={styles.placeholderLabel}>Stage content</span>
        <span style={styles.placeholderHint}>Not yet implemented</span>
      </div>
    </div>
  );
}

/* ─── Confidence badge ─────────────────────────────────────────────── */
function ConfidenceBadge({ level }) {
  const color = level === 'High' ? 'var(--signal)'
    : level === 'Medium' ? 'var(--founder)'
    : 'var(--researcher)';
  const bg = level === 'High' ? 'rgba(200,240,208,0.1)'
    : level === 'Medium' ? 'rgba(245,217,122,0.1)'
    : 'rgba(240,128,128,0.1)';
  const border = level === 'High' ? 'rgba(200,240,208,0.25)'
    : level === 'Medium' ? 'rgba(245,217,122,0.25)'
    : 'rgba(240,128,128,0.25)';
  return (
    <span style={{
      fontFamily: 'var(--font-mono)', fontSize: '9px', fontWeight: 600,
      letterSpacing: '0.1em', textTransform: 'uppercase',
      color, background: bg, border: `1px solid ${border}`,
      borderRadius: '3px', padding: '3px 8px',
    }}>{level} confidence</span>
  );
}

/* ─── Leverage hypothesis card ─────────────────────────────────────── */
function LeverageCard({ stack }) {
  const triggerNames = stack.triggers
    .map(id => STALLS.find(s => s.id === id))
    .filter(Boolean);
  return (
    <div style={s2.card}>
      <div style={s2.cardTop}>
        <div style={s2.cardMeta}>
          <span style={s2.cardId}>{stack.id}</span>
          <ConfidenceBadge level={stack.confidence} />
        </div>
        <h3 style={s2.cardName}>{stack.name}</h3>
        <div style={s2.cardTriggers}>
          {triggerNames.map(s => (
            <span key={s.id} style={s2.triggerPill}>{s.id} {s.name}</span>
          ))}
        </div>
      </div>

      <div style={s2.fieldGroup}>
        <div style={s2.field}>
          <span style={s2.fieldLabel}>Regime</span>
          <span style={s2.fieldValue}>{stack.regime}</span>
        </div>
        <div style={s2.field}>
          <span style={{ ...s2.fieldLabel, color: 'var(--steward)' }}>Entry point</span>
          <span style={s2.fieldValue}>{stack.entry}</span>
        </div>
        <div style={s2.field}>
          <span style={s2.fieldLabel}>Expected effect</span>
          <span style={s2.fieldValue}>{stack.effect}</span>
        </div>
      </div>
    </div>
  );
}

/* ─── Stage 2: Leverage ────────────────────────────────────────────── */
function LeverageStage() {
  const { journeyState, updateJourneyState } = useJourney();
  const detectedStacks = journeyState.detectedStacks || [];
  const selectedStalls = journeyState.stalls || [];

  const stallsInStacks = useMemo(() => {
    const set = new Set();
    detectedStacks.forEach(s => s.triggers.forEach(t => set.add(t)));
    return set;
  }, [detectedStacks]);

  const unstackedStalls = useMemo(() =>
    selectedStalls.filter(id => !stallsInStacks.has(id)),
    [selectedStalls, stallsInStacks]
  );

  const stackNames = detectedStacks.map(s => s.name);
  const framingLine = detectedStacks.length > 0
    ? `${stackNames.length === 1 ? stackNames[0] : stackNames.slice(0, -1).join(', ') + ' and ' + stackNames[stackNames.length - 1]} — leverage targets the reinforcing logic between stalls, not individual stalls in isolation.`
    : null;

  // Store leverage hypotheses in journey state for Stage 3
  useEffect(() => {
    updateJourneyState({
      leverageHypotheses: detectedStacks.map(s => ({
        stackId: s.id, name: s.name, entry: s.entry,
        effect: s.effect, confidence: s.confidence,
      })),
    });
  }, [detectedStacks]);

  return (
    <div style={s2.container}>
      {/* Framing */}
      {framingLine && <p style={s2.framing}>{framingLine}</p>}

      {/* Stack hypotheses */}
      {detectedStacks.length > 0 ? (
        <div style={s2.section}>
          {detectedStacks.map(stack => (
            <LeverageCard key={stack.id} stack={stack} />
          ))}
        </div>
      ) : (
        <div style={s2.emptyBox}>
          <p style={s2.emptyText}>
            No reinforcing stacks detected. Your stalls appear independent — each can be addressed directly.
          </p>
        </div>
      )}

      {/* Structural priorities — unstacked stalls */}
      {unstackedStalls.length > 0 && (
        <div style={s2.priorities}>
          <div style={s2.prioritiesHeader}>Structural priorities</div>
          <p style={s2.prioritiesSub}>
            Stalls not part of a detected stack — addressable independently.
          </p>
          {unstackedStalls.map(id => {
            const stall = STALLS.find(s => s.id === id);
            if (!stall) return null;
            return (
              <div key={id} style={s2.priorityRow}>
                <div style={s2.priorityLeft}>
                  <span style={s2.priorityId}>{id}</span>
                  <span style={s2.priorityName}>{stall.name}</span>
                </div>
                <div style={s2.priorityNote}>{STALL_LEVERAGE[id]}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Empty state — no stalls at all */}
      {selectedStalls.length === 0 && (
        <div style={s2.emptyBox}>
          <p style={s2.emptyText}>
            No stalls were selected in Stage 1. Go back to identify behavioural stalls before generating leverage hypotheses.
          </p>
        </div>
      )}
    </div>
  );
}

/* ─── Health indicator ─────────────────────────────────────────────── */
function HealthIndicator({ count }) {
  const max = 9;
  const ratio = count / max;
  const color = count === 0 ? 'var(--dj-chalk-muted)'
    : ratio <= 0.22 ? 'var(--signal)'
    : ratio <= 0.44 ? 'var(--steward)'
    : ratio <= 0.66 ? 'var(--founder)'
    : 'var(--researcher)';
  const label = count === 0 ? 'No stalls selected'
    : ratio <= 0.22 ? 'Low severity'
    : ratio <= 0.44 ? 'Moderate'
    : ratio <= 0.66 ? 'Elevated'
    : 'Critical';

  return (
    <div style={s1.healthBar}>
      <div style={s1.healthHeader}>
        <span style={s1.healthLabel}>Ecosystem health</span>
        <span style={{ ...s1.healthStatus, color }}>{label}</span>
      </div>
      <div style={s1.healthTrack}>
        <div style={{
          height: '100%',
          width: `${Math.max(ratio * 100, count > 0 ? 8 : 0)}%`,
          background: color,
          borderRadius: '3px',
          transition: 'width 0.4s ease, background 0.4s ease',
        }} />
      </div>
      <div style={s1.healthCount}>{count} of {max} stalls active</div>
    </div>
  );
}

/* ─── Stall card ───────────────────────────────────────────────────── */
function StallCard({ stall, selected, onToggle }) {
  return (
    <button
      onClick={() => onToggle(stall.id)}
      style={{
        ...s1.card,
        borderColor: selected ? 'var(--signal)' : 'var(--dj-border)',
        background: selected ? 'rgba(200,240,208,0.06)' : 'var(--dj-surface)',
      }}
    >
      <div style={s1.cardHeader}>
        <span style={{
          ...s1.cardId,
          color: selected ? 'var(--signal)' : 'var(--dj-chalk-muted)',
        }}>{stall.id}</span>
        <div style={{
          ...s1.cardCheck,
          borderColor: selected ? 'var(--signal)' : 'var(--dj-border)',
          background: selected ? 'var(--signal)' : 'transparent',
        }}>
          {selected && (
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M2 5L4.2 7.2L8 3" stroke="var(--dj-bg)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
      </div>
      <div style={{
        ...s1.cardName,
        color: selected ? 'var(--dj-chalk)' : 'var(--dj-chalk-dim)',
      }}>{stall.name}</div>
      <div style={s1.cardSub}>{stall.sub}</div>
    </button>
  );
}

/* ─── Detected stack card ──────────────────────────────────────────── */
function StackCard({ stack }) {
  const triggerNames = stack.triggers
    .map(id => STALLS.find(s => s.id === id)?.name)
    .filter(Boolean);
  return (
    <div style={s1.stackCard}>
      <div style={s1.stackHeader}>
        <span style={s1.stackId}>{stack.id}</span>
        <span style={s1.stackName}>{stack.name}</span>
      </div>
      <div style={s1.stackTriggers}>
        {triggerNames.map(name => (
          <span key={name} style={s1.stackPill}>{name}</span>
        ))}
      </div>
      <div style={s1.stackLogic}>{stack.logic}</div>
    </div>
  );
}

/* ─── Stage 1: Behaviours ──────────────────────────────────────────── */
function BehavioursStage() {
  const { journeyState, updateJourneyState } = useJourney();
  const selected = journeyState.stalls;

  const toggleStall = useCallback((id) => {
    const next = selected.includes(id)
      ? selected.filter(s => s !== id)
      : [...selected, id];
    const detected = STACK_RULES.filter(
      rule => rule.triggers.every(t => next.includes(t))
    );
    updateJourneyState({
      stalls: next,
      stacks: detected.map(s => s.name),
      detectedStacks: detected,
    });
  }, [selected, updateJourneyState]);

  const detectedStacks = useMemo(() =>
    STACK_RULES.filter(rule => rule.triggers.every(t => selected.includes(t))),
    [selected]
  );

  return (
    <div style={s1.container}>
      <h2 style={styles.stageHeading}>Behaviours</h2>
      <p style={styles.stageSubtitle}>
        Select the behavioural stalls you observe in this ecosystem. Stacks — reinforcing combinations — are detected automatically.
      </p>

      <HealthIndicator count={selected.length} />

      <div className="stall-grid" style={s1.grid}>
        {STALLS.map(stall => (
          <StallCard
            key={stall.id}
            stall={stall}
            selected={selected.includes(stall.id)}
            onToggle={toggleStall}
          />
        ))}
      </div>

      {/* ── Summary line ── */}
      {selected.length > 0 && (
        <div style={s1.summaryLine}>
          <span>{selected.length} stall{selected.length !== 1 ? 's' : ''} active</span>
          <span style={s1.summaryDot} />
          <span style={{ color: detectedStacks.length > 0 ? 'var(--founder)' : 'var(--dj-chalk-muted)' }}>
            {detectedStacks.length} stack{detectedStacks.length !== 1 ? 's' : ''} detected
          </span>
        </div>
      )}

      {detectedStacks.length > 0 && (
        <div style={s1.stackSection}>
          <div style={s1.stackSectionHeader}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
              <circle cx="8" cy="8" r="6.5" stroke="var(--founder)" strokeWidth="1.2"/>
              <path d="M8 5V8.5" stroke="var(--founder)" strokeWidth="1.3" strokeLinecap="round"/>
              <circle cx="8" cy="11" r="0.8" fill="var(--founder)"/>
            </svg>
            <span style={s1.stackSectionLabel}>
              {detectedStacks.length} stack{detectedStacks.length > 1 ? 's' : ''} detected
            </span>
          </div>
          {detectedStacks.map(stack => (
            <StackCard key={stack.id} stack={stack} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Exit confirmation modal ──────────────────────────────────────── */
function ExitModal({ stage, onConfirm, onCancel }) {
  return (
    <div style={styles.modalOverlay} onClick={onCancel}>
      <div style={styles.modal} onClick={e => e.stopPropagation()}>
        <h3 style={styles.modalTitle}>Stop after {stage.label}?</h3>
        <p style={styles.modalBody}>
          Your selections so far will be preserved. You can return and continue later.
        </p>
        <div style={styles.modalActions}>
          <button style={styles.btnGhost} onClick={onCancel}>Continue journey</button>
          <button style={styles.btnAmber} onClick={onConfirm}>Stop here</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Summary screen (shown after exit) ────────────────────────────── */
function ExitSummary({ exitedAt, journeyState }) {
  const stageLabel = STAGES[exitedAt].label;
  const { stalls, stacks } = journeyState;
  return (
    <div style={styles.summaryContainer}>
      <div style={styles.summaryCard}>
        <div style={styles.summaryBadge}>Journey paused</div>
        <h2 style={styles.summaryHeading}>
          Completed through: {stageLabel}
        </h2>
        <div style={styles.summarySection}>
          <div style={styles.summaryLabel}>Stalls identified</div>
          <div style={styles.summaryValue}>
            {stalls.length > 0
              ? stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? `${s.id} ${s.name}` : id; }).join(', ')
              : 'None yet'}
          </div>
        </div>
        <div style={styles.summarySection}>
          <div style={styles.summaryLabel}>Stacks detected</div>
          <div style={styles.summaryValue}>
            {stacks.length > 0 ? stacks.join(', ') : 'None yet'}
          </div>
        </div>
        {exitedAt < STAGES.length - 1 && (
          <div style={styles.summarySection}>
            <div style={styles.summaryLabel}>Stages remaining</div>
            <div style={styles.summaryValue}>
              {STAGES.slice(exitedAt + 1).map(s => s.label).join(', ')}
            </div>
          </div>
        )}
        <button
          style={{ ...styles.btnSignal, marginTop: '24px', width: '100%' }}
          onClick={() => window.location.reload()}
        >
          Start new journey
        </button>
      </div>
    </div>
  );
}

/* ─── Main app ─────────────────────────────────────────────────────── */
function DiagnosticJourney() {
  const [currentStage, setCurrentStage]   = useState(0);
  const [completedUpTo, setCompletedUpTo] = useState(0);
  const [showExitModal, setShowExitModal] = useState(false);
  const [exited, setExited]               = useState(false);
  const [exitedAt, setExitedAt]           = useState(null);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],           // selected stall IDs from Stage 1
    stacks: [],           // detected stack names from Stage 1
    leverageHypotheses: [],  // generated in Stage 2
    osConfig: null,          // generated in Stage 3
  });

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => ({ ...prev, ...patch }));
  }, []);

  /* ── Navigation ── */
  const goNext = useCallback(() => {
    const next = currentStage + 1;
    if (next < STAGES.length) {
      setCompletedUpTo(prev => Math.max(prev, next));
      setCurrentStage(next);
    }
  }, [currentStage]);

  const goBack = useCallback(() => {
    if (currentStage > 0) setCurrentStage(currentStage - 1);
  }, [currentStage]);

  const requestExit = useCallback(() => {
    setShowExitModal(true);
  }, []);

  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    setExitedAt(currentStage);
    setExited(true);
  }, [currentStage]);

  const cancelExit = useCallback(() => {
    setShowExitModal(false);
  }, []);

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage    = STAGES[currentStage];
  const isFirst  = currentStage === 0;
  const isLast   = currentStage === STAGES.length - 1;

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          {currentStage === 0 ? <BehavioursStage />
            : currentStage === 1 ? <LeverageStage />
            : <StagePlaceholder stage={stage} />
          }
        </main>

        {/* ── Navigation bar ── */}
        <nav style={styles.navBar}>
          <div style={styles.navLeft}>
            {!isFirst && (
              <button style={styles.btnGhost} onClick={goBack}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                  <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Back
              </button>
            )}
          </div>
          <div style={styles.navCenter}>
            <button style={styles.btnExit} onClick={requestExit}>
              Stop here
            </button>
          </div>
          <div style={styles.navRight}>
            {!isLast ? (
              <button style={styles.btnSignal} onClick={goNext}>
                Continue
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                  <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            ) : (
              <button style={styles.btnSignal} onClick={goNext}>
                Finish
              </button>
            )}
          </div>
        </nav>

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}
