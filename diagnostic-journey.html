/* ─── Stack pattern helpers ────────────────────────────────────────── */
function stackContains(stacks, s1, s2) {
  return stacks.find(st => st.triggers.includes(s1) && st.triggers.includes(s2));
}

/* ─── Stage labels for scenario templates ──────────────────────────── */
const STAGE_LABELS = { early: 'early-stage', established: 'established', mature: 'mature' };

/* ─── Scenario template builder for Step 2 ─────────────────────────── */
function buildStep2Scenario(journeyState, config) {
  const stacks = journeyState.detectedStacks || [];
  const stalls = journeyState.stalls || [];
  const qa = journeyState.qualifierAnswers || {};
  // TODO: populate from Railway API — field: qualifierAnswers.stage
  const stageLabel = STAGE_LABELS[qa.stage] || 'established';
  // TODO: populate from Railway API — field: qualifierAnswers.anchorType
  const anchorLabel = config.anchorLabel || 'Anchors';
  // TODO: populate from Railway API — field: qualifierAnswers.clusterType
  const clusterType = (CLUSTER_TYPE_SENTENCES[qa.clusterType] || 'a regional ecosystem').replace(/^a /, '').replace(/^an /, '');

  // Determine foregrounded actor for the scenario
  const protections = qa.protect || [];
  let fgActor = anchorLabel;
  for (const p of protections) {
    const actor = PROTECT_ACTOR_MAP[p];
    if (actor && ACTOR_CASCADES[actor]) { fgActor = actor; break; }
  }
  if (!ACTOR_CASCADES[fgActor]) fgActor = 'Researchers';

  const stkEvidence = stackContains(stacks, 'S1', 'S7');
  const stkIncumbent = stackContains(stacks, 'S4', 'S6');
  const stkMediated = stackContains(stacks, 'S5', 'S9');

  // TEMPLATE A — Evidence Without Commitment pattern
  if (stkEvidence || (stalls.includes('S1') && stalls.includes('S7'))) {
    // TODO: populate from Railway API — field: anchorType, clusterType, stage
    return `A ${stageLabel} ${anchorLabel}-anchored ${clusterType} has a knowledge problem that looks like a capability problem. Evidence accumulates — research outputs, programme reports, diagnostic findings — but decisions keep getting made without reference to it. The evidence exists. The mechanism that forces it to inform action doesn't.\n\n` +
    // TODO: populate from Railway API — field: foregrounded actor type
    `A ${fgActor} in your ${clusterType} declares a research output and tags it to the knowledge taxonomy. The system structures that declaration — not as a document in a repository, but as a structured signal with identified commercial relevance and matched actor types. Within the same session, the AI reasoning engine reads the live demand signals in the sovereign database and identifies actors whose current journey state indicates they need exactly the capability this research represents. A matched connection is surfaced — a structured pathway step for both actors, generated from their respective journey states.\n\n` +
    `The ${fgActor} pursued their own interest — getting credit for their output. The matched actor pursued their own interest — finding a relevant partner. Neither needed to know about the other. The sovereign database held the signal that made the connection possible.\n\n` +
    `Six months later your sovereign database holds the record of that connection — whether it converted, what it produced, what the next step was. Not in a report. In the live intelligence picture that makes the next connection faster and more accurate than the last.`;
  }

  // TEMPLATE B — Incumbent Lock pattern
  if (stkIncumbent || (stalls.includes('S4') && stalls.includes('S6'))) {
    // TODO: populate from Railway API — field: anchorType, clusterType, stage
    return `A ${stageLabel} ${anchorLabel}-anchored ${clusterType} has a value problem that looks like a capability problem. The anchor is present, active, and well-intentioned. But value flows outward — procurement goes to established relationships, talent gets developed and then recruited away, innovation gets piloted locally and scaled elsewhere.\n\n` +
    // TODO: populate from Railway API — field: clusterType, stage
    `Your anchor posts a procurement requirement to a supply chain group in your sovereign ecosystem. Not a public tender — a structured signal, role-gated, visible only to actors whose declared capability matches the requirement. The actor matching engine identifies ${stageLabel}-stage suppliers in your ${clusterType} whose journey state indicates readiness for this procurement tier. A structured introduction is made — both parties see only what they need to see to decide whether to proceed.\n\n` +
    `The anchor pursued its own interest — finding the best supplier. The supplier pursued its own interest — finding a procurement opportunity. Neither needed a broker. The sovereign database held the capability signals that made the match possible. The procurement decision stayed local.\n\n` +
    `Your sovereign database now holds the record of that transaction. Over time it builds a picture of where local procurement is converting and where it is not. The steward sees value circulation as a measurable signal derived from real transactions — not as an aspiration in a strategy document.`;
  }

  // TEMPLATE C — Mediated Dependency Loop pattern
  if (stkMediated || (stalls.includes('S5') && stalls.includes('S9'))) {
    // TODO: populate from Railway API — field: anchorType, clusterType, stage
    return `A ${stageLabel} ${anchorLabel}-anchored ${clusterType} has a pathway problem that looks like a talent problem. The talent exists. The opportunities exist. But the connection depends on knowing the right person, being in the right room, arriving at the right moment. Most actors never find the pathway. They leave not because there is nothing for them — but because nothing visible tells them where to go.\n\n` +
    // TODO: populate from Railway API — field: stage, clusterType
    `A ${stageLabel}-stage actor in your ${clusterType} registers their profile and declares their skills and goals. The journey construction engine reads that declaration against the live state of your sovereign database — the open opportunities, the active groups, the demand signals, the actors who need exactly what this person offers. It generates a pathway: not a list of programmes, but a sequence of specific next steps, each one generated from the intersection of this actor's profile and the current state of your ecosystem.\n\n` +
    `The actor pursued their own interest — finding their next opportunity. The system captured that as a signal that the talent pipeline is or is not converting. Your sovereign database now holds the record of that progression — where the actor was, where they went, what converted and what did not.\n\n` +
    `The steward sees the pipeline moving. Not in a report. In the live intelligence picture that makes the next pathway more accurate than the last.`;
  }

  // TEMPLATE D — Fallback
  // TODO: populate from Railway API — field: anchorType, clusterType, stage
  return `A ${stageLabel} ${anchorLabel}-anchored ${clusterType} has a visibility problem that looks like a pipeline problem. The pipeline exists — ${stageLabel}-stage actors building on ${anchorLabel} capability, progressing through your ecosystem, approaching readiness for external engagement. But the people who could accelerate that progression cannot see it. They see activity. They cannot see momentum.\n\n` +
  `As actors in your ${clusterType} progress through their journey states — from formation through to scale — the system reads those progression signals and writes them back to the sovereign database as pipeline formation indicators. Not self-reported. Not compiled by an analyst. Derived from actual behaviour in the system.\n\n` +
  `The AI reasoning engine reads those pipeline formation signals and constructs a curated signal feed for matched external actors — not a pitch, not a cold introduction, but a structured signal that indicates readiness without forcing premature engagement.\n\n` +
  `Your ${clusterType} is no longer opaque from the outside. The pipeline is legible. The right actors can find it at the right moment.`;
}

/* ─── Provocation builder (3-part: diagnosis, consequence, mechanism) */
function buildProvocation(stepIndex, journeyState, config) {
  const stacks = journeyState.detectedStacks || [];
  const stalls = journeyState.stalls || [];
  const qa = journeyState.qualifierAnswers || {};
  const protections = qa.protect || [];
  const clusterDesc = CLUSTER_TYPE_SENTENCES[qa.clusterType] || 'a regional ecosystem';
  const clusterType = clusterDesc.replace(/^a /, '').replace(/^an /, '');
  const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'Regional Speciality';
  const anchorLabel = config.anchorLabel || 'Anchors';
  const protectLabels = protections.map(p => PROTECT_LABELS[p]).filter(Boolean);
  const protectStr = protectLabels.length > 0
    ? (protectLabels.length === 1 ? protectLabels[0] : protectLabels.slice(0, -1).join(', ') + ' and ' + protectLabels[protectLabels.length - 1])
    : '';

  switch (stepIndex) {

    /* ── STEP 1: Federated Governance Layer ── */
    case 0: {
      const diagnosis = `Your ${clusterLabel} with ${articleFor(anchorLabel).toLowerCase()} ${anchorLabel} anchor operates across multiple institutions with competing accountability structures. Without identity-first governance, coordination defaults to whoever has the most political capital — not whoever has the most relevant capability.`;

      let consequence = '';
      if (stalls.includes('S2')) consequence = 'Coordinating stall means your ecosystem is already producing alignment without accountability — more committees, more MoUs, more consultation with no audit trail.';
      else if (stalls.includes('S9')) consequence = 'Waiting stall means actors are deferring to gatekeepers. Without role-based access that makes pathways visible, deference becomes structural.';
      else consequence = 'Without governance infrastructure, trust cannot scale. Every new actor requires a personal introduction rather than a verified identity.';

      let mechanism = 'Identity-first governance at every level — Supercluster \u2192 Cluster \u2192 Group \u2192 Actor. Every actor holds one system identity. Permissions are explicit, inherited, and auditable.';
      if (protections.includes('sovereignty')) mechanism += ' No data crosses the regional boundary without consent recorded at the governance layer.';
      if (protections.includes('trust')) mechanism += ' Trust structures are preserved through role-based access — openness and confidentiality coexist without leakage.';

      return { diagnosis, consequence, mechanism };
    }

    /* ── STEP 2: Sovereign Ecosystem Database + Bot Network ── */
    case 1: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis = `Your ecosystem is running ${stkEvidence.name} — evidence accumulates to justify existence rather than inform decisions. Your database currently holds reports, not outcomes.`;
      else if (stkIncumbent) diagnosis = `Your ecosystem is running ${stkIncumbent.name} — value flows through established structures rather than circulating locally. Your database needs to track where value goes, not just where activity happens.`;
      else if (stkMediated) diagnosis = `Your ecosystem is running ${stkMediated.name} — connections are brokered rather than formed. Your database holds relationship records that belong to intermediaries, not to the ecosystem.`;
      else if (stacks.length > 0) diagnosis = `Your ecosystem is running ${stacks[0].name} — ${stacks[0].logic} The database is where this pattern becomes visible and addressable.`;
      else if (stalls.includes('S1')) diagnosis = 'Re-proving means your ecosystem validates multiple pathways without letting proof collapse choice — no mechanism forces selection.';
      else if (stalls.includes('S4')) diagnosis = 'Extracting means value leaves faster than it circulates. Your database needs to track retention, not just activity.';
      else diagnosis = 'Without a sovereign database, your ecosystem has no memory. Every new programme starts from zero.';

      let consequence = `A ${clusterType} without a sovereign database has no memory. Every new programme starts from zero. Every new steward inherits anecdote rather than evidence. `;
      if (anchorLabel === 'Large corporate') consequence += 'A corporate anchor without sovereign data infrastructure owns the ecosystem intelligence. When they leave, the intelligence leaves with them.';
      else if (anchorLabel === 'University') consequence += 'A university anchor generates research that leaves through publication. Without sovereign infrastructure, the ecosystem funds research it never benefits from.';
      else if (anchorLabel === 'Hospital') consequence += 'A hospital anchor generates clinical intelligence that stays inside institutional boundaries. Without sovereign infrastructure, health innovation stays disconnected from the surrounding ecosystem.';
      else if (anchorLabel === 'Public agency') consequence += 'A public agency anchor generates policy intelligence that dissipates between electoral cycles. Without sovereign infrastructure, institutional memory resets with every administration.';
      else if (anchorLabel === 'Research institute') consequence += 'A research institute anchor generates capability signals that stay inside academic boundaries. Without sovereign infrastructure, research capacity is invisible to the actors who need it.';

      let mechanism = `One dedicated instance per ${clusterType}. Actor profiles \u00b7 Signal history \u00b7 Journey state \u00b7 Evidence base \u00b7 Diagnostic outputs \u00b7 Stall records \u00b7 Leverage hypotheses. All within your sovereign boundary. `;
      if (stalls.includes('S1') || stalls.includes('S7')) mechanism += 'Evidence Ingestion Bot — continuously structures incoming evidence so it informs rather than accumulates. ';
      if (stalls.includes('S8') || stalls.includes('S9')) mechanism += 'Signal Monitoring Bot — detects when activity grows without conversion. ';
      if (stalls.includes('S2') || stalls.includes('S5')) mechanism += 'Actor Enrichment Bot — enriches actor profiles from system behaviour rather than self-report. ';
      mechanism += 'Health Monitoring Bot — tracks system health across all clusters continuously.';
      if (protectStr) mechanism += ` The sovereign membrane protects ${protectStr} at the boundary — by architecture, not by policy.`;

      const scenario = buildStep2Scenario(journeyState, config);
      return { scenario, diagnosis, consequence, mechanism };
    }

    /* ── STEP 3: External Data Sources ── */
    case 2: {
      let diagnosis = '';
      if (qa.gap === 'discovery') diagnosis = 'Your coordination gap is discovery. Actors exist in your ecosystem but cannot find each other by capability — only by sector or geography. A new actor joins and sees an empty ecosystem.';
      else if (qa.gap === 'flow') diagnosis = 'Your coordination gap is knowledge flow. Groups produce intelligence that never reaches the actors who need it. Institutional boundaries trap rather than protect.';
      else if (qa.gap === 'access') diagnosis = 'Your coordination gap is membrane permeability. Investors, diaspora, global partners cannot find a credible entry point. The ecosystem is opaque from the outside.';
      else if (qa.gap === 'conversion') diagnosis = 'Your coordination gap is conversion. Activity is visible but outcomes are not. The ecosystem cannot distinguish programmes that work from programmes that do not.';
      else diagnosis = 'Without external data at the supercluster level, every new ecosystem starts empty. Actors arrive and see nothing.';

      let consequence = `Without external data at the supercluster level, every new ${clusterType} starts empty. `;
      if (stalls.includes('S3')) consequence += 'Forgiving stall means failed programmes continue. Without external data showing what comparable ecosystems have tried and stopped, stewards have no reference point for termination decisions.';
      else if (stalls.includes('S7')) consequence += 'Narrating stall means strategy substitutes for evidence. External data breaks this — it introduces evidence the ecosystem did not generate and cannot rewrite.';
      else consequence += 'Actors arrive and see nothing. The cold-start problem kills momentum before the platform generates its own signal.';

      let mechanism = '';
      if (qa.gap === 'discovery') mechanism = 'Govt Support Directory — live programme listings, funding routes by stage, advisor networks. Ingested weekly. Actors find support before any human broker is involved.';
      else if (qa.gap === 'flow') mechanism = 'Community Services API — wellbeing services, peer networks, community assets. CC BY 4.0. Knowledge outside institutional boundaries becomes visible inside them.';
      else if (qa.gap === 'access') mechanism = 'Publication Databases — research outputs, grant announcements, patent filings. Outside actors find credible entry points through research rather than cold outreach.';
      else if (qa.gap === 'conversion') mechanism = 'Professional Identity — profile import, Research Identity (ORCID), behavioural enrichment. Progressive, never compulsory. Conversion becomes visible when identity is persistent.';
      else mechanism = 'All four external data sources active — Govt Support Directory, Community Services API, Publication Databases, Professional Identity. Cold-start solved before any actor joins.';
      mechanism += ' All external data lives at the supercluster level — available to every cluster, never duplicated.';

      return { diagnosis, consequence, mechanism };
    }

    /* ── STEP 4: MCP Intelligence Substrate ── */
    case 3: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis = `${stkEvidence.name} is a reasoning failure — the ecosystem has evidence but no mechanism that forces it to inform decisions. The intelligence substrate converts evidence into structured findings and findings into routable interventions.`;
      else if (stkIncumbent) diagnosis = `${stkIncumbent.name} is a signal failure — the ecosystem cannot see value leaving because no infrastructure reads the signals that would show it.`;
      else if (stkMediated) diagnosis = `${stkMediated.name} is a matching failure — connections are possible but require a human broker. The intelligence substrate makes matching infrastructure, not a service.`;
      else if (stacks.length > 0) diagnosis = `${stacks[0].name} — ${stacks[0].logic} The intelligence substrate is what makes this pattern visible and addressable in real time.`;
      else diagnosis = 'Your stalls are independent but share a common cause — the ecosystem cannot observe itself. Without structured intelligence tools, stall patterns are invisible until they become crises.';

      let consequence = 'Without an intelligence substrate, AI in your ecosystem is decorative. It answers questions but cannot observe the system, detect patterns, or surface interventions. ';
      if (qa.priority === 'research') consequence += 'Research commercialisation requires the system to read demand signals and match them to capability — without structured tools this matching is manual, slow, and broker-dependent.';
      else if (qa.priority === 'capital') consequence += 'Investment attraction requires surfacing pipeline formation to external actors — without signal propagation, investors see activity not momentum.';
      else if (qa.priority === 'talent') consequence += 'Talent retention requires tracking where talent goes and why — without journey state tools this is invisible until the talent has already left.';
      else if (qa.priority === 'supply') consequence += 'Supply chain development requires matching capability to procurement signals — without actor matching tools, suppliers wait to be discovered.';
      else if (qa.priority === 'growth') consequence += 'Economic growth requires observing what is working and what is not — without steward diagnostic tools, intervention is always retrospective.';

      let mechanism = 'Each tool is a structured call from the AI to the live sovereign database. Intelligence assembled at runtime — not pre-baked, not static. detect_stalls() — reads behavioural patterns against the 9 canonical stalls continuously. get_leverage_hypotheses() — surfaces interventions ranked by confidence for your stack configuration. ';
      if (stalls.includes('S2') || stalls.includes('S5')) mechanism += 'get_matched_connections() — identifies actor pairs with complementary capability and intent. ';
      if (stalls.includes('S1') || stalls.includes('S7')) mechanism += 'ingest_evidence() — structures incoming evidence so it informs rather than accumulates. ';
      if (qa.priority === 'capital') mechanism += 'get_open_funding() — surfaces relevant funding to matched actors. ';
      if (qa.gap === 'access') mechanism += 'get_steward_diagnostic() — live system health reading rather than retrospective reporting. ';
      mechanism += 'get_actor_profile() \u00b7 get_cluster_signals() \u00b7 get_journey_state() — always active: the substrate that makes every other tool possible.';

      return { diagnosis, consequence, mechanism };
    }

    /* ── STEP 5: AI Reasoning Engine ── */
    case 4: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis = `${stkEvidence.name} is partly a narrative failure. Your ecosystem produces reports because that is what the system rewards. The AI reasoning engine changes what gets rewarded — it constructs journeys toward progress, not toward justification.`;
      else if (stkIncumbent) diagnosis = `${stkIncumbent.name} means innovation routes through established actors. The AI reasoning engine makes alternative pathways visible and credible — not by removing incumbents but by routing around dependency on them.`;
      else if (stkMediated) diagnosis = `${stkMediated.name} means actor journeys run through human brokers. The AI reasoning engine replaces the broker function with infrastructure — every actor gets a personalised pathway without requiring mediation.`;
      else if (stacks.length > 0) diagnosis = `Your ecosystem is running ${stacks[0].name} — ${stacks[0].logic} The AI reasoning engine is what makes the pattern breakable by constructing alternative pathways from live data.`;
      else diagnosis = 'Your ecosystem constructs actor experiences manually — through brokers, events, and personal introductions. The AI reasoning engine makes this infrastructure rather than a service.';

      let consequence = '';
      if (anchorLabel === 'University') consequence = 'A university anchor generates demand signals that are never translated into commercial language. Without role-aware reframing, researcher needs stay inside institutional language and never reach the founders who could address them.';
      else if (anchorLabel === 'Large corporate') consequence = 'A corporate anchor generates procurement signals that are never structured into accessible RFIs. Without signal propagation, supply chain opportunities stay invisible to the SMEs best placed to respond.';
      else if (anchorLabel === 'Public agency') consequence = 'A public agency anchor generates policy signals that are never personalised to individual actors. Without journey construction, programme support reaches actors who can navigate bureaucracy — not actors who need it most.';
      else if (anchorLabel === 'Hospital') consequence = 'A hospital anchor generates clinical need signals that never reach the innovators who could address them. Without role-aware reframing, health innovation stays inside procurement language that SMEs cannot decode.';
      else if (anchorLabel === 'Research institute') consequence = 'A research institute anchor generates capability signals that never translate into commercial demand. Without actor matching, research capacity waits to be discovered rather than being actively routed to relevant opportunity.';
      else consequence = 'Without an AI reasoning engine, actor experiences depend on who happens to know whom. The same quality of pathway is not available to every actor — only to those with the right connections.';

      let mechanism = '';
      if (qa.priority === 'talent') mechanism = 'Journey Construction is your primary engine — personalised pathways for every actor, adapted to their stage, technology, and motivations. No actor falls through the gaps because no actor relies on a human broker to find their next step.';
      else if (qa.priority === 'capital') mechanism = 'Signal Propagation is your primary engine — surfacing pipeline formation to external capital before it appears in public records. Investors see momentum, not just transactions.';
      else if (qa.priority === 'research') mechanism = 'Role-Aware Reframing is your primary engine — translating research outputs into commercial language and commercial needs into research questions. The translation layer that makes university-industry coupling possible at scale.';
      else if (qa.priority === 'supply') mechanism = 'Actor Matching is your primary engine — identifying supply chain capability across your ecosystem and matching it to anchor procurement signals. No premature disclosure. No cold outreach.';
      else if (qa.priority === 'growth') mechanism = 'Steward Interrogation is your primary engine — live insight into system health, coordination load, and emerging risk. Not retrospective reporting. Adaptive governance.';
      else mechanism = 'All reasoning capabilities active — Journey Construction, Signal Propagation, Role-Aware Reframing, Actor Matching, Stall Detection, Steward Interrogation.';
      mechanism += ' Every actor experience is constructed here, from live data, on demand.';

      return { diagnosis, consequence, mechanism };
    }

    /* ── STEP 6: Actor Journeys ── */
    case 5: {
      let diagnosis = '';
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis = `${stkEvidence.name} is partly a journey failure. Actors produce evidence because that is what the system rewards. Journey infrastructure changes what the system rewards — progress, connection, conversion.`;
      else if (stkMediated) diagnosis = `${stkMediated.name} means actor journeys run through human brokers. Infrastructure replaces the broker with a pathway — the actor pursues their own interest and the system routes them without mediation.`;
      else if (stalls.includes('S9')) diagnosis = 'Waiting stall means actors defer to gatekeepers. Journey infrastructure removes the gatekeeper from the critical path — actors see their next step without waiting for permission.';
      else diagnosis = 'Your actors currently navigate your ecosystem through personal networks and chance encounters. Journey infrastructure makes navigation repeatable — the same quality of pathway for every actor, regardless of who they know.';

      let consequence = '';
      if (qa.priority === 'talent') consequence = 'Without journey infrastructure, talent leaves not because there are no opportunities but because opportunities are invisible. A graduating engineer cannot see a pathway into your ecosystem so they take the visible pathway out of it.';
      else if (qa.priority === 'capital') consequence = 'Without journey infrastructure, investors cannot find credible entry points. They see activity but not momentum. They back ecosystems where the pipeline is legible.';
      else if (qa.priority === 'research') consequence = 'Without journey infrastructure, researchers cannot translate their work into commercial opportunity. They publish, present, and wait. The demand is there — the routing infrastructure is not.';
      else if (qa.priority === 'supply') consequence = 'Without journey infrastructure, supply chain actors cannot find anchor procurement signals. The anchor knows what it needs. The supplier knows what it offers. The matching never happens.';
      else if (qa.priority === 'growth') consequence = 'Without journey infrastructure, economic growth is personality-dependent — it compounds when brokers are active and stalls when they are not. Infrastructure makes growth repeatable.';
      else consequence = 'Without journey infrastructure, participation is unequal. Actors with strong networks navigate well. Actors without them do not. The ecosystem compounds inequality rather than capability.';

      // Mechanism includes cascade cards — return actor list for rendering
      let goalPhrase = 'pursuing their own goals';
      if (qa.priority === 'talent') goalPhrase = 'finding and developing their career';
      else if (qa.priority === 'capital') goalPhrase = 'finding the right investment opportunity';
      else if (qa.priority === 'research') goalPhrase = 'finding commercial applications for their work';
      else if (qa.priority === 'supply') goalPhrase = 'finding anchor procurement opportunities';
      else if (qa.priority === 'growth') goalPhrase = 'finding the conditions for their organisation to grow';

      const mechanism = `Every selfish action feeds the whole. No actor needs to care about the ecosystem. They only need to care about ${goalPhrase}. The platform makes their self-interest productive for the whole.`;

      // Get foregrounded actors for cascade cards
      const fgActors = [];
      const seen = new Set();
      (config.protections || []).forEach(p => {
        const actor = PROTECT_ACTOR_MAP[p];
        if (actor && ACTOR_CASCADES[actor] && !seen.has(actor)) { fgActors.push(actor); seen.add(actor); }
      });
      if (config.anchorLabel && ACTOR_CASCADES[config.anchorLabel] && !seen.has(config.anchorLabel)) { fgActors.push(config.anchorLabel); seen.add(config.anchorLabel); }
      if (!seen.has('Stewards')) fgActors.push('Stewards');
      const cascadeActors = fgActors.slice(0, 3);

      return { diagnosis, consequence, mechanism, cascadeActors };
    }

    /* ── STEP 7: Full Reveal ── */
    case 6: {
      const stallNames = stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; });
      let diagnosis = `You identified ${stalls.length} stall${stalls.length !== 1 ? 's' : ''} — ${stallNames.join(', ')}. `;
      if (stacks.length > 0) {
        const stackNames = stacks.map(s => s.name);
        diagnosis += `Your ecosystem is running ${stackNames.join(', ')}. `;
      } else {
        diagnosis += 'No reinforcing stacks detected — your stalls appear independent. ';
      }
      const stkEvidence = stackContains(stacks, 'S1', 'S7');
      const stkIncumbent = stackContains(stacks, 'S4', 'S6');
      const stkMediated = stackContains(stacks, 'S5', 'S9');
      if (stkEvidence) diagnosis += 'Evidence accumulates but never converts — the ecosystem justifies rather than executes.';
      else if (stkIncumbent) diagnosis += 'Value flows through incumbents rather than circulating locally — the ecosystem stabilises rather than compounds.';
      else if (stkMediated) diagnosis += 'Connections depend on brokers rather than forming directly — the ecosystem mediates rather than couples.';
      else if (stacks.length > 0) diagnosis += stacks[0].entry || '';
      else diagnosis += 'Each stall can be addressed independently — no reinforcing combination is locking the system into a single regime.';
      diagnosis += ` ${articleFor(config.configName)} ${config.configName} needs infrastructure that addresses this directly.`;

      let priorityLabel = 'economic growth';
      if (qa.priority === 'talent') priorityLabel = 'talent retention';
      else if (qa.priority === 'capital') priorityLabel = 'investment attraction';
      else if (qa.priority === 'research') priorityLabel = 'research commercialisation';
      else if (qa.priority === 'supply') priorityLabel = 'supply chain development';

      let consequence = `Without this infrastructure, ${priorityLabel} depends on the behaviours your stalls describe — brokerage, narrative, deference, tolerance of failure. `;
      if (protections.includes('knowledge')) consequence += 'The knowledge your ecosystem generates leaves with the people who hold it. ';
      if (protections.includes('ip')) consequence += 'The IP your anchor produces circulates beyond your boundary before it creates local value. ';
      if (protections.includes('trust')) consequence += 'The relationships your ecosystem depends on are invisible to any new actor who joins. ';
      if (protections.includes('talent')) consequence += 'The pipeline you build empties faster than you fill it. ';
      if (protections.includes('sovereignty')) consequence += 'The value your ecosystem creates is captured elsewhere. ';
      consequence += 'Coordination stays a social task rather than an infrastructural one.';

      let mechanism = `Every layer above exists in service of your sovereign ecosystem database — the one regional asset that compounds rather than depletes. ${config.configName} is not a platform you adopt. It is infrastructure you own.`;
      if (protectStr) mechanism += ` ${protectStr} — protected by architecture, not by policy.`;
      mechanism += ' The next step is a Snapshot diagnostic — a structured engagement that validates these findings with your ecosystem\'s actors and configures the platform for your specific context.';

      return { diagnosis, consequence, mechanism, showCTA: true };
    }

    default: return { diagnosis: '', consequence: '', mechanism: '' };
  }
}

/* ─── Architecture walkthrough overlay ─────────────────────────────── */
function ArchWalkthrough({ journeyState, config, onClose }) {
  const [step, setStep] = useState(0);
  const totalSteps = 7; // 6 layers + final reveal

  const activeTools = useMemo(() => getActiveToolNames(journeyState), [journeyState]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setStep(s => Math.min(s + 1, totalSteps - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setStep(s => Math.max(s - 1, 0)); }
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const isFinal = step === 6;
  const provocation = buildProvocation(step, journeyState, config);

  return (
    <div style={arch.overlay}>
      {/* Close */}
      <button style={arch.closeBtn} onClick={onClose}>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 5L15 15M15 5L5 15" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>

      {/* Step counter */}
      <div style={arch.stepCounter}>{step + 1} of {totalSteps}</div>

      <div style={{
        ...arch.walkthroughLayout,
        gridTemplateColumns: (provocation && provocation.scenario) ? '1fr 600px' : '1fr 340px',
      }}>
        {/* Diagram column */}
        <div style={arch.diagramCol}>
          {ARCH_LAYERS.map((layer, i) => {
            const layerIndex = i;
            const isActive = isFinal || layerIndex === step;
            const comps = layer.id === 'mcp' ? activeTools.slice(0, 12) : layer.components;
            return (
              <div key={layer.id} style={{
                ...arch.layerBox,
                opacity: isActive ? 1 : 0.15,
                borderColor: isActive ? 'var(--steward)' : 'var(--dj-border)',
                filter: isActive ? 'none' : 'blur(0.5px)',
                transition: 'opacity 0.4s, border-color 0.4s, filter 0.4s',
              }}>
                <div style={{
                  ...arch.layerTitle,
                  color: isActive ? 'var(--steward)' : 'var(--dj-chalk-muted)',
                }}>{layer.label}</div>
                <div style={arch.layerChips}>
                  {comps.map(c => (
                    <span key={c} style={{
                      ...arch.chip,
                      color: isActive ? 'var(--dj-chalk)' : 'var(--dj-chalk-muted)',
                      borderColor: isActive ? 'var(--dj-border)' : 'transparent',
                    }}>{c}</span>
                  ))}
                </div>
              </div>
            );
          }).reverse()}
        </div>

        {/* Annotation column — split layout for Step 2, single panel for others */}
        {provocation && provocation.scenario ? (
          <div style={arch.annotColSplit}>
            <div style={arch.annotLabel}>
              {ARCH_LAYERS[step].label}
            </div>
            <div style={arch.splitAnnot}>
              {/* Left: scenario story */}
              <div style={arch.splitLeft}>
                {provocation.scenario.split('\n\n').map((para, i) => (
                  <p key={i} style={arch.scenarioText}>{para}</p>
                ))}
              </div>
              {/* Divider */}
              <div style={arch.splitDivider} />
              {/* Right: provocation */}
              <div style={arch.splitRight}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
              </div>
            </div>
          </div>
        ) : (
          <div style={arch.annotCol}>
            <div style={arch.annotLabel}>
              {isFinal ? config.configName : ARCH_LAYERS[step].label}
            </div>

            {provocation && (
              <div style={arch.provocationWrap}>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Diagnosis</div>
                  <p style={arch.provDiagnosis}>{provocation.diagnosis}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Consequence</div>
                  <p style={arch.provText}>{provocation.consequence}</p>
                </div>
                <div style={arch.provSection}>
                  <div style={arch.provLabel}>Mechanism</div>
                  {provocation.cascadeActors && provocation.cascadeActors.map(name => {
                    const c = ACTOR_CASCADES[name];
                    if (!c) return null;
                    return (
                      <div key={name} style={arch.cascadeCard}>
                        <div style={arch.cascadeActor}>{name}</div>
                        <div style={arch.cascadeRow}>
                          <span style={arch.cascadeStepText}>{c.action}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.signal}</span>
                          <span style={arch.cascadeArrowInline}>&darr;</span>
                          <span style={arch.cascadeStepText}>{c.effect}</span>
                        </div>
                      </div>
                    );

                  <p style={arch.provText}>{provocation.mechanism}</p>
                </div>
                {provocation.showCTA && (
                  <a href="/get-started.html" style={arch.ctaLink}>
                    Talk to us about your configuration
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                      <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>

      {/* Navigation */}
      <div style={arch.navRow}>
        <button style={{ ...arch.navBtn, opacity: step > 0 ? 1 : 0.3 }} onClick={() => setStep(s => Math.max(s - 1, 0))} disabled={step === 0}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8L10 12" stroke="var(--dj-chalk-dim)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button style={{ ...arch.navBtn, opacity: step < totalSteps - 1 ? 1 : 0.3 }} onClick={() => setStep(s => Math.min(s + 1, totalSteps - 1))} disabled={step >= totalSteps - 1}>

/* ─── Stage 3: Digital OS ──────────────────────────────────────────── */
function DigitalOSStage() {
  const { journeyState, updateJourneyState } = useJourney();
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(journeyState.qualifierAnswers || {});
  const [multiSelect, setMultiSelect] = useState(answers.protect || []);
  const [showRecommendation, setShowRecommendation] = useState(
    journeyState.osConfig !== null
  );

  const q = QUALIFIER_QUESTIONS[currentQ];
  const totalQ = QUALIFIER_QUESTIONS.length;

  const selectSingle = useCallback((qId, value) => {
    const next = { ...answers, [qId]: value };
    setAnswers(next);
    updateJourneyState({ qualifierAnswers: next, osConfig: null });
    if (currentQ < totalQ - 1) {
      setTimeout(() => setCurrentQ(currentQ + 1), 300);
    }
  }, [answers, currentQ, totalQ, updateJourneyState]);

  const toggleMulti = useCallback((value) => {
    setMultiSelect(prev =>
      prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value]
    );
  }, []);

  const submitMulti = useCallback(() => {
    const finalAnswers = { ...answers, protect: multiSelect };
    setAnswers(finalAnswers);
    const config = deriveOSConfig(finalAnswers, journeyState.stalls, journeyState.detectedStacks || []);
    updateJourneyState({ qualifierAnswers: finalAnswers, osConfig: config });
    setShowRecommendation(true);
  }, [answers, multiSelect, journeyState.stalls, journeyState.detectedStacks, updateJourneyState]);

  const goBackQ = useCallback(() => {
    if (showRecommendation) {
      setShowRecommendation(false);
      setCurrentQ(totalQ - 1);
      setMultiSelect(answers.protect || []);
      updateJourneyState({ osConfig: null });
    } else if (currentQ > 0) {
      const prevQ = currentQ - 1;
      setCurrentQ(prevQ);
      if (QUALIFIER_QUESTIONS[prevQ].multi) {
        setMultiSelect(answers[QUALIFIER_QUESTIONS[prevQ].id] || []);
      }
    }
  }, [currentQ, showRecommendation, totalQ, answers, updateJourneyState]);

  const reviseFromStart = useCallback(() => {
    setShowRecommendation(false);
    setCurrentQ(0);
    updateJourneyState({ osConfig: null });
  }, [updateJourneyState]);

  // Show recommendation
  if (showRecommendation && journeyState.osConfig) {
    const config = journeyState.osConfig;
    return (
      <div style={s3.containerWide}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
          <div style={s3.configBadge}>Your configuration</div>
          <button style={styles.btnGhost} onClick={reviseFromStart}>
            Revise answers
          </button>
        </div>
        <h2 style={s3.configName}>{config.configName}</h2>
        <p style={s3.configSummary}>
          Based on {journeyState.stalls.length} behavioural stall{journeyState.stalls.length !== 1 ? 's' : ''},{' '}
          {(journeyState.detectedStacks || []).length} reinforcing stack{(journeyState.detectedStacks || []).length !== 1 ? 's' : ''},{' '}
          and your qualifier responses.
        </p>

        <p style={s3.configDescription}>{buildConfigDescription(config)}</p>

        {/* Infrastructure priorities */}
        <div style={s3.section}>
          <div style={s3.sectionLabel}>Infrastructure priorities</div>
          {config.priorities.map((p, i) => (
            <div key={i} style={s3.priorityCard}>
              <div style={s3.priorityNum}>{String(i + 1).padStart(2, '0')}</div>
              <div>
                <div style={s3.priorityName}>{p.name}</div>
                <div style={s3.priorityDesc}>{p.desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Membrane diagram */}
        <div style={s3.section}>
          <div style={s3.sectionLabel}>Ecosystem membrane</div>
          <MembraneDiagram config={config} />
        </div>

        {/* Infrastructure sections */}
        <InfrastructureSection journeyState={journeyState} config={config} />

        {/* CTA */}
        <div style={s3.ctaBox}>
          <h3 style={s3.ctaHeading}>Talk to us about your configuration</h3>
          <p style={s3.ctaBody}>
            This diagnostic has identified your stalls, mapped your stacks, and derived an architecture recommendation.
            The next step is a Snapshot diagnostic — a structured engagement that validates these findings with your ecosystem's actors.
          </p>
          <a href="/get-started.html" style={s3.ctaButton}>
            Get started
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    );
  }

  // Show qualifier question
  return (
    <div style={s3.container}>
      <div style={s3.qProgress}>
        <span style={s3.qProgressLabel}>Question {currentQ + 1} of {totalQ}</span>
        <div style={s3.qProgressTrack}>
          <div style={{ ...s3.qProgressFill, width: `${((currentQ + 1) / totalQ) * 100}%` }} />
        </div>
      </div>

      <h3 style={s3.qText}>{q.question}</h3>
      {q.multi && <p style={s3.qHint}>Select all that apply</p>}

      <div style={s3.optionGrid}>
        {q.options.map(opt => {
          const isSelected = q.multi
            ? multiSelect.includes(opt.value)
            : answers[q.id] === opt.value;
          return (
            <button
              key={opt.value}
              onClick={() => q.multi ? toggleMulti(opt.value) : selectSingle(q.id, opt.value)}
              style={{
                ...s3.optionCard,
                borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                background: isSelected ? 'rgba(12,148,136,0.06)' : 'var(--dj-surface)',
              }}
            >
              <div style={s3.optionHeader}>
                <span style={{
                  ...s3.optionLabel,
                  color: isSelected ? 'var(--dj-chalk)' : 'var(--dj-chalk-dim)',
                }}>{opt.label}</span>
                <div style={{
                  ...s3.optionCheck,
                  borderColor: isSelected ? 'var(--steward)' : 'var(--dj-border)',
                  background: isSelected ? 'var(--steward)' : 'transparent',
                  borderRadius: q.multi ? '4px' : '50%',
                }}>
                  {isSelected && (
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 5L4.2 7.2L8 3" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>
              </div>
              {opt.desc && <div style={s3.optionDesc}>{opt.desc}</div>}
            </button>
          );
        })}
      </div>

      {q.multi && (
        <div style={s3.multiActions}>
          <button
            style={{
              ...styles.btnSignal,
              opacity: multiSelect.length > 0 ? 1 : 0.4,
              pointerEvents: multiSelect.length > 0 ? 'auto' : 'none',
            }}
            onClick={submitMulti}
          >
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      )}

      {currentQ > 0 && (
        <button style={{ ...styles.btnGhost, marginTop: '16px' }} onClick={goBackQ}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
            <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Previous question
        </button>
      )}
    </div>
  );
}

/* ─── Transition card between stages ───────────────────────────────── */
function TransitionCard({ fromStage, journeyState, onContinue, onStop }) {
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const stallNames = stalls.map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; });

  if (fromStage === 0) {
    const stackNames = stacks.map(s => s.name);
    const stallStr = stallNames.join(', ');
    let body = `You've identified ${stalls.length} stall${stalls.length !== 1 ? 's' : ''} — ${stallStr}. `;
    if (stacks.length > 0) {
      body += `Your ecosystem is running ${stackNames.join(', ')}. Stacks are harder to break than individual stalls because removing one stall does not remove the conditions that sustain it. `;
    } else {
      body += 'No reinforcing stacks detected — your stalls appear independent. ';
    }
    body += 'The next stage shows you where to intervene first — and what changes if you do.';

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue to Leverage
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  if (fromStage === 1) {
    let target = '';
    let entryText = '';
    if (stacks.length > 0) {
      target = stacks[0].name;
      entryText = stacks[0].entry ? ` — ${stacks[0].entry.charAt(0).toLowerCase()}${stacks[0].entry.slice(1)}` : '';
    } else if (stalls.length > 0) {
      target = stallNames[0];
      entryText = ' — addressing the stall patterns independently';
    }
    const body = `Your leverage hypothesis targets ${target}${entryText}. The next stage translates this into infrastructure — what your ecosystem needs to be built on, configured for your specific context.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue to Digital OS
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  return null;
}

/* ─── Main app ─────────────────────────────────────────────────────── */
function DiagnosticJourney() {
  const [currentStage, setCurrentStage]   = useState(0);
  const [completedUpTo, setCompletedUpTo] = useState(0);
  const [showExitModal, setShowExitModal] = useState(false);
  const [exited, setExited]               = useState(false);
  const [exitedAt, setExitedAt]           = useState(null);
  const [showTransition, setShowTransition] = useState(false);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],           // selected stall IDs from Stage 1
    stacks: [],           // detected stack names from Stage 1
    leverageHypotheses: [],  // generated in Stage 2
    qualifierAnswers: {},    // qualifier responses from Stage 3
    osConfig: null,          // generated in Stage 3
  });

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => ({ ...prev, ...patch }));
  }, []);

  /* ── Navigation ── */
  const goNext = useCallback(() => {
    // Intercept stages 0 and 1 to show transition card first
    if ((currentStage === 0 || currentStage === 1) && !showTransition) {
      setShowTransition(true);
      return;
    }
    setShowTransition(false);
    const next = currentStage + 1;
    if (next < STAGES.length) {
      setCompletedUpTo(prev => Math.max(prev, next));
      setCurrentStage(next);
    }
  }, [currentStage, showTransition]);

  const goBack = useCallback(() => {
    if (showTransition) { setShowTransition(false); return; }
    if (currentStage > 0) setCurrentStage(currentStage - 1);
  }, [currentStage, showTransition]);

  const requestExit = useCallback(() => {
    setShowExitModal(true);
  }, []);

  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    setExitedAt(currentStage);
    setExited(true);
  }, [currentStage]);

  const cancelExit = useCallback(() => {
    setShowExitModal(false);
  }, []);

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage    = STAGES[currentStage];
  const isFirst  = currentStage === 0;
  const isLast   = currentStage === STAGES.length - 1;

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          {showTransition ? (
            <TransitionCard
              fromStage={currentStage}
              journeyState={journeyState}
              onContinue={goNext}
              onStop={() => {
                console.log(currentStage === 0 ? 'stop-behaviours' : 'stop-leverage');
                // TODO: wire to email capture / report generation
                setExitedAt(currentStage);
                setExited(true);
              }}
            />
          ) : currentStage === 0 ? <BehavioursStage />
            : currentStage === 1 ? <LeverageStage />
            : currentStage === 2 ? <DigitalOSStage />
            : <StagePlaceholder stage={stage} />
          }
        </main>

        {/* ── Navigation bar ── */}
        <nav style={styles.navBar}>
          <div style={styles.navLeft}>
            {!isFirst && (
              <button style={styles.btnGhost} onClick={goBack}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                  <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Back
              </button>
            )}
          </div>
          <div style={styles.navCenter}>
            <button style={styles.btnExit} onClick={requestExit}>
              Stop here
            </button>
          </div>
          <div style={styles.navRight}>
            {!isLast ? (
              <button style={styles.btnSignal} onClick={goNext}>
                Continue
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                  <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            ) : (
              <button style={styles.btnSignal} onClick={goNext}>
                Finish
              </button>
            )}
          </div>
        </nav>

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}

  stepCounter: {

  walkthroughLayout: {
    flex: 1,

    overflowY: 'auto',
  },
  diagramCol: {
    display: 'flex',
    flexDirection: 'column',
    gap: '6px',
    justifyContent: 'center',
    overflowY: 'auto',

  annotCol: {
    display: 'flex',

  /* Step 2 split annotation */
  annotColSplit: {
    display: 'flex',

    gap: '14px',
    paddingLeft: '20px',
    overflowY: 'auto',

  /* Layer box */
  layerBox: {
    border: '1px solid var(--dj-border)',

  layerTitle: {

  layerChips: {
    display: 'flex',

    gap: '4px',

    fontWeight: 400,
    padding: '3px 7px',
    borderRadius: '3px',

  annotLabel: {
    fontFamily: 'var(--font-serif)',

    fontWeight: 400,
    color: 'var(--dj-chalk)',
    marginBottom: '16px',
    letterSpacing: '-0.01em',

  /* Provocation 3-part format */
  provocationWrap: {
    display: 'flex',

    gap: '16px',
    overflowY: 'auto',

    paddingRight: '4px',

  scenarioText: {
    fontFamily: 'var(--font-serif)',
    fontSize: '16px',
    fontWeight: 400,
    lineHeight: 1.75,
    color: 'var(--dj-chalk)',
    letterSpacing: '-0.01em',
    marginBottom: '14px',

  provSection: {},
  provLabel: {

  provDiagnosis: {
    fontFamily: 'var(--font-serif)',

    fontWeight: 400,
    lineHeight: 1.6,
    color: 'var(--dj-chalk)',

  },
  provText: {
    fontFamily: 'var(--font-sans)',
    fontSize: '13px',
    fontWeight: 400,
    lineHeight: 1.65,
    color: 'var(--dj-chalk-dim)',

  /* Cascade cards for Step 6 */
  cascadeCard: {
    border: '1px solid var(--dj-border)',
    borderRadius: '6px',

    marginBottom: '8px',

    fontSize: '14px',
    color: 'var(--dj-chalk)',

  },

    flexDirection: 'column',
    gap: '2px',
  },
  cascadeStepText: {
    fontFamily: 'var(--font-sans)',

    color: 'var(--dj-chalk-dim)',
    lineHeight: 1.4,
  },
  cascadeArrowInline: {
    fontFamily: 'var(--font-sans)',
    fontSize: '10px',

  navRow: {
    display: 'flex',

    gap: '16px',

/* ─── Transition card styles ───────────────────────────────────────── */
const trans = {
  card: {
    width: '100%',
    maxWidth: '640px',
    background: 'var(--dj-surface)',
    border: '1px solid var(--dj-border)',
    borderLeft: '3px solid var(--steward)',
    borderRadius: '8px',
    padding: '32px',
  },
  text: {
    fontFamily: 'var(--font-serif)',
    fontSize: '18px',
    fontWeight: 400,
    lineHeight: 1.6,
    color: 'var(--dj-chalk)',
    marginBottom: '28px',
    letterSpacing: '-0.01em',
  },
  actions: {
    display: 'flex',
    gap: '12px',
    justifyContent: 'flex-end',
    flexWrap: 'wrap',
  },
};

/* ─── App wrapper with loading gate ────────────────────────────────── */
function App() {
  const [ready, setReady] = useState(false);
  useEffect(() => { loadKnowledge().then(() => setReady(true)); }, []);
  if (!ready) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--dj-bg)' }}>
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', color: 'var(--dj-chalk-muted)', letterSpacing: '0.06em' }}>
        Loading ecosystem definitions...
      </span>
    </div>
  );
  return <DiagnosticJourney />;
}

/* ─── Mount ────────────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
