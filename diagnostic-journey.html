                    <animate attributeName="opacity" values="0.9;1;0.9" dur="1s" begin="0s" repeatCount="1" />
                  )}
                </rect>
                <text x={tagX - 60} y={tagY + 9} textAnchor="middle"
                  fill="#1a1a1a" fontFamily="'Geist Mono', monospace" fontSize="7" fontWeight="500">
                  {label}
                </text>
              </g>
            );
          });
        });
      })()}
    </svg>
  );
}

function MobileAccordion({ journeyState, config }) {
  const [expandedKey, setExpandedKey] = useState('sovereignDatabase');

  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const tc = journeyState.techConfig || {};

  const STEP_TECH_MAP = {
    sovereignDatabase: tc.sovereignDatabase ? { pills: tc.sovereignDatabase.clusters, type: 'clusters' } : null,
    governanceAccess: tc.governanceAccess ? { label: tc.governanceAccess.label, delivery: tc.governanceAccess.delivery, rationale: tc.governanceAccess.rationale } : null,
    intelligenceSubstrate: tc.intelligenceSubstrate ? { label: tc.intelligenceSubstrate.label, delivery: tc.intelligenceSubstrate.delivery, rationale: tc.intelligenceSubstrate.rationale } : null,
    aiRuntime: tc.aiRuntime ? { label: tc.aiRuntime.label, delivery: tc.aiRuntime.delivery, rationale: tc.aiRuntime.rationale } : null,
  };

  // Build steward annotation for the final card
  const stewardAnnotation = useMemo(() => {

    if (has('S1') || has('S7')) stewardQuestions.push(`"Are we still **Re-proving**?" — you get a live reading of whether evidence is informing decisions or accumulating as justification.`);
    if (has('S4')) stewardQuestions.push(`"Is our ${anchorLabel} circulating value or extracting it?" — you get a value flow analysis from real transaction records.`);
    if (has('S2') || has('S5')) stewardQuestions.push(`"Who is connecting to whom — and is it working?" — you see which connections run through brokers and which form directly.`);
    if (has('S9')) stewardQuestions.push(`"Who is waiting for permission that could act now?" — dependency patterns become visible before they become structural.`);
    if (has('S8')) stewardQuestions.push(`"Which programmes are producing starts but not outcomes?" — graduation rates alongside cohort sizes.`);
    stewardQuestions.push(`"Where would one intervention have the most effect right now?" — a leverage hypothesis from current actor behaviour.`);
    return { stackNames, stewardQuestions };
  }, [journeyState, config, stalls, stacks]);

  return (
    <div>
      {/* Header */}
      <div style={{ marginBottom: '20px' }}>

          This is the infrastructure stack recommended for your ecosystem. Tap each layer to see what it does and why it's in your configuration.
        </p>
      </div>

      {/* Accordion layers */}
      {ACCORDION_LAYERS.map(layer => {
        const isExpanded = expandedKey === layer.key;
        const borderColor = LAYER_BORDER_COLOR[layer.step] || 'var(--dj-border)';
        const isSovereign = layer.key === 'sovereignDatabase';
        const layerId = STEP_LAYER_ID[layer.step];
        const stallTags = stalls
          .filter(sid => STALL_LAYER_MAP[sid] === layerId)
          .map(sid => { const s = STALLS.find(x => x.id === sid); return s ? `${sid} ${s.name}` : sid; });
        const tech = STEP_TECH_MAP[layer.key];
        const commentary = buildLayerCommentary(layer.key, journeyState, config);

        return (
          <div key={layer.key} style={{
            background: isExpanded ? '#fff' : '#f5f0e8',
            border: isExpanded ? '1px solid #7dd3c8' : '1px solid #1e2f45',
            borderLeft: isExpanded ? '3px solid #7dd3c8' : (isSovereign ? '3px solid #c8f0d0' : '1px solid #1e2f45'),
            borderRadius: '8px',
            padding: '16px',
            marginBottom: '8px',
            transition: 'all 0.2s ease',
          }}>
            {/* Header row — always visible */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}
              onClick={() => setExpandedKey(isExpanded ? null : layer.key)}>
              <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', fontWeight: 400, color: '#1e2f45', margin: 0 }}>
                {layer.label}
              </h3>
              <span style={{ color: '#7dd3c8', fontSize: '14px', flexShrink: 0, marginLeft: '8px' }}>{isExpanded ? '▼' : '▶'}</span>

            {/* Tech badge — visible when collapsed too */}
            {tech && !tech.type && (
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', fontWeight: 600, letterSpacing: '0.06em', color: '#1e2f45', background: tech.delivery === 'live' ? '#c8f0d0' : '#f5d97a', borderRadius: '4px', padding: '3px 8px', display: 'inline-block', marginTop: '8px' }}>{tech.label}</span>
            )}

            {/* Stall tags — visible when collapsed too */}
            {stallTags.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px', marginTop: '8px' }}>
                {stallTags.map(t => (
                  <span key={t} style={{ fontFamily: 'var(--font-mono)', fontSize: '8px', fontWeight: 500, color: '#1a1a1a', background: '#f5d97a', borderRadius: '6px', padding: '2px 6px' }}>
                    {t}
                  </span>
                ))}
              </div>

            {/* Expanded content */}
            {isExpanded && (
              <div style={{ marginTop: '16px', borderTop: '1px solid var(--dj-border)', paddingTop: '16px' }}>
                {/* Sovereign DB cluster pills */}
                {tech && tech.type === 'clusters' && tech.pills && tech.pills.length > 0 && (
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', marginBottom: '12px' }}>

                  <p style={{ fontFamily: 'var(--font-sans)', fontSize: '12px', color: '#6b7a8d', fontStyle: 'italic', marginBottom: '12px' }}>{tech.rationale}</p>
                )}

                {/* Layer commentary */}
                {commentary && (
                  <div style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', lineHeight: 1.65, color: 'var(--dj-chalk)', whiteSpace: 'pre-line' }}>
                    {commentary}

                )}

            )}
          </div>
        );
      })}

      {/* Final card — Full Architecture / Steward section */}
      <div style={{
        background: stewardExpanded ? '#1e2f45' : '#1e2f45',
        border: '1px solid #1e2f45',

          <span style={{ color: '#7dd3c8', fontSize: '14px', flexShrink: 0, marginLeft: '8px' }}>{stewardExpanded ? '▼' : '▶'}</span>
        </div>
        {!stewardExpanded && (
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '12px', color: '#8a95a8', marginTop: '4px' }}>Tap to see what you see as steward</p>
        )}

        {stewardExpanded && stewardAnnotation && (
          <div style={{ marginTop: '16px', borderTop: '1px solid rgba(125,211,200,0.2)', paddingTop: '16px' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: '9px', fontWeight: 600, letterSpacing: '0.12em', color: '#7dd3c8', marginBottom: '12px' }}>STEWARD INTERROGATION</div>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', lineHeight: 1.65, color: '#e8edf5', marginBottom: '16px' }}>
              Today when your board asks what's working, someone compiles a report. With this configuration, you ask questions and get answers from live signals:
            </p>
            {stewardAnnotation.stewardQuestions.map((q, i) => (
              <div key={i} style={{ padding: '8px 0', borderBottom: i < stewardAnnotation.stewardQuestions.length - 1 ? '1px solid rgba(125,211,200,0.1)' : 'none' }}>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', lineHeight: 1.5, color: '#e8edf5' }}><BoldText text={q} /></p>
              </div>

            <div style={{ marginTop: '20px' }}>
              <TalkToUsCTA journeyState={journeyState} style={{ display: 'inline-flex', alignItems: 'center', fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 600, letterSpacing: '0.04em', color: '#1e2f45', background: '#7dd3c8', border: 'none', borderRadius: '4px', padding: '12px 24px', cursor: 'pointer', textDecoration: 'none' }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MobileSchemaStep({ schemaStep, configName, selectedStalls, expanded, onToggle }) {
  const layerLabel = STEP_LAYER_LABEL[schemaStep] || '';
  const layerId = STEP_LAYER_ID[schemaStep];
  const stallTags = (selectedStalls || [])
    .filter(sid => STALL_LAYER_MAP[sid] === layerId)
    .map(sid => { const s = STALLS.find(x => x.id === sid); return s ? `${sid} ${s.name}` : sid; });
  const borderColor = LAYER_BORDER_COLOR[schemaStep] || 'var(--dj-border)';
  const isSovereign = schemaStep === 1;

  return (
    <div style={{ padding: '4px 0', borderLeft: `${isSovereign ? '4px' : '3px'} solid ${borderColor}`, paddingLeft: '16px', borderRadius: isSovereign ? '4px' : '0', background: isSovereign ? 'rgba(200,240,208,0.06)' : 'transparent' }}>
      <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: '10px', color: 'var(--dj-chalk-muted)', letterSpacing: '0.08em', marginBottom: '8px' }}>

      <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: '10px', fontWeight: 600, letterSpacing: '0.08em', color: 'var(--steward)', background: 'rgba(12,148,136,0.08)', border: '1px solid rgba(12,148,136,0.2)', borderRadius: '3px', padding: '3px 8px', display: 'inline-block', marginBottom: '12px' }}>

        <span className="mobile-expand-toggle" style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--dj-chalk-muted)', transition: 'transform 0.2s', transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)' }}>▾</span>

function ArchitectureSchemaCards({ selectedStalls }) {
  const stallsArr = selectedStalls || [];
  const stallTagsFor = (layerId) => stallsArr
    .filter(sid => STALL_LAYER_MAP[sid] === layerId)
    .map(sid => { const s = STALLS.find(x => x.id === sid); return s ? `${sid} ${s.name}` : sid; });
  return (
    <div style={schema.cardStack}>
      {SCHEMA_LAYERS.map(layer => {
        const layerTags = stallTagsFor(layer.id);
        const isSovereign = layer.split;

                <div style={{ fontFamily: 'var(--font-mono)', fontSize: '8px', fontWeight: 600, letterSpacing: '0.1em', color: 'var(--dj-chalk-muted)', marginBottom: '4px' }}>BOT NETWORK</div>
                <div style={schema.cardPills}>
                  {bots.map(b => (

        const allComps = layer.comps || [];
        return (
          <div key={layer.id} style={{ ...schema.card, borderLeft: '1px solid var(--dj-border)' }}>
            <div style={schema.cardLabel}>{layer.label}</div>
            {layerTags.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px', marginBottom: '8px' }}>
                {layerTags.map(t => <span key={t} style={{ fontFamily: 'var(--font-mono)', fontSize: '8px', color: '#1a1a1a', background: '#f5d97a', borderRadius: '8px', padding: '2px 8px' }}>Addresses {t}</span>)}
              </div>
            )}
            <div style={schema.cardPills}>
              {allComps.map(c => (
                <span key={c.id} style={{
                  ...schema.pill,
                  fontFamily: c.mono ? "'Geist Mono', monospace" : "'Geist', system-ui",
                  fontSize: c.mono ? '9px' : '10px',
                }}>{c.label}</span>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── Helper: render text with **bold** markers as React elements ── */
function BoldText({ text }) {
  if (!text) return null;
  const parts = text.split(/\*\*(.+?)\*\*/g);
  return parts.map((part, i) => i % 2 === 1
    ? React.createElement('strong', { key: i }, part)
    : part
  );
}

        conversion: `Your biggest coordination gap is conversion — activity is happening but outcomes aren't compounding. Community Services API and Professional Identity make actor progression visible as structured signal, not anecdote. The system reads conversion, not just activity.`,
      };
      const body = GAP_DESC[qa.gap] || 'Without external data at the supercluster level, every new ecosystem starts empty. Actors arrive and see nothing. The cold-start problem kills momentum before the platform generates its own signal.';
      return { title: 'What feeds your ecosystem before any actor joins', body };
    }
    // Step 4: Bots / Continuous enrichment
    case 4: {
      const body = 'Every ecosystem has a cold-start problem: the platform only becomes useful once it knows enough about the ecosystem to be useful. The bot network solves this without requiring anyone to manually enter data. Evidence Ingestion Bot reads public sources continuously and writes structured findings to your sovereign database. Actor Enrichment Bot updates profiles from behaviour rather than self-report. Health Monitoring Bot tracks system health across all clusters. By the time your first actor joins, the ecosystem already knows itself.';
      return { title: 'Continuous enrichment', body };
    }
    // Step 5: MCP Intelligence
    case 5: {
      let body = `Reports get written, circulated, and overtaken by events. By the time a report reaches a board, the ecosystem has moved. This layer replaces reports with live queries. When you ask what is stalling, the system reads current actor behaviour — not last quarter's narrative. When you ask where a founder dropped out, it checks the journey record, not the programme manager's recollection.`;
      if (allStackBold) body += ` ${allStackBold} lose their fuel source when findings are separated from the process of producing them.`;
      return { title: 'How your ecosystem thinks', body };
    }
    // Step 6: AI Engine — renamed heading
    case 6: {
      const body = `A founder joins and declares their technology domain. The system reads that against live procurement signals from your ${anchorLabel} anchor and constructs their pathway — not a generic onboarding flow, but a specific sequence of connections, groups, and milestones based on what this ecosystem actually has. A researcher publishes a finding. The system reads it against active founder profiles and surfaces it to the three founders most likely to need it. You interrogate the ecosystem. The system reads the same signals and tells you what is stalling, what is converting, and where one intervention would have the most effect. Same data. Different questions. Different outputs.`;
      return { title: 'How your ecosystem makes decisions', body };
    }
    // Step 7: Application Layer — anchor-type-driven cards
    case 7: {
      const actorMap = {
        'University': ['Researchers', 'Founders', 'Stewards'],
        'Research institute': ['Researchers', 'Founders', 'Stewards'],
        'Large corporate': ['Founders', config.anchorLabel, 'Stewards'],
        'Public agency': ['Founders', 'Researchers', 'Stewards'],
        'Hospital': ['Founders', 'Researchers', 'Stewards'],
      };
      const actors = (actorMap[anchorLabel] || ['Founders', 'Researchers', 'Stewards'])
        .filter(a => ACTOR_CASCADES[a]);
      return { title: 'What your actors experience', body: null, cascadeActors: actors.slice(0, 3) };
    }
    // Step 8: Final reveal + steward section
    case 8: {
      let body = `Your sovereign boundary — ${config.configName}. Not a platform you adopt. Infrastructure you own.`;
      if (protectStr) body += ` ${protectStr} — protected by architecture, not by policy.`;
      if (allStackBold) body += ` This configuration directly addresses ${allStackBold}.`;
      body += ' The next step is a Snapshot diagnostic — a structured engagement that validates these findings with your ecosystem\'s actors.';

      // Steward section data — locally computed from diagnostic findings
      const stewardQuestions = [];
      if (has('S1') || has('S7')) stewardQuestions.push(`"Are we still **Re-proving**?" — you get a live reading of whether evidence is informing decisions or accumulating as justification. If your ${anchorLabel} published 40 research outputs last quarter and 3 generated commercial conversations, you see that ratio without anyone compiling a report.`);
      if (has('S4')) stewardQuestions.push(`"Is our ${anchorLabel} circulating value or extracting it?" — you get a value flow analysis showing where procurement, talent, and IP crossed the boundary and whether it came back. Not an annual audit. A live signal.`);
      if (has('S2') || has('S5')) stewardQuestions.push(`"Who is connecting to whom — and is it working?" — you see which connections happened through infrastructure and which still run through brokers. When a programme manager leaves, you see which connections go with them.`);
      if (has('S9')) stewardQuestions.push(`"Who is waiting for permission that could act now?" — you see which actors are blocked by dependency rather than capability. The gatekeeper pattern becomes visible before it becomes structural.`);
      if (has('S8')) stewardQuestions.push(`"Which programmes are producing starts but not outcomes?" — you see graduation rates alongside cohort sizes. Activity that looks like progress but isn't converting surfaces as a pattern.`);
      stewardQuestions.push(`"Where would one intervention have the most effect right now?" — you get a leverage hypothesis ranked by confidence, derived from live stall detection against your ${stackNames || 'detected patterns'}. Not a consultant's recommendation from three months ago. A structural reading from current actor behaviour.`);

      const stewardSection = {
        heading: 'What you see',
        subheading: 'STEWARD INTERROGATION',
        body: `Today when your board asks what's working, someone compiles a report from programme managers' recollections, annual surveys, and whatever data was last collected. By the time it reaches the table, it describes an ecosystem that no longer exists in exactly that form.\n\nWith this configuration, you ask questions and get answers assembled from live signals — the same data your actors are already producing by pursuing their own interests. Here are the questions your diagnostic has unlocked:`,
        stewardQuestions,
        bullets: [
          `Your ${stackNames || 'stall patterns'} ${stacks.length > 1 ? 'are' : 'is'} tracked continuously — not as a static finding from this diagnostic, but as a live reading that updates as actor behaviour changes`,
          `Board evidence is generated from the same data your actors are already producing — no additional reporting burden, no survey fatigue, no lag between reality and record`,
          `Intervention targeting is structural, not political — the system shows where one change would break the reinforcing logic, regardless of which organisation would prefer the status quo`,
        ],
      };

      return { title: config.configName, body, stewardSection, showCTA: true };
    }
    default: return null;
  }
}

/* ─── Stage 3: Digital OS (recommendation only, qualifiers moved) ── */
function DigitalOSStage() {
  const { journeyState, updateJourneyState } = useJourney();

  // Compute osConfig if qualifierAnswers exist but osConfig doesn't
  useEffect(() => {
    if (journeyState.qualifierAnswers && Object.keys(journeyState.qualifierAnswers).length > 0 && !journeyState.osConfig) {
      const config = deriveOSConfig(journeyState.qualifierAnswers, journeyState.stalls, journeyState.detectedStacks || []);
      updateJourneyState({ osConfig: config });
    }
  }, [journeyState.qualifierAnswers, journeyState.osConfig, journeyState.stalls, journeyState.detectedStacks, updateJourneyState]);

  const [schemaStep, setSchemaStep] = useState(0);
  const [mobileExpanded, setMobileExpanded] = useState(true); // sovereign (step 1) starts expanded

  // Reset expanded state when step changes — sovereign expanded by default, others collapsed
  useEffect(() => {
    setMobileExpanded(schemaStep === 1 || schemaStep === 8);
  }, [schemaStep]);

  const reviseFromStart = useCallback(() => {
    setSchemaStep(0);
    updateJourneyState({ osConfig: null, qualifierAnswers: {}, _reviseQualifiers: true });
  }, [updateJourneyState]);

  if (!journeyState.osConfig) {
    return (
      <div style={s3.container}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', color: 'var(--dj-chalk-muted)' }}>
          Computing your configuration...
        </span>
      </div>
    );
  }

  const config = journeyState.osConfig;

  // Stepper — steps 0-8
  const stepCfg = STEP_CONFIG[schemaStep] || STEP_CONFIG[0];
  const annotation = schemaStep > 0 ? buildStepAnnotation(schemaStep, journeyState, config) : null;

  return (
    <div style={s3.containerWide}>
      {/* Mobile accordion — replaces stepper on mobile */}
      <div className="mobile-accordion-wrap">
        <MobileAccordion journeyState={journeyState} config={config} />
      </div>

      {/* Desktop stepper — hidden on mobile */}
      <div className="desktop-stepper-wrap">
      {/* Header */}
      <div className="stepper-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div className="stepper-config-badge" style={s3.configBadge}>{config.configName}</div>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <span className="stepper-counter" style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', color: 'var(--dj-chalk-muted)', letterSpacing: '0.08em' }}>
            Step {schemaStep + 1} of {TOTAL_STEPS}
          </span>
          <button className="stepper-back-overview" style={styles.btnGhost} onClick={() => setSchemaStep(0)}>Back to start</button>
        </div>
      </div>

      {/* Step 0: intro text ABOVE the diagram */}
      {schemaStep === 0 && (
        <div style={{ padding: '20px 0' }}>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '24px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '10px', letterSpacing: '-0.01em' }}>
            Your {config.configName} — fully configured.
          </h2>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '8px' }}>
            This is the infrastructure stack recommended for your ecosystem, built around what your diagnostic found. Step through each layer to see what it does, why it's in your configuration, and what it addresses.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginBottom: '20px' }}>
            {TOTAL_STEPS} layers{(journeyState.detectedStacks || []).length > 0 ? ` · ${(journeyState.detectedStacks || []).map(s => s.name).join(', ')}` : ''}
          </p>
        </div>
      )}

      {/* SVG schema with layer highlighting */}
      <div className="schema-desktop">
        <ArchitectureSchemaSVG
          activeLayer={stepCfg.allActive ? SCHEMA_LAYERS.map(l => l.id) : stepCfg.active}
          secondaryLayers={stepCfg.secondary}
          selectedStalls={journeyState.stalls}
          currentStep={schemaStep}
        />
      </div>
      <div className="schema-mobile-stepper">
        <MobileSchemaStep schemaStep={schemaStep} configName={config.configName} selectedStalls={journeyState.stalls} expanded={mobileExpanded} onToggle={() => setMobileExpanded(prev => !prev)} />
      </div>

      {/* Step 0: CTA button below diagram */}
      {schemaStep === 0 && (
        <div style={{ padding: '16px 0', textAlign: 'center' }}>
          <button style={styles.btnSignal} onClick={() => setSchemaStep(1)}>
            Walk through your stack
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      )}

      {/* Annotation panel (steps 1-8) */}
      {annotation && (() => {
        const STEP_LAYER_KEY = { 1: 'sovereignDatabase', 2: 'governanceAccess', 3: 'integrationLayer', 4: 'automationLayer', 5: 'intelligenceSubstrate', 6: 'aiRuntime', 7: 'applicationLayer' };
        const layerKey = STEP_LAYER_KEY[schemaStep];
        const dcObj = journeyState.digitalCommentary;
        const dc = (dcObj && layerKey && dcObj[layerKey]) ? dcObj[layerKey] : null;
        if (schemaStep >= 1 && schemaStep <= 7) {
          console.log('[Render Step', schemaStep, '] layerKey:', layerKey, 'digitalCommentary exists:', !!dcObj, 'dc:', dc);
        }
        return (
        <div className={mobileExpanded ? 'annot-panel-expanded' : 'annot-panel-collapsed'} style={schema.annotPanel}>
          {schemaStep < 8 && <h3 className="annot-title-desktop" style={schema.annotTitle}>{annotation.title}</h3>}

          {/* Tech recommendation badge — renders from local techConfig, independent of API */}
          {(() => {
            const tc = journeyState.techConfig;
            if (!tc) { if (schemaStep >= 1 && schemaStep <= 7) console.warn('[TechBadge] techConfig is NULL on step', schemaStep); return null; }
            console.log('[TechBadge] Step', schemaStep, '| aiRuntime:', tc.aiRuntime?.label, '| intelligence:', tc.intelligenceSubstrate?.label, '| governance:', tc.governanceAccess?.label, '| clusters:', tc.sovereignDatabase?.clusters?.length);
            const STEP_TECH = {
              1: tc.sovereignDatabase ? { pills: tc.sovereignDatabase.clusters, type: 'clusters' } : null,
              2: tc.governanceAccess ? { label: tc.governanceAccess.label, rationale: tc.governanceAccess.rationale, delivery: tc.governanceAccess.delivery } : null,
              5: tc.intelligenceSubstrate ? { label: tc.intelligenceSubstrate.label, rationale: tc.intelligenceSubstrate.rationale, delivery: tc.intelligenceSubstrate.delivery } : null,
              6: tc.aiRuntime ? { label: tc.aiRuntime.label, rationale: tc.aiRuntime.rationale, delivery: tc.aiRuntime.delivery } : null,
            };
            const tech = STEP_TECH[schemaStep];
            if (!tech) return null;
            if (tech.type === 'clusters' && tech.pills && tech.pills.length > 0) {
              return (
                <div style={{ marginBottom: '16px' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', marginBottom: '8px' }}>
                    {tech.pills.map(p => <span key={p} style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', letterSpacing: '0.06em', color: '#1e2f45', background: '#7dd3c8', borderRadius: '4px', padding: '4px 10px', display: 'inline-block' }}>{p}</span>)}
                  </div>
                  <span style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: '#6b7a8d', fontStyle: 'italic', display: 'block' }}>
                    These are the data structures your ecosystem currently lacks — each one captures actor behaviour that your detected stalls leave unrecorded.
                  </span>
                </div>
              );
            }
            const badgeColor = tech.delivery === 'live' ? '#c8f0d0' : '#f5d97a';
            return (
              <div style={{ marginBottom: '16px' }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 600, letterSpacing: '0.06em', color: '#1e2f45', background: badgeColor, borderRadius: '4px', padding: '4px 10px', display: 'inline-block', marginBottom: '8px' }}>{tech.label}</span>
                <span style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: '#6b7a8d', fontStyle: 'italic', display: 'block', marginBottom: '16px' }}>{tech.rationale}</span>
              </div>
            );
          })()}

          {/* Layer commentary — locally computed from journey state */}
          {schemaStep >= 1 && schemaStep <= 7 && (() => {
            const commentary = buildLayerCommentary(layerKey, journeyState, config);
            if (!commentary) return null;
            return (
              <div style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.7, color: 'var(--dj-chalk)', whiteSpace: 'pre-line' }}>
                {commentary}
              </div>
            );
          })()}
          {annotation.cascadeActors && annotation.cascadeActors.map(name => {
            const c = ACTOR_CASCADES[name];
            if (!c) return null;
            return (
              <div key={name} style={schema.cascadeCard}>
                <div style={schema.cascadeActor}>{name}</div>
                <div style={schema.cascadeFlow}>
                  <span style={schema.cascadeStep}>{c.action}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.signal}</span>
                  <span style={schema.cascadeArrow}>&darr;</span>
                  <span style={schema.cascadeStep}>{c.effect}</span>
                </div>
              </div>
            );
          })}

          {/* Steward section (Step 8 final reveal) */}
          {annotation.stewardSection && (
            <div style={schema.stewardSection}>
              <h3 style={schema.stewardHeading}>{annotation.stewardSection.heading}</h3>
              <div style={schema.stewardSub}>{annotation.stewardSection.subheading}</div>
              <p style={schema.stewardBody}><BoldText text={annotation.stewardSection.body} /></p>
              {/* Diagnostic-specific steward questions */}
              {annotation.stewardSection.stewardQuestions && (
                <div style={{ margin: '16px 0' }}>
                  {annotation.stewardSection.stewardQuestions.map((q, i) => (
                    <div key={i} style={{ padding: '12px 0', borderBottom: i < annotation.stewardSection.stewardQuestions.length - 1 ? '1px solid rgba(125,211,200,0.15)' : 'none' }}>
                      <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: '#e8edf5' }}><BoldText text={q} /></p>
                    </div>
                  ))}
                </div>
              )}
              <ul style={schema.stewardBullets}>
                {annotation.stewardSection.bullets.map((b, i) => (
                  <li key={i} style={schema.stewardBullet}>
                    <span style={{ color: '#c8f0d0', marginRight: '8px' }}>{'\u2022'}</span><BoldText text={b} />
                  </li>
                ))}
              </ul>
            </div>
          )}

          {annotation.showCTA && (
            <TalkToUsCTA journeyState={journeyState} style={{ ...s3.ctaButton, marginTop: '24px' }} />
          )}
        </div>
        );
      })()}

      {/* Navigation (steps 1-8) */}
      {schemaStep > 0 && (
        <div className="schema-step-nav" style={schema.stepNav}>
          <button style={styles.btnGhost} onClick={() => setSchemaStep(s => Math.max(s - 1, 0))}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '4px' }}>
              <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            {stepCfg.nav[0] || 'Back'}
          </button>
          {schemaStep < TOTAL_STEPS - 1 && (
            <button style={styles.btnSignal} onClick={() => setSchemaStep(s => s + 1)}>
              {stepCfg.nav[1] || 'Next'}
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '4px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          )}
        </div>
      )}
      </div>{/* end desktop-stepper-wrap */}
    </div>
  );
}

/* ─── Report capture modal ─────────────────────────────────────────── */
function ReportModal({ phase, journeyState, onClose }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [ecosystem, setEcosystem] = useState('');
  const [sectorField, setSectorField] = useState('');
  const [geographyField, setGeographyField] = useState('');
  const [roleField, setRoleField] = useState('');
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  const stageLabel = phase <= 1 ? 'behaviours' : phase <= 3 ? 'leverage' : 'digital_os';
  const qa = journeyState.qualifierAnswers || {};
  const stalls = journeyState.stalls || [];
  const stacks = journeyState.detectedStacks || [];
  const healthRatio = stalls.length / 9;
  const healthScore = stalls.length === 0 ? 100 : Math.round((1 - healthRatio) * 100);

  const [reportUrl, setReportUrl] = useState(null);

  const handleSubmit = async () => {
    if (!name || !email) return;
    setSending(true);

    const payload = {
      stage: stageLabel,
      name, email, ecosystem,
      sector: sectorField || qa.clusterType || '',
      geography: geographyField || '',
      role: roleField || '',
      region: qa.clusterType || 'regional',
      stalls: stalls.map(id => {
        const s = STALLS.find(x => x.id === id);
        const sci = (window.STALL_SCIENCE_DATA || {})[s ? s.name : ''] || {};
        return {
          id,
          name: s ? s.name : id,
          freq: 0, // computed from clusters.json by the report page
          definition: sci.definition || s?.sub || '',
          leverage: sci.leverage || (STALL_LEVERAGE || {})[id] || '',
          signal: sci.signal || '',
          displaced: sci.y || '',
          behaviour: sci.x || '',
        };
      }),
      health: healthScore,
      stacks: stacks.map(s => ({ name: s.name, sev: 'high', desc: s.logic || '' })),
      commentary: '',
      stackCommentary: journeyState.stackCommentary || {},
      digitalCommentary: journeyState.digitalCommentary || null,
      layerCommentary: (() => {
      const keys = ['sovereignDatabase','governanceAccess','integrationLayer','automationLayer','intelligenceSubstrate','aiRuntime','applicationLayer'];
      const result = {};
      const config = journeyState.osConfig || {};
      keys.forEach(key => {
        result[key] = buildLayerCommentary(key, journeyState, config);
      });
      return result;
    })(),
      detectedStacks: (journeyState.detectedStacks || []).map(s => ({
        id: s.id || '',
        name: s.name || '',
        stalls: s.triggers || s.stalls || [],
        logic: s.logic || '',
        regime: s.regime || '',
        entry: s.entry || '',
        effect: s.effect || '',
        leverage: s.entry || s.leverage || '',
      })),
      stack: (() => {
        const primary = (journeyState.detectedStacks || [])[0];
        if (!primary) return {};
        return {
          name: primary.name || '',
          stalls: (primary.triggers || primary.stalls || []),
          description: primary.logic || '',
          leverage: primary.entry || primary.leverage || '',
        };
      })(),
      techConfig: journeyState.techConfig || null,
      submitted_at: new Date().toISOString(),
      qualifier_answers: qa,
      config_name: (journeyState.osConfig || {}).configName || '',
    };

    // Store to localStorage for direct report access
    try {
      localStorage.setItem('CLUSTEROS_REPORT', JSON.stringify(payload));
    } catch(e) { console.warn('localStorage write failed:', e); }

    let reportId = null;
    try {
      const res = await fetch('https://clusteros-v3-production.up.railway.app/api/v1/report-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        const data = await res.json();
        reportId = data.report_id || data.id || null;
      }
    } catch (e) { console.error('Railway report error:', e); }

    // Build report URL — hosted if Railway returned an ID, localStorage fallback otherwise
    if (reportId) {
      setReportUrl(`/diagnostic-report.html?id=${encodeURIComponent(reportId)}`);
    } else {
      // Railway didn't return an ID — use localStorage path
      setReportUrl('/diagnostic-report.html');
    }

    try {
      await fetch('https://clusteros-v3-production.up.railway.app/api/v1/contact-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: name, email, cluster_name: ecosystem,
          engagement_type: 'diagnostic-report',
          message: `Stalls: ${stalls.join(', ')}. Health: ${healthScore}. Stacks: ${stacks.map(s=>s.name).join(', ')}`,
          submitted_at: new Date().toISOString(),
          report_id: reportId || '',
        }),
      });
    } catch (e) { console.error('HubSpot error:', e); }

    setSent(true);
  };

  return (
    <div style={sticky.modalOverlay} onClick={onClose}>
      <div style={sticky.modal} onClick={e => e.stopPropagation()}>
        {sent ? (
          <div style={{ textAlign: 'center', padding: '24px 0' }}>
            <p style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', color: 'var(--dj-chalk)' }}>
              Your report is ready.
            </p>
            {reportUrl ? (
              <React.Fragment>
                <a href={reportUrl} target="_blank" rel="noopener"
                  style={{ display: 'inline-block', marginTop: '16px', fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', background: 'var(--dj-teal)', color: '#fff', padding: '12px 24px', borderRadius: '3px', textDecoration: 'none' }}>
                  View your report →
                </a>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: '12px', color: 'var(--dj-chalk-muted)', marginTop: '12px' }}>
                  A copy has also been sent to {email}
                </p>
              </React.Fragment>
            ) : (
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginTop: '8px' }}>
                A link to your report has been sent to {email}.
              </p>
            )}
          </div>
        ) : (
          <React.Fragment>
            <h3 style={sticky.modalTitle}>Get your diagnostic report</h3>
            <p style={sticky.modalSub}>
              {stageLabel === 'behaviours' ? 'Behaviours report' : stageLabel === 'leverage' ? 'Behaviours + Leverage report' : 'Full diagnostic report'}
              {' · '}{stalls.length} stall{stalls.length !== 1 ? 's' : ''} identified
            </p>
            <div style={sticky.field}>
              <label style={sticky.label}>Your name</label>
              <input style={sticky.input} type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Full name" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your email</label>
              <input style={sticky.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="work@example.com" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your ecosystem name</label>
              <input style={sticky.input} type="text" value={ecosystem} onChange={e => setEcosystem(e.target.value)} placeholder="e.g. Edinburgh Life Sciences" />
            </div>

/* ─── Talk to us CTA with contact modal ────────────────────────────── */
function TalkToUsCTA({ journeyState, style }) {
  const [showModal, setShowModal] = useState(false);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);

  const handleSubmit = async () => {
    if (!name || !email) return;
    setSending(true);
    const qa = journeyState.qualifierAnswers || {};
    const configName = (journeyState.osConfig || {}).configName || '';
    const nameParts = name.trim().split(/\s+/);
    const firstName = nameParts[0] || '';
    const lastName = nameParts.slice(1).join(' ') || '';
    const payload = {
      first_name: firstName,
      last_name: lastName,
      email: email,
      cluster_name: configName || qa.clusterType || '',
      org_name: '',
      engagement_type: 'diagnostic-request',
      message: `Diagnostic request — ${configName}. Cluster type: ${qa.clusterType || ''}. Stacks: ${(journeyState.detectedStacks || []).map(s => s.name).join(', ')}. Stage: digital-os`,
      submitted_at: new Date().toISOString(),
    };
    console.log('Contact request payload:', payload);
    try {
      const res = await fetch('https://clusteros-v3-production.up.railway.app/api/v1/contact-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      console.log('Contact request status:', res.status);
    } catch (e) { console.error('Contact request error:', e); }
    setSent(true);
  };

  if (sent) {
    return <span style={{ ...style, background: '#c8f0d0', color: '#09101f', cursor: 'default' }}>We'll be in touch. &rarr;</span>;
  }

  return (
    <React.Fragment>
      <button style={style} onClick={() => setShowModal(true)}>
        Talk to us about your configuration
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>

        </svg>
      </button>
      {showModal && (
        <div style={sticky.modalOverlay} onClick={() => setShowModal(false)}>
          <div style={sticky.modal} onClick={e => e.stopPropagation()}>
            <h3 style={sticky.modalTitle}>Talk to us about your configuration</h3>
            <div style={sticky.field}>
              <label style={sticky.label}>Your name</label>
              <input style={sticky.input} type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Full name" />
            </div>
            <div style={sticky.field}>
              <label style={sticky.label}>Your email</label>
              <input style={sticky.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="work@example.com" />

      </svg>
      Back
    </button>
  ) : null;

  // Transition: Stage 1 (stalls) → Qualifier questions
  if (transitionType === 'stalls-to-qualifiers') {
    return (
      <div style={trans.card}>
        {/* Heading */}
        <h2 style={trans.heading}>
          Your ecosystem isn't stalling in {stalls.length} places. It's running {stacks.length} reinforcing pattern{stacks.length !== 1 ? 's' : ''}.
        </h2>

        {/* Explainer */}
        <p style={trans.subtext}>

        </p>

        {/* Stack cards */}
        {stacks.length > 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '20px' }}>
            {stacks.map(s => {
              const triggerNames = (s.triggers || []).map(id => { const st = STALLS.find(x => x.id === id); return st ? st.name : id; });
              let logic = s.logic || '';
              const firstSentence = logic.split('.')[0];
              logic = firstSentence.split(/\s+/).length > 30 ? firstSentence.split(/\s+/).slice(0, 30).join(' ') + '...' : firstSentence + '.';
              const comparators = (s.comparators || []).slice(0, 3);
              return (
                <div key={s.id} style={trans.stackCard}>
                  <div style={trans.stackCardName}>{s.name}</div>
                  <p style={trans.stackCardLogic}>{logic}</p>
                  <div style={trans.stackCardPills}>
                    {triggerNames.map(name => (
                      <span key={name} style={trans.stallPill}>{name}</span>
                    ))}
                  </div>
                  {comparators.length > 0 && (
                    <div style={{ marginTop: '10px' }}>
                      <span style={{ fontFamily: 'var(--font-sans)', fontSize: '11px', color: 'var(--dj-chalk-muted)', marginRight: '6px' }}>Also detected in:</span>
                      {comparators.map((c, i) => {
                        const name = typeof c === 'string' ? c : (c.name || '');
                        const slug = typeof c === 'object' && c.slug ? c.slug : toClusterSlug(name);
                        return name ? <a key={i} className="comparator-pill" href={`/clusters/${slug}.html`} target="_blank" rel="noopener" style={trans.comparatorPill}>{name}</a> : null;
                      })}
                    </div>
                  )}
                  <a href="#" data-stack-id={s.id} style={{ display: 'inline-block', marginTop: '8px', fontFamily: 'var(--font-sans)', fontSize: '12px', color: '#0c9488', textDecoration: 'none' }}>
                    &rarr; Read the Lab Note
                  </a>
                </div>
              );
            })}
          </div>
        ) : (
          <p style={trans.subtext}>{stalls.length} independent stall{stalls.length !== 1 ? 's' : ''} identified — {stallNames.join(', ')}. No reinforcing combinations detected.</p>
        )}

        {/* Blind Spot */}
        {(() => {
          // Compute blind spot: most common co-occurring stall across comparator clusters not selected by steward
          const stallSet = new Set(stalls);
          const coStallAgg = {};
          // D = total unique comparator clusters across all detected stacks
          const allComparatorNames = new Set();
          stacks.forEach(s => {
            if (s.coStallCounts) {
              Object.entries(s.coStallCounts).forEach(([sid, count]) => {
                if (!stallSet.has(sid)) coStallAgg[sid] = (coStallAgg[sid] || 0) + count;
              });
            }
            (s.comparators || []).forEach(c => { const n = typeof c === 'string' ? c : (c.name || ''); if (n) allComparatorNames.add(n); });
          });
          const totalUniqueComparators = allComparatorNames.size;
          const sorted = Object.entries(coStallAgg).sort((a, b) => b[1] - a[1]);
          if (sorted.length === 0) return null;
          const [blindSpotId, blindSpotCount] = sorted[0];
          const blindSpotStall = STALLS.find(s => s.id === blindSpotId);
          if (!blindSpotStall) return null;
          const stackNameStr = stacks.map(s => s.name).join(' and ');
          return (
            <div style={trans.blindSpotBox}>
              <div style={trans.blindSpotLabel}>STEWARD'S BLIND SPOT</div>
              <h4 style={trans.blindSpotHeading}>{blindSpotStall.name} — you didn't identify this.</h4>
              <p style={trans.blindSpotBody}>
                Ecosystems running {stackNameStr} also show {blindSpotStall.name}. Either it isn't present in your ecosystem — or it hasn't surfaced yet.
              </p>
              <button
                style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: '13px', color: '#0c9488', padding: 0 }}
                onClick={() => {
                  if (updateJourneyState) updateJourneyState({ blindSpotStall: blindSpotId });
                  if (onBack) onBack();
                }}
              >
                &rarr; Go back and check
              </button>
            </div>
          );
        })()}

        {/* Handover section */}
        <div style={{ marginTop: '24px', borderTop: '1px solid #1e2f45', paddingTop: '24px' }}>
          <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '20px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '12px', letterSpacing: '-0.01em' }}>
            Where does this pattern break?
          </h3>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '12px' }}>
            Stacks don't break through effort — they break through structural intervention at a specific entry point. To identify that entry point for your ecosystem, we need to understand your configuration: what type of cluster you run, who your anchor is, what you're trying to protect, and where coordination is failing.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', lineHeight: 1.65, color: 'var(--dj-chalk-dim)', marginBottom: '24px' }}>
            6 questions. Your answers will shape everything that follows — the leverage hypotheses, the infrastructure recommendation, and the report you receive.
          </p>
        </div>

        {/* Buttons */}
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={{ ...styles.btnSignal, marginLeft: 'auto', background: '#7dd3c8', color: '#1e2f45' }} onClick={onContinue}>
            Continue
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Qualifiers completed → Stage 2 Leverage
  if (transitionType === 'qualifiers-to-leverage') {
    const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'your ecosystem';
    const anchorLabel = ANCHOR_LABELS[qa.anchorType] || 'Anchors';

    return (
      <div style={trans.card}>
        <p style={trans.text}>
          You've told us enough to locate your leverage. {articleFor(clusterLabel)} {clusterLabel} with {articleFor(anchorLabel).toLowerCase()} {anchorLabel} anchor running:
        </p>
        {stacks.length > 0 ? (
          <div style={{ margin: '0 0 16px 0' }}>
            {stacks.map(s => (
              <div key={s.id} style={trans.stackLine}>— {s.name}</div>
            ))}
          </div>
        ) : (
          <div style={{ margin: '0 0 16px 0' }}>
            <div style={trans.stackLine}>— independent stall patterns</div>
          </div>
        )}
        <p style={trans.text}>has a specific intervention entry point. Here's where it is.</p>
        <div style={trans.actions}>
          {backBtn}
          <button style={{ ...styles.btnSignal, marginLeft: 'auto' }} onClick={onContinue}>
