<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClusterOS — Technical Architecture Specification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a1a; --ink-dim:#4a4540; --ink-muted:#8c8780;
  --page:#f7f4ef; --surface:#f0ece4; --border:#ddd8cf; --border-2:#c8c2b7;
  --green:#2a7a4f; --green-dim:#1d5c3a; --signal:#c8f0d0;
  --amber:#d97706; --teal:#0c9488;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Geist',system-ui,sans-serif;
  --mono:'Geist Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#e8e4de;color:var(--ink);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
.wrapper{max-width:860px;margin:0 auto}
.screen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.screen-logo{font-family:var(--serif);font-size:16px;color:var(--ink);text-decoration:none}
.screen-logo span{font-family:var(--mono);font-size:12px;color:var(--green);font-weight:700}
.btn-print{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:3px;cursor:pointer}
.document{background:#fff;box-shadow:0 4px 40px rgba(0,0,0,0.12);padding:64px 72px}
.doc-header{display:grid;grid-template-columns:1fr auto;align-items:start;gap:32px;padding-bottom:32px;border-bottom:2px solid var(--ink);margin-bottom:40px}
.doc-logo{font-family:var(--serif);font-size:22px;color:var(--ink)}
.doc-logo span{font-family:var(--mono);font-size:16px;color:var(--green);font-weight:700}
.doc-type{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-muted);margin-top:6px}
.doc-meta{text-align:right}
.doc-meta-date{font-family:var(--mono);font-size:10px;color:var(--ink-muted);margin-bottom:4px}
.doc-section{margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--border)}
.doc-section:last-of-type{border-bottom:none}
.doc-section-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.doc-section-num{background:var(--green);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.doc-section-heading{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:400;margin-bottom:14px;line-height:1.2}
.doc-section-heading em{font-style:italic;color:var(--green)}
.doc-body{font-size:13px;color:var(--ink-dim);line-height:1.72;margin-bottom:20px;font-weight:300}
.doc-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border-2);border-radius:2px;color:var(--ink-muted);display:inline-block}
.config-name{font-family:var(--serif);font-size:28px;color:var(--ink);margin-bottom:8px}
.tech-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.arch-schema{display:flex;flex-direction:column;gap:2px;margin-bottom:16px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.arch-schema-row{display:flex;align-items:center;gap:12px;padding:8px 16px}
.arch-schema-num{font-family:var(--mono);font-size:8px;font-weight:700;width:20px;text-align:center;opacity:0.5}
.arch-schema-name{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.04em;flex:1}
.arch-schema-role{font-family:var(--mono);font-size:8px;opacity:0.7}
.arch-schema-active{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.7);margin-left:auto}
.layer-card{margin-bottom:16px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.layer-card-head{padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.layer-card-num{font-family:var(--mono);font-size:9px;font-weight:700;opacity:0.6}
.layer-card-name{font-family:var(--serif);font-size:16px;font-weight:400;flex:1}
.layer-card-role{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;opacity:0.8}
.layer-card-tier{font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6)}
.layer-card-stalls{padding:10px 18px;border-top:1px solid rgba(0,0,0,0.06);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.layer-stall-pill{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.06em;padding:2px 8px;border-radius:8px;background:currentColor;color:inherit}
.layer-stall-pill{background:rgba(0,0,0,0.05)}
.layer-stall-connector{font-size:10px;color:var(--ink-dim);font-weight:300}
.layer-card-body{padding:16px 18px;background:#fff;font-size:12px;color:var(--ink-dim);line-height:1.7;font-weight:300;white-space:pre-line}
.tech-rec{padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin:8px 0 16px}
.tech-rec-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);margin-bottom:4px}
.tech-rec-value{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:4px}
.tech-rec-rationale{font-size:12px;color:var(--ink-dim);line-height:1.6;font-weight:300}
.steward-block{margin-top:24px;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:4px}
.steward-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.steward-heading{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:14px;line-height:1.25;color:var(--ink)}
.steward-heading em{font-style:italic;color:var(--green)}
.steward-question{padding:10px 14px;background:rgba(12,148,136,0.04);border:1px solid rgba(12,148,136,0.12);border-radius:3px;margin-bottom:8px;font-size:12px;color:var(--ink-dim);line-height:1.5}
.steward-question strong{color:var(--ink);font-weight:500}
.steward-question span{display:block;font-size:10px;color:var(--ink-muted);margin-top:4px}
.steward-note{font-size:11px;color:var(--ink-muted);line-height:1.6;margin-top:14px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}
.loading-text{font-family:var(--mono);font-size:11px;color:var(--ink-muted)}
.error{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;text-align:center}

@media print {
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:14mm 12mm 16mm 12mm;size:A4}
  body{background:#fff;padding:0;font-size:11px}
  .screen-header{display:none}
  .wrapper{max-width:none;padding:0;margin:0}
  .document{box-shadow:none;padding:40px 48px}
  .layer-card{break-inside:avoid!important;page-break-inside:avoid!important}
  .steward-block{break-inside:avoid!important}
}
@media (max-width:640px) {
  .document{padding:32px 24px}
  .doc-header{grid-template-columns:1fr}
  .layer-card-head{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="screen-header">
    <a href="/" class="screen-logo">Cluster<span>OS</span></a>
    <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
  </div>

  <div class="document">
    <div class="doc-header">
      <div>
        <div class="doc-logo">Cluster<span>OS</span></div>
        <div class="doc-type">Technical Architecture Specification</div>
      </div>
      <div class="doc-meta">
        <div class="doc-meta-date" id="doc-date"></div>
      </div>
    </div>

    <div id="doc-loading" class="loading">
      <div class="loading-text">Loading architecture specification...</div>
    </div>

    <div id="doc-error" class="error">
      <p style="font-family:var(--serif);font-size:20px;color:var(--ink)">No diagnostic data found</p>
      <p style="font-size:13px;color:var(--ink-dim)">Complete the self-diagnostic journey first, then open this page.</p>
      <a href="/diagnostic-journey" style="font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:3px;text-decoration:none;margin-top:12px">Start the diagnostic</a>
    </div>

    <div id="doc-content" style="display:none">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script>
(async function() {
  // Load data from same sources as diagnostic report
  let d = null;
  try { d = JSON.parse(sessionStorage.getItem('CLUSTEROS_REPORT')); } catch(e) {}
  if (!d) { try { d = JSON.parse(localStorage.getItem('CLUSTEROS_REPORT')); } catch(e) {} }
  if (!d) d = window.CLUSTEROS_REPORT || null;

  // Try URL param for API-hosted reports
  const urlParams = new URLSearchParams(window.location.search);
  const reportId = urlParams.get('id');
  if (!d && reportId) {
    try {
      const res = await fetch(`https://clusteros-v3-production.up.railway.app/api/v1/report/${encodeURIComponent(reportId)}`);
      if (res.ok) d = await res.json();
    } catch(e) {}
  }

  document.getElementById('doc-loading').style.display = 'none';

  if (!d || d.stage !== 'digital_os') {
    document.getElementById('doc-error').style.display = 'flex';
    return;
  }

  document.getElementById('doc-content').style.display = '';
  document.getElementById('doc-date').textContent = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  const lc = d.layerCommentary || {};
  const tc = (d.techConfig && typeof d.techConfig === 'object') ? d.techConfig : {};
  const qa = d.qualifier_answers || {};
  const stallIds = (d.stalls || []).map(s => s.id || s);
  const ecoDesc = (d.ecosystemDescription && typeof d.ecosystemDescription === 'object') ? d.ecosystemDescription : {};
  const stackCommentary = (d.stackCommentary && typeof d.stackCommentary === 'object') ? d.stackCommentary : {};
  const configName = d.config_name || 'Your Configuration';
  const ecosystem = d.ecosystem || '';
  const detStacks = d.detectedStacks || d.detected_stacks || [];
  const stackNames = detStacks.map(s => s.name).filter(Boolean);
  const stackListText = stackNames.length <= 1 ? stackNames.join('') : stackNames.slice(0, -1).join(', ') + ' and ' + stackNames[stackNames.length - 1];

  const QUALIFIER_LABELS = {
    clusterType: { regional:'Regional Speciality', national:'National Supercluster', corporate:'Corporate', city:'City Cluster' },
    anchorType: { university:'University', research:'Research institute', corporate:'Large corporate', public:'Public agency', hospital:'Hospital', none:'None yet' },
    stage: { early:'Early-stage', established:'Established', mature:'Mature' },
  };

  const STALL_NAMES = { S1:'Re-proving', S2:'Coordinating', S3:'Forgiving', S4:'Extracting', S5:'Mediating', S6:'Stabilising', S7:'Narrating', S8:'Scaling Activity', S9:'Waiting' };

  const LAYER_META = [
    { key:'sovereignDatabase',     name:'Sovereign Ecosystem Database', role:'Data ownership', tier:'Foundation', color:'#1d5c3a', colorLight:'rgba(29,92,58,0.08)', addresses:['S1','S4','S7'], connectors:{ S1:'Evidence persists across cycles', S4:'Value flows become traceable', S7:'Narrative replaced by structured record' } },
    { key:'governanceAccess',      name:'Governance & Access',          role:'Trust infrastructure', tier:'Foundation', color:'#2a6b4a', colorLight:'rgba(42,107,74,0.08)', addresses:['S2','S4','S6'], connectors:{ S2:'Coordination becomes auditable', S4:'Extraction requires consent', S6:'New actors enter without incumbent permission' } },
    { key:'integrationLayer',      name:'Integration Layer',            role:'External signals', tier:'Substrate', color:'#2b7a75', colorLight:'rgba(43,122,117,0.08)', addresses:['S1','S5'], connectors:{ S1:'Evidence imports automatically', S5:'Connections bypass intermediaries' } },
    { key:'automationLayer',       name:'Automation Layer',             role:'Bot network', tier:'Substrate', color:'#0c9488', colorLight:'rgba(12,148,136,0.08)', addresses:['S2','S5','S8'], connectors:{ S2:'Coordination overhead automated', S5:'Matching happens without brokers', S8:'Activity measured against outcomes' } },
    { key:'intelligenceSubstrate', name:'Intelligence Substrate',       role:'MCP tools', tier:'Substrate', color:'#2d8a7a', colorLight:'rgba(45,138,122,0.08)', addresses:['S2','S6','S7'], connectors:{ S2:'Decisions surfaced from signals', S6:'Underutilised actors identified', S7:'Live read replaces retrospective report' } },
    { key:'aiRuntime',             name:'AI Runtime',                   role:'Reasoning engine', tier:'Surface', color:'#3a7a5a', colorLight:'rgba(58,122,90,0.08)', addresses:['S1','S2','S9'], connectors:{ S1:'Evidence base answers the question', S2:'Right actors matched to right decisions', S9:'Actors can act on current data' } },
    { key:'applicationLayer',      name:'Application Layer',            role:'Actor experience', tier:'Surface', color:'#2a7a4f', colorLight:'rgba(42,122,79,0.08)', addresses:['S5','S6','S8','S9'], connectors:{ S5:'Direct coupling via portal', S6:'New entrants visible to anchors', S8:'Throughput visible at programme level', S9:'Action pathways without permission' } },
  ];

  let html = '';

  // Section 1: Configuration Overview
  html += `<div class="doc-section">
    <div class="doc-section-label"><span class="doc-section-num">1</span>Configuration overview</div>
    <div class="config-name">${ecosystem ? ecosystem + ' — ' : ''}${configName}</div>
    <div class="tech-tags">
      ${qa.clusterType ? `<span class="doc-tag">${QUALIFIER_LABELS.clusterType[qa.clusterType] || qa.clusterType}</span>` : ''}
      ${qa.anchorType ? `<span class="doc-tag">${QUALIFIER_LABELS.anchorType[qa.anchorType] || qa.anchorType}</span>` : ''}
      ${qa.stage ? `<span class="doc-tag">${QUALIFIER_LABELS.stage[qa.stage] || qa.stage}</span>` : ''}
    </div>
    <p class="doc-body">This document specifies the 7-layer infrastructure architecture generated from your self-diagnostic. Each layer addresses a structural function — from sovereign data ownership to actor-facing applications. Layers marked with active stalls are configured to directly address the behavioural patterns your diagnostic identified.</p>
    ${ecoDesc.inside ? `<div style="padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:16px"><div style="font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--ink-muted);margin-bottom:4px">YOUR ECOSYSTEM FROM INSIDE</div><p style="font-size:12px;color:var(--ink-dim);line-height:1.65;margin:0;font-weight:300">${ecoDesc.inside}</p></div>` : ''}
    ${stackListText ? `<p class="doc-body"><strong style="color:var(--ink)">Detected stacks:</strong> ${stackListText}</p>` : ''}
  </div>`;

  // Section 2: Technology Recommendations
  if (tc.aiRuntime || tc.intelligenceSubstrate || tc.governanceAccess) {
    html += `<div class="doc-section">
      <div class="doc-section-label"><span class="doc-section-num">2</span>Technology recommendations</div>
      <div class="doc-section-heading">Configured for <em>your ecosystem</em></div>`;
    if (tc.aiRuntime) {
      html += `<div class="tech-rec"><div class="tech-rec-label">AI Runtime</div><div class="tech-rec-value">${tc.aiRuntime.label || tc.aiRuntime.recommendation}</div><div class="tech-rec-rationale">${tc.aiRuntime.rationale || ''}</div></div>`;
    }
    if (tc.intelligenceSubstrate) {
      html += `<div class="tech-rec"><div class="tech-rec-label">Intelligence Substrate</div><div class="tech-rec-value">${tc.intelligenceSubstrate.label || tc.intelligenceSubstrate.recommendation}</div><div class="tech-rec-rationale">${tc.intelligenceSubstrate.rationale || ''}</div></div>`;
    }
    if (tc.governanceAccess) {
      html += `<div class="tech-rec"><div class="tech-rec-label">Governance Model</div><div class="tech-rec-value">${tc.governanceAccess.label || tc.governanceAccess.model}</div><div class="tech-rec-rationale">${tc.governanceAccess.rationale || ''}</div></div>`;
    }
    html += `</div>`;
  }

  // Section 3: Architecture Schema
  html += `<div class="doc-section">
    <div class="doc-section-label"><span class="doc-section-num">3</span>Architecture layers</div>
    <div class="doc-section-heading">7-layer <em>infrastructure stack</em></div>
    <div class="arch-schema">
      ${LAYER_META.map((lm, i) => {
        const active = lm.addresses.some(s => stallIds.includes(s));
        return `<div class="arch-schema-row" style="background:${lm.color};color:#fff">
          <span class="arch-schema-num">L${i+1}</span>
          <span class="arch-schema-name">${lm.name}</span>
          <span class="arch-schema-role">${lm.role}</span>
          ${active ? '<span class="arch-schema-active"></span>' : ''}
        </div>`;
      }).join('')}
    </div>
    <p style="font-family:var(--mono);font-size:9px;color:var(--ink-muted)">White dots mark layers that directly address your identified stalls.</p>
  </div>`;

  // Section 4: Layer Detail Cards
  html += `<div class="doc-section">
    <div class="doc-section-label"><span class="doc-section-num">4</span>Layer specifications</div>
    <div class="doc-section-heading">What each layer <em>does for your ecosystem</em></div>`;

  LAYER_META.forEach((lm, i) => {
    const commentary = lc[lm.key];
    const addressedStalls = lm.addresses.filter(s => stallIds.includes(s));

    html += `<div class="layer-card">
      <div class="layer-card-head" style="background:${lm.color};color:#fff">
        <span class="layer-card-num" style="color:rgba(255,255,255,0.5)">L${i+1}</span>
        <span class="layer-card-name" style="color:#fff">${lm.name}</span>
        <span class="layer-card-role" style="background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8)">${lm.role}</span>
        <span class="layer-card-tier">${lm.tier}</span>
      </div>
      ${addressedStalls.length > 0 ? `
      <div class="layer-card-stalls" style="background:${lm.colorLight}">
        ${addressedStalls.map(sid => {
          const connector = lm.connectors[sid] || '';
          return `<span class="layer-stall-pill" style="color:${lm.color}">${STALL_NAMES[sid] || sid}</span>${connector ? `<span class="layer-stall-connector">${connector}</span>` : ''}`;
        }).join('<span style="color:var(--border-2);margin:0 2px">&middot;</span>')}
      </div>` : ''}
      <div class="layer-card-body">${commentary && commentary.trim() ? commentary : '<span style="color:var(--ink-muted);font-style:italic">Commentary not generated for this layer.</span>'}</div>
    </div>`;
  });
  html += `</div>`;

  // Section 5: Steward Interrogation
  const stewardQuestions = [];
  if (stallIds.includes('S2')) stewardQuestions.push({ q: 'Which coordination structures have produced zero committed actions this quarter?', why: 'Surfaces where alignment is substituting for decision' });
  if (stallIds.includes('S6')) stewardQuestions.push({ q: 'Which new entrants have capability that incumbents haven\'t seen?', why: 'Reveals talent the incumbent orbit is suppressing' });
  if (stallIds.includes('S5')) stewardQuestions.push({ q: 'How many connections formed directly vs through intermediaries this month?', why: 'Measures whether the mediation dependency is weakening' });
  if (stallIds.includes('S4')) stewardQuestions.push({ q: 'Where is value leaving the ecosystem — and what would retain it?', why: 'Makes the extraction dynamic visible as data' });
  if (stallIds.includes('S7')) stewardQuestions.push({ q: 'What evidence do we actually have vs what are we claiming?', why: 'Separates structured findings from narrative' });
  if (stallIds.includes('S8')) stewardQuestions.push({ q: 'What is our conversion rate from programme starts to commercial outcomes?', why: 'Distinguishes activity from throughput' });
  if (stallIds.includes('S1')) stewardQuestions.push({ q: 'What is the evidence base for our next funding case — right now, from live data?', why: 'The case is already made when data accumulates continuously' });
  if (stallIds.includes('S9')) stewardQuestions.push({ q: 'Which actors could act right now if they had the right data — without waiting for permission?', why: 'Reveals that the dependency is optional for some actors' });
  if (stallIds.includes('S3')) stewardQuestions.push({ q: 'Which programmes have the lowest outcome-to-activity ratio?', why: 'Makes accountability a structural fact rather than a political choice' });

  if (stewardQuestions.length > 0) {
    html += `<div class="doc-section">
      <div class="doc-section-label"><span class="doc-section-num">5</span>Steward interrogation surface</div>
      <div class="doc-section-heading">The questions you can <em>finally ask</em></div>
      <p class="doc-body">Every layer feeds a single interrogation surface. You don't compile reports. You ask — and the answer is assembled from live signals your actors are already generating. These are the questions your stall configuration makes urgent:</p>
      <div class="steward-block">
        <div class="steward-label">Diagnostic-specific questions</div>
        ${stewardQuestions.map(sq => `
        <div class="steward-question">
          <strong>"${sq.q}"</strong>
          <span>${sq.why}</span>
        </div>`).join('')}
        <div class="steward-note">Each question draws from your sovereign database, processed by the intelligence substrate, delivered through the AI runtime. The architecture exists to make these questions answerable — in real time, from evidence your ecosystem is already generating.</div>
      </div>
    </div>`;
  }

  // Section 6: Data Clusters
  if (tc.sovereignDatabase && tc.sovereignDatabase.clusters && tc.sovereignDatabase.clusters.length > 0) {
    html += `<div class="doc-section">
      <div class="doc-section-label"><span class="doc-section-num">6</span>Priority data clusters</div>
      <div class="doc-section-heading">What your sovereign database <em>captures first</em></div>
      <p class="doc-body">Based on your detected stalls, these are the priority data structures your ecosystem needs:</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${tc.sovereignDatabase.clusters.map(c => `<span class="doc-tag" style="border-color:var(--green);color:var(--green)">${c}</span>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('doc-content').innerHTML = html;
})();
</script>
</body>
</html>
