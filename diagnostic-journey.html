            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  // Transition: Stage 2 Leverage → Stage 3 Digital OS
  if (transitionType === 'leverage-to-os') {
    const allStackNames = stacks.length > 0 ? stacks.map(s => s.name).join(', ') : stallNames.join(', ');
    const body = `Your leverage hypotheses target ${allStackNames} — the reinforcing logic between stalls, not individual stalls in isolation. The next stage translates this into infrastructure: what your ecosystem needs to be built on, configured for your specific context.`;

    return (
      <div style={trans.card}>
        <p style={trans.text}>{body}</p>
        <div style={trans.actions}>
          <button style={styles.btnGhost} onClick={onStop}>Stop & get my report</button>
          <button style={styles.btnSignal} onClick={onContinue}>
            Continue to Digital OS
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
              <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    );
  }

  return null;
}

/* ─── Main app ─────────────────────────────────────────────────────── */
/* ─── Flow phases:
     0: behaviours (Stage 1)
     1: transition stalls→qualifiers
     2: qualifier questions
     3: transition qualifiers→leverage
     4: leverage (Stage 2)
     5: transition leverage→os
     6: digital os (Stage 3)
   ── */
function DiagnosticJourney() {
  const [phase, setPhase] = useState(-1);
  const [exited, setExited] = useState(false);
  const [exitedAt, setExitedAt] = useState(null);
  const [showExitModal, setShowExitModal] = useState(false);
  const [loadingCommentary, setLoadingCommentary] = useState(false);

  /* ── Carried-forward state ── */
  const [journeyState, setJourneyState] = useState({
    stalls: [],
    stacks: [],
    leverageHypotheses: [],
    qualifierAnswers: {},
    osConfig: null,
    stackCommentary: {},
    digitalCommentary: null,
  });

  /*
   * COMMENTARY ARCHITECTURE — READ BEFORE MODIFYING
   *
   * The Digital OS step commentary uses a two-layer approach:
   *
   * LAYER 1 — LOCAL COMPUTATION (permanent, deterministic)
   * buildLayerCommentary() computes the configuration structure from journey state:
   * - Which sovereign database clusters to prioritise (driven by detected stalls)
   * - Which bots to prioritise (driven by scale + anchor type)
   * - Which governance model applies (driven by anchor type + protection priorities)
   * - Which actor journeys to foreground (driven by anchor type)
   * - SLM vs LLM decision (driven by protection priorities)
   * - MCP vs Clawbot decision (driven by scale + anchor type)
   * This layer is fast, offline-capable, and never API-dependent.
   * Do not replace this with API calls.
   *
   * LAYER 2 — API PROSE (enrichment, currently active)
   * The explanatory prose connecting structure to this specific ecosystem
   * is currently generated locally via branching logic (~50 paths).
   * This works for the first ~30 stewards but will hit a ceiling at scale:
   * - Same stall combinations produce identical prose regardless of anchor × priority
   * - New stall combinations fall through to generic text
   * - Prose becomes recognisably templated at volume
   *
   * PLANNED SCALE ARCHITECTURE (implement when steward volume warrants):
   * 1. Keep local structure computation (Layer 1) unchanged
   * 2. Add API prose enrichment — prompt receives locally-computed structure as context:
   *    "Here are the clusters already selected and why. Write 2 sentences connecting
   *    this cluster selection to what this steward told us about their ecosystem."
   *    Model explains decisions already made — it doesn't make them.
   * 3. Cache API responses in Railway PostgreSQL keyed on configuration hash:
   *    hash = stall_ids + anchor_type + scale + priority + gap + protect_array
   *    Same configuration → instant cached response, no API call
   *    New configuration → API call, store result, serve from cache thereafter
   * 4. Railway PDF generator receives full structured payload:
   *    local structure + cached prose + diagnostic findings → assembled report
   *    No client-side PDF generation
   *
   * CONFIGURATION HASH FUNCTION (to implement when caching):
   * function buildConfigHash(journeyState) {
   *   const key = [
   *     journeyState.selectedStalls.sort().join(','),
   *     journeyState.qualifierAnswers.anchorType,
   *     journeyState.qualifierAnswers.scale,
   *     journeyState.qualifierAnswers.priority,
   *     journeyState.qualifierAnswers.gap,
   *     (journeyState.qualifierAnswers.protect || []).sort().join(',')
   *   ].join('|');
   *   return btoa(key); // base64 encode for use as cache key
   * }
   */

  const updateJourneyState = useCallback((patch) => {
    setJourneyState(prev => {
      const next = { ...prev, ...patch };
      // Clear internal flag after read
      delete next._reviseQualifiers;
      return next;
    });
  }, []);

  // Handle "Revise answers" from Stage 3
  useEffect(() => {
    if (journeyState._reviseQualifiers) {
      setPhase(2); // jump to qualifier questions
    }
  }, [journeyState._reviseQualifiers]);

  /* ── Phase navigation ── */
  const goNext = useCallback(() => {
    if (phase === 0) setPhase(1);       // behaviours → transition
    else if (phase === 1) setPhase(2);  // transition → qualifiers
    else if (phase === 2) setPhase(3);  // qualifiers done → transition (called by QualifierQuestions onComplete)
    else if (phase === 3) setPhase(4);  // transition → leverage
    else if (phase === 4) setPhase(5);  // leverage → transition
    else if (phase === 5) setPhase(6);  // transition → digital os
  }, [phase]);

  const goBack = useCallback(() => {
    if (phase === 1) setPhase(0);       // transition → behaviours
    else if (phase === 2) setPhase(0);  // qualifiers → behaviours (back to stall selection)
    else if (phase === 3) setPhase(2);  // transition → qualifiers
    else if (phase === 4) setPhase(3);  // leverage → transition (which auto-shows post-qualifier)
    else if (phase === 5) setPhase(4);  // transition → leverage
    else if (phase === 6) setPhase(4);  // digital os → leverage
  }, [phase]);

  const requestExit = useCallback(() => { setShowExitModal(true); }, []);
  const confirmExit = useCallback(() => {
    setShowExitModal(false);
    // Map phase to stage for exit summary
    const stageIndex = phase <= 1 ? 0 : phase <= 3 ? 0 : phase <= 5 ? 1 : 2;
    setExitedAt(stageIndex);
    setExited(true);
  }, [phase]);
  const cancelExit = useCallback(() => { setShowExitModal(false); }, []);

  /* ── Parse commentary response into 3 sections ── */
  function parseCommentary(text) {
    const sections = { diagnosis: '', consequence: '', mechanism: '' };
    const strip = s => s.replace(/\*\*/g, '').trim();
    const diagMatch = text.match(/DIAGNOSIS[:\s]*(.+?)(?=CONSEQUENCE|$)/is);
    const consMatch = text.match(/CONSEQUENCE[:\s]*(.+?)(?=MECHANISM|$)/is);
    const mechMatch = text.match(/MECHANISM[:\s]*(.+?)$/is);
    if (diagMatch) sections.diagnosis = strip(diagMatch[1]);
    if (consMatch) sections.consequence = strip(consMatch[1]);
    if (mechMatch) sections.mechanism = strip(mechMatch[1]);
    if (!sections.diagnosis && !sections.consequence && !sections.mechanism) {
      sections.diagnosis = strip(text);
    }
    return sections;
  }

  /* ── Commentary fetch after qualifiers complete ── */
  const handleQualifierComplete = useCallback(() => {
    const stacks = journeyState.detectedStacks || [];
    const qa = journeyState.qualifierAnswers || {};
    const STAGE_LABEL_MAP = { early: 'Early-stage', established: 'Established', mature: 'Mature' };
    const PRIORITY_LABEL_MAP = { talent: 'Retain & grow local talent', capital: 'Attract external capital', research: 'Convert research to commercial activity', supply: 'Build anchor supply chains', growth: 'Drive economic growth' };
    const GAP_LABEL_MAP = { discovery: "Actors can't find each other", flow: "Knowledge doesn't flow between groups", access: "Outside actors can't engage", conversion: "Activity isn't converting to outcomes" };
    const PROTECT_LABEL_MAP = { knowledge: 'Local knowledge staying local', ip: 'Institutional IP and research', trust: 'Community relationships and trust', talent: 'Founder and talent pipeline', sovereignty: 'Economic sovereignty' };

    const clusterLabel = CLUSTER_TYPE_LABELS[qa.clusterType] || 'Regional Speciality';
    const anchorLabel = ANCHOR_LABELS[qa.anchorType] || 'Anchors';
    const scaleLabel = STAGE_LABEL_MAP[qa.stage] || 'Established';
    const priorityLabel = PRIORITY_LABEL_MAP[qa.priority] || 'Drive economic growth';
    const gapLabel = GAP_LABEL_MAP[qa.gap] || '';
    const protectList = (qa.protect || []).map(p => PROTECT_LABEL_MAP[p] || p).join(', ');

    // If no stacks and no qualifier data worth sending, skip
    if (stacks.length === 0 && !qa.clusterType) { setPhase(3); return; }

    setLoadingCommentary(true);

    // Compute techConfig
    const protect = qa.protect || [];
    const selectedStalls = journeyState.stalls || [];
    const techConfig = {
      aiRuntime: (protect.includes('sovereignty') || protect.includes('ip'))
        ? { recommendation: 'SLM', label: 'Small Language Model — on-premise', rationale: 'Your protection priorities require inference that stays within your sovereign boundary. A Small Language Model deployed within your infrastructure keeps all reasoning inside your ecosystem.', delivery: 'scoped' }
        : { recommendation: 'LLM', label: 'Large Language Model — Anthropic Claude', rationale: 'Cloud inference via Anthropic API. Role-aware and ecosystem-context-aware. Every response is grounded in your sovereign database.', delivery: 'live' },
      intelligenceSubstrate: (qa.stage === 'early' || qa.anchorType === 'none')
        ? { recommendation: 'Clawbot', label: 'Clawbot — lightweight intelligence agent', rationale: 'At early stage, full MCP infrastructure is ahead of where your ecosystem is. Clawbot handles signal monitoring, stall detection, and actor matching with lower overhead.', delivery: 'scoped' }
        : { recommendation: 'MCP', label: 'MCP Intelligence Substrate', rationale: 'Full Model Context Protocol substrate. Each AI capability is a structured tool call against your live sovereign database.', delivery: 'live' },
      governanceAccess: (qa.anchorType === 'public' || qa.anchorType === 'hospital')
        ? { model: 'regulatory', label: 'Regulatory compliance model', rationale: 'Public sector anchor requires GDPR-aligned data residency, full audit trail, and explicit consent records for every cross-boundary data flow.', delivery: 'scoped' }
        : protect.includes('trust')
          ? { model: 'relationship-first', label: 'Relationship-first access model', rationale: 'Trust tiers built on existing institutional structures. Actors gain access through verified relationships before role-based permissions apply.', delivery: 'scoped' }
          : { model: 'standard', label: 'Federated governance — standard', rationale: 'Identity-first, role-based access across the full hierarchy. Full audit trail. Every data flow across the sovereign boundary requires a consent record.', delivery: 'live' },
      sovereignDatabase: {
        clusters: [
          ...(selectedStalls.includes('S2') ? ['Coordination pathways'] : []),
          ...(selectedStalls.includes('S6') ? ['Anchor engagement pipeline'] : []),
          ...(selectedStalls.includes('S1') ? ['Evidence & validation records'] : []),
          ...(selectedStalls.includes('S7') ? ['Narrative vs outcome tracking'] : []),
          ...(selectedStalls.includes('S4') ? ['Value flow audit trail'] : []),
          ...(selectedStalls.includes('S9') ? ['Permission & dependency records'] : []),
          ...(selectedStalls.includes('S3') ? ['Talent retention signals'] : []),
          ...(selectedStalls.includes('S5') ? ['Intermediary relationship map'] : []),
          ...(selectedStalls.includes('S8') ? ['Activity-to-outcome conversion'] : []),
        ],
        clusterType: qa.clusterType,
      },
    };
    setJourneyState(prev => ({ ...prev, techConfig }));

    // 1. Stack commentary calls (one per stack)
    const stackCalls = stacks.map(stack => {
      const stallNames = (stack.triggers || []).map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; }).join(' and ');
      const prompt = `You are a diagnostic analyst for ClusterOS. A ${clusterLabel} with a ${anchorLabel} anchor has identified the following behavioural stall pattern: ${stack.name} — a reinforcing combination of ${stallNames}. The reinforcing logic is: ${stack.logic || ''}. The leverage entry point is: ${stack.entry || ''}. Their strategic priority is ${priorityLabel}. Their biggest coordination gap is ${gapLabel}. They are protecting: ${protectList || 'not specified'}. Their ecosystem is ${scaleLabel} stage.\n\nWrite three sections — DIAGNOSIS, CONSEQUENCE, MECHANISM.\n\nEach section is exactly one sentence. Maximum 30 words per sentence. No exceptions.\n\nDIAGNOSIS: What this specific stack pattern means for this ecosystem type and anchor combination. Name the stack.\nCONSEQUENCE: What remains locked if this stack is not addressed, connected directly to their stated priority.\nMECHANISM: The single most targeted intervention that addresses the entry point. Be concrete and specific to this configuration.\n\nRules:\n- Do not use markdown formatting. No asterisks, no bold markers, no bullet points.\n- Do not use the words "platform", "solution", "leverage" or "dashboard".\n- Do not add preamble, labels, or any text outside the three sections.\n- Write for a Chief Executive who recognises their ecosystem in every sentence.\n- Each section must start with its label followed by a colon.\n\nFormat:\nDIAGNOSIS: [one sentence]\nCONSEQUENCE: [one sentence]\nMECHANISM: [one sentence]`;

      return fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return null;
          // Extract text from any response format
          let text = data.commentary || data.text || '';
          if (!text && Array.isArray(data.content) && data.content[0]) text = data.content[0].text || '';
          if (!text && typeof data === 'string') text = data;
          if (!text) { console.warn(`[Stack ${stack.id}] No text in response. Keys:`, Object.keys(data)); return null; }
          // Strip markdown code fences robustly
          text = String(text)
            .replace(/^```json\s*/i, '')
            .replace(/^```\s*/i, '')
            .replace(/```\s*$/i, '')
            .trim();
          console.log(`[Stack ${stack.id}] Cleaned text:`, text.substring(0, 100));
          return { stackId: stack.id, ...parseCommentary(text) };
        })
        .catch(err => { console.warn(`[Stack ${stack.id}] Fetch failed:`, err.message); return null; });
    });

    // 2. Digital commentary call (one call for all 7 layers)
    const stackDescs = stacks.map(s => s.name).join(', ');
    console.log('[Digital] 1. Building prompt. techConfig:', !!techConfig, 'stacks:', stacks.length, 'qa:', qa.clusterType);

    const stallNameList = (journeyState.stalls || []).map(id => { const s = STALLS.find(x => x.id === id); return s ? s.name : id; }).join(', ');
    const digitalPrompt = `Plain English briefing for a CEO. No technical terms. No jargon.

This is a ${clusterLabel} with a ${anchorLabel} anchor at ${scaleLabel} stage. They want to ${priorityLabel}. Their coordination gap: ${gapLabel || 'unspecified'}. They are protecting: ${protectList || 'unspecified'}. Their ecosystem is running these reinforcing patterns: ${stackDescs || 'none detected'}. Stalls identified: ${stallNameList || 'none'}.

For each of 7 layers, write FROM THE INSIDE (what actors experience today — the friction) and FROM THE OUTSIDE (what the steward gains). 2 sentences each. Connect every FROM THE OUTSIDE to: ${priorityLabel}.

Layer-specific instructions — weave these facts into the commentary, do not ignore them:

sovereignDatabase: This ecosystem's priority data clusters are ${techConfig.sovereignDatabase.clusters.join(', ') || 'general'}. FROM THE INSIDE must describe what happens when ${stallNameList || 'these stall patterns'} go unrecorded. FROM THE OUTSIDE must explain what the steward sees when stall records and evidence exist as structured data they own.

governanceAccess: This ecosystem uses ${techConfig.governanceAccess.label}. FROM THE INSIDE must describe what actors experience when ${protectList || 'ecosystem assets'} have no structural protection. FROM THE OUTSIDE must explain what becomes enforceable.

integrationLayer: The gap is "${gapLabel || 'unspecified'}". FROM THE INSIDE must name the specific friction this gap creates for ${anchorLabel} anchors and founders. FROM THE OUTSIDE must name which data source solves it.

automationLayer: At ${scaleLabel} stage with ${stackDescs || 'these patterns'}. FROM THE INSIDE must describe the manual data work someone is doing today. FROM THE OUTSIDE must describe what runs automatically.

intelligenceSubstrate: This ecosystem gets ${techConfig.intelligenceSubstrate.label}. FROM THE INSIDE must describe the spreadsheets and email introductions — the programme manager as human router. FROM THE OUTSIDE must describe what the steward sees without anyone having to manually compile it.

aiRuntime: This ecosystem gets ${techConfig.aiRuntime.label}. FROM THE INSIDE must describe what happens when a steward asks "what is stalling?" today — the lag, the guesswork, the out-of-date report. FROM THE OUTSIDE must describe what questions the steward can now ask and get answered immediately.

applicationLayer: The anchor is ${anchorLabel}. FROM THE INSIDE must name what founders and ${anchorLabel === 'Anchors' ? 'researchers' : anchorLabel + ' partners'} experience when pathways are invisible. FROM THE OUTSIDE must describe what signal each actor journey produces for the steward.

Return JSON only: {"sovereignDatabase":{"inside":"...","outside":"..."},"governanceAccess":{"inside":"...","outside":"..."},"integrationLayer":{"inside":"...","outside":"..."},"automationLayer":{"inside":"...","outside":"..."},"intelligenceSubstrate":{"inside":"...","outside":"..."},"aiRuntime":{"inside":"...","outside":"..."},"applicationLayer":{"inside":"...","outside":"..."}}`;

    // Simplified retry prompt
    const retryPrompt = `Briefing for a CEO. ${clusterLabel}, ${anchorLabel} anchor. Priority: ${priorityLabel}. Stacks: ${stackDescs || 'none'}. For each of 7 layers write inside (what actors experience) and outside (what the leader gains). 2 sentences each. Plain English only. Return JSON only:
{"sovereignDatabase":{"inside":"...","outside":"..."},"governanceAccess":{"inside":"...","outside":"..."},"integrationLayer":{"inside":"...","outside":"..."},"automationLayer":{"inside":"...","outside":"..."},"intelligenceSubstrate":{"inside":"...","outside":"..."},"aiRuntime":{"inside":"...","outside":"..."},"applicationLayer":{"inside":"...","outside":"..."}}`;

    function extractJSON(text) {
      if (!text) return null;
      // Strip markdown fences
      text = String(text).replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
      // Direct parse
      try { const p = JSON.parse(text); if (p.sovereignDatabase) return p; } catch(e) {}
      // Find first { and last } and extract
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}');
      if (start !== -1 && end !== -1 && end > start) {
        try { const p = JSON.parse(text.slice(start, end + 1)); if (p.sovereignDatabase) return p; } catch(e) {}
      }
      // Remove everything before first { and after last }
      const jsonOnly = text.replace(/^[^{]*/, '').replace(/[^}]*$/, '');
      try { const p = JSON.parse(jsonOnly); if (p.sovereignDatabase) return p; } catch(e) {}
      console.error('[Digital] All JSON extraction failed. Text:', text.substring(0, 500));
      return null;
    }

    function parseDigitalResponse(rawText) {
      if (!rawText) return null;
      let data;
      try { data = JSON.parse(rawText); } catch (e) { console.error('[Digital] Raw not JSON:', e.message); return null; }
      if (data.sovereignDatabase) return data;
      let inner = data.commentary || data.text || '';
      if (!inner && Array.isArray(data.content) && data.content[0]) inner = data.content[0].text || '';
      if (!inner) { console.error('[Digital] No inner text. Keys:', Object.keys(data)); return null; }
      if (typeof inner === 'object' && inner.sovereignDatabase) return inner;
      console.log('[Digital] Inner text to extract from (first 300):', String(inner).substring(0, 300));
      return extractJSON(inner);
    }

    const digitalCall = fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: digitalPrompt }),
    })
      .then(r => { console.log('[Digital] 2. Response status:', r.status); return r.ok ? r.text() : null; })
      .then(raw => {
        console.log('[Digital] 3. Raw response length:', (raw || '').length);
        const result = parseDigitalResponse(raw);
        if (result) { console.log('[Digital] 4. SUCCESS on first attempt. Keys:', Object.keys(result)); return result; }
        // Retry with simplified prompt
        console.warn('[Digital] 5. First attempt failed — retrying with simplified prompt');
        return fetch('https://clusteros-v3-production.up.railway.app/api/v1/commentary', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: retryPrompt }),
        })
          .then(r2 => r2.ok ? r2.text() : null)
          .then(raw2 => {
            console.log('[Digital] 6. Retry response length:', (raw2 || '').length);
            const result2 = parseDigitalResponse(raw2);
            if (result2) { console.log('[Digital] 7. SUCCESS on retry. Keys:', Object.keys(result2)); return result2; }
            console.error('[Digital] 8. BOTH ATTEMPTS FAILED');
            return null;
          });
      })
      .catch(err => { console.error('[Digital] Fetch error:', err.message); return null; });

    // Wait for all calls
    Promise.all([Promise.all(stackCalls), digitalCall]).then(([stackResults, digitalResult]) => {
      console.log('[Commentary] Stack results:', stackResults.filter(Boolean).length, 'Digital result:', !!digitalResult);
      if (digitalResult) {
        console.log('[Commentary] Digital commentary loaded:', digitalResult);
        console.log('[Commentary] Digital keys:', Object.keys(digitalResult));
      } else {
        console.warn('[Commentary] Digital commentary is NULL — fallback text will show');
      }
      const commentary = {};
      stackResults.forEach(r => {
        if (r) commentary[r.stackId] = { diagnosis: r.diagnosis, consequence: r.consequence, mechanism: r.mechanism };
      });
      setJourneyState(prev => {
        const next = {
          ...prev,
          stackCommentary: { ...prev.stackCommentary, ...commentary },
          digitalCommentary: digitalResult || prev.digitalCommentary || null,
          layerCommentary: (() => {
            const keys = ['sovereignDatabase','governanceAccess','integrationLayer','automationLayer','intelligenceSubstrate','aiRuntime','applicationLayer'];
            const result = {};
            const config = journeyState.osConfig || {};
            keys.forEach(key => { result[key] = buildLayerCommentary(key, journeyState, config); });
            return result;
          })(),
          detectedStacks: prev.detectedStacks || [],
        };
        console.log('[Commentary] Stored digitalCommentary:', !!next.digitalCommentary);
        return next;
      });
      setLoadingCommentary(false);
      setPhase(3);
    });
  }, [journeyState.detectedStacks, journeyState.qualifierAnswers]);

  // Map phase to stage index for indicators
  const currentStage = phase <= 2 ? 0 : phase <= 5 ? 1 : 2;
  const completedUpTo = phase >= 6 ? 2 : phase >= 4 ? 1 : 0;

  /* ── Context value ── */
  const ctx = useMemo(() => ({
    journeyState,
    updateJourneyState,
    currentStage,
    goNext,
    goBack,
  }), [journeyState, updateJourneyState, currentStage, goNext, goBack]);

  /* ── Render ── */
  if (exited) {
    return <ExitSummary exitedAt={exitedAt} journeyState={journeyState} />;
  }

  const stage = STAGES[currentStage];
  const isFirst = phase <= 0;
  const isLast = phase === 6;

  // Stage 0 — intro screen (no step indicator, no nav, no sticky bar)
  if (phase === -1) {
    return (
      <div style={{ minHeight: '100vh', background: 'var(--dj-bg)', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        {/* Minimal header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 32px', flexShrink: 0 }}>
          <a href="/" style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', color: 'var(--dj-chalk)', textDecoration: 'none', letterSpacing: '-0.01em' }}>
            Cluster<span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, fontSize: '14px', color: '#2a7a4f' }}>OS</span>
          </a>
          <a href="https://clusteros.io" style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--dj-chalk-muted)', textDecoration: 'none', letterSpacing: '0.04em' }}>
            &larr; Back to site
          </a>
        </div>
        {/* Content */}
        <main className="stage0-main" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 32px' }}>
          <div style={s0.container}>
            <h1 style={s0.heading}>Find out what's holding your ecosystem back.</h1>
            <p style={s0.body}>
              Select the behavioural patterns you recognise in your ecosystem. We'll identify the reinforcing dynamics — and show you what to do about them.
            </p>
            <div className="s0-outputs" style={s0.outputRow}>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Report</div>
                <div style={s0.outputText}>Stall profile and stack analysis, emailed to you</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Leverage</div>
                <div style={s0.outputText}>Intervention hypotheses with confidence ratings</div>
              </div>
              <div style={s0.outputCard}>
                <div style={s0.outputLabel}>Digital OS</div>
                <div style={s0.outputText}>Infrastructure configuration recommendation</div>
              </div>
            </div>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: '13px', color: 'var(--dj-chalk-muted)', marginBottom: '24px' }}>
              8–12 minutes
            </p>
            <button className="s0-cta-btn" style={s0.cta} onClick={() => setPhase(0)}>
              Start the diagnostic
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '8px' }}>
                <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </main>
      </div>
    );
  }

  // Determine what to show in main content area
  let mainContent;
  if (phase === 0) {
    mainContent = <BehavioursStage />;
  } else if (phase === 1) {
    mainContent = (
      <TransitionCard transitionType="stalls-to-qualifiers" journeyState={journeyState}
        onContinue={goNext}
        onBack={() => setPhase(0)}
        onStop={() => { console.log('stop-behaviours'); setExitedAt(0); setExited(true); }}
        updateJourneyState={updateJourneyState} />
    );
  } else if (phase === 2 && loadingCommentary) {
    mainContent = (
      <div style={{ width: '100%', maxWidth: '480px', textAlign: 'center', padding: '80px 0' }}>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '24px', fontWeight: 400, color: 'var(--dj-chalk)', marginBottom: '12px' }}>
          Preparing your leverage analysis
        </h2>
        <p style={{ fontFamily: 'var(--font-sans)', fontSize: '14px', color: 'var(--dj-chalk-muted)', marginBottom: '24px' }}>
          Analysing your configuration against detected stacks
        </p>
        <div style={{ display: 'flex', justifyContent: 'center', gap: '6px' }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              width: '8px', height: '8px', borderRadius: '50%', background: 'var(--steward)',
              animation: `pulse-dot 1.2s ease-in-out ${i * 0.2}s infinite`,
            }} />
          ))}
        </div>
      </div>
    );
  } else if (phase === 2) {
    mainContent = <QualifierQuestions onComplete={handleQualifierComplete} />;
  } else if (phase === 3) {
    mainContent = (
      <TransitionCard transitionType="qualifiers-to-leverage" journeyState={journeyState}
        onContinue={goNext} onBack={() => setPhase(2)} onStop={() => {}} />
    );
  } else if (phase === 4) {
    mainContent = <LeverageStage />;
  } else if (phase === 5) {
    mainContent = (
      <TransitionCard transitionType="leverage-to-os" journeyState={journeyState}
        onContinue={goNext}
        onStop={() => { console.log('stop-leverage'); setExitedAt(1); setExited(true); }} />
    );
  } else {
    mainContent = <DigitalOSStage />;
  }

  return (
    <JourneyContext.Provider value={ctx}>
      <div style={styles.shell}>
        {/* ── Step indicator ── */}
        <StepIndicator current={currentStage} completedUpTo={completedUpTo} />

        {/* ── Stage content area ── */}
        <main style={styles.main}>
          {mainContent}
        </main>

        {/* ── Navigation bar (hidden on transition cards and Stage 3 which has its own stepper nav) ── */}
        {phase !== 1 && phase !== 3 && phase !== 5 && phase !== 6 && (
          <nav className="nav-bar-journey" style={styles.navBar}>
            <div style={styles.navLeft}>
              {!isFirst && (
                <button style={styles.btnGhost} onClick={goBack}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginRight: '6px' }}>
                    <path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Back
                </button>
              )}
            </div>
            <div style={styles.navRight}>
              {phase !== 2 && !isLast && (
                <button style={styles.btnSignal} onClick={goNext}>
                  Continue
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ marginLeft: '6px' }}>
                    <path d="M5.5 3L9.5 7L5.5 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              )}
            </div>
          </nav>
        )}

        {/* ── Sticky bar ── */}
        <StickyBar phase={phase} journeyState={journeyState} onContinue={goNext} />

        {/* ── Exit modal ── */}
        {showExitModal && (
          <ExitModal stage={stage} onConfirm={confirmExit} onCancel={cancelExit} />
        )}
      </div>
    </JourneyContext.Provider>
  );
}

  /* Stage placeholder */
  stageContainer: {
    width: '100%',
    maxWidth: '640px',

  );
  return <DiagnosticJourney />;
}
